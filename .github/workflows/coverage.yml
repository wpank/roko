name: coverage

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: rustup override set stable
      - run: cargo llvm-cov --html --output-dir target/llvm-cov --ignore-filename-regex='(tests/|target/|testdata/|benches/)' --ignore-run-fail
      - run: cargo llvm-cov report --json --summary-only --ignore-filename-regex='(tests/|target/|testdata/|benches/)' > coverage-summary.txt
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.txt
