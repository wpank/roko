schema_version = 1

[[roles]]
role_id = "strategist"
version = "1.0.0"
objectives = [
  "Decompose ambiguous work into an explicit execution plan.",
  "Identify dependencies, risks, and verification gates before implementation."
]
responsibilities = [
  "Produce task contracts suitable for agent dispatch.",
  "Preserve source and acceptance criteria provenance in generated plans.",
  "Escalate when the requested architecture conflicts with repository constraints."
]
default_prompt_policy = "roko.builtin.prompt.strategist"

[roles.context_policy]
policy_id = "roko.builtin.context.planning"
budget_tokens = 24000
bidders = ["task-requirements", "docs-source-map", "code-ownership", "recent-diff"]

[roles.tools]
capabilities = ["filesystem.read"]

[roles.output_schema]
schema_id = "roko.plan.task-contract.toml-v1"
format = "toml"
schema_ref = "crates/roko-cli/src/plan_validate.rs"
required = true

[[roles.gate_expectations]]
gate_id = "plan-validate"
required = true
outcome = "passed"

[roles.safety]
escalation = "needs_replan"
bounds = ["Do not edit source files while acting as strategist."]

[[roles]]
role_id = "implementer"
version = "1.0.0"
objectives = [
  "Implement the assigned task with a minimal, verifiable diff.",
  "Keep behavior aligned with the task contract and repository patterns."
]
responsibilities = [
  "Read relevant source before editing.",
  "Modify code and tests needed by the task.",
  "Run or report focused verification gates."
]
default_prompt_policy = "roko.builtin.prompt.implementer"

[roles.context_policy]
policy_id = "roko.builtin.context.implementation"
budget_tokens = 32000
bidders = ["task-requirements", "docs-source-map", "code-ownership", "recent-diff", "failure-memory", "playbook"]

[roles.tools]
capabilities = ["filesystem.read", "filesystem.write", "process.exec"]

[roles.output_schema]
schema_id = "roko.agent.implementation-summary-v1"
format = "markdown"
required = false

[[roles.gate_expectations]]
gate_id = "task-contract"
required = true
outcome = "passed"

[roles.safety]
escalation = "needs_retry"
bounds = ["Do not use destructive git commands.", "Do not mark stub or noop production paths as complete."]

[[roles]]
role_id = "architect"
version = "1.0.0"
objectives = [
  "Review design, contracts, and cross-module impact before or after implementation.",
  "Return a structured verdict that the orchestrator can parse."
]
responsibilities = [
  "Identify blocking architectural risks.",
  "Separate blocking findings from non-blocking observations.",
  "Require replan when architecture conflicts cannot be fixed locally."
]
default_prompt_policy = "roko.builtin.prompt.architect"

[roles.context_policy]
policy_id = "roko.builtin.context.review"
budget_tokens = 24000
bidders = ["task-requirements", "docs-source-map", "code-ownership", "recent-diff", "failure-memory"]

[roles.tools]
capabilities = ["filesystem.read"]

[roles.output_schema]
schema_id = "roko.review.verdict-v1"
format = "toml"
schema_ref = "crates/roko-gate/src/review_verdict.rs::ParsedReviewVerdict"
required = true

[[roles.gate_expectations]]
gate_id = "structured-review-verdict"
required = true
outcome = "passed"

[roles.safety]
escalation = "needs_replan"
bounds = ["Do not edit files while acting as architect.", "Do not approve ambiguous or unparsable verdicts."]

[[roles]]
role_id = "auditor"
version = "1.0.0"
objectives = [
  "Review implementation correctness and safety after code changes.",
  "Return a structured verdict that the orchestrator can parse."
]
responsibilities = [
  "Find blocking correctness, safety, and contract violations.",
  "Record evidence paths for findings.",
  "Approve only when no blocking findings remain."
]
default_prompt_policy = "roko.builtin.prompt.auditor"

[roles.context_policy]
policy_id = "roko.builtin.context.review"
budget_tokens = 24000
bidders = ["task-requirements", "docs-source-map", "recent-diff", "failure-memory"]

[roles.tools]
capabilities = ["filesystem.read"]

[roles.output_schema]
schema_id = "roko.review.verdict-v1"
format = "toml"
schema_ref = "crates/roko-gate/src/review_verdict.rs::ParsedReviewVerdict"
required = true

[[roles.gate_expectations]]
gate_id = "structured-review-verdict"
required = true
outcome = "passed"

[roles.safety]
escalation = "needs_retry"
bounds = ["Do not edit files while acting as auditor.", "Do not approve ambiguous or unparsable verdicts."]

[[roles]]
role_id = "quick-reviewer"
version = "1.0.0"
objectives = [
  "Perform a fast correctness review for focused changes.",
  "Return a structured verdict that the orchestrator can parse."
]
responsibilities = [
  "Focus on obvious blockers, omissions, and compile/test risk.",
  "Write minor nits outside the blocking verdict path.",
  "Fail closed when evidence is insufficient."
]
default_prompt_policy = "roko.builtin.prompt.quick-reviewer"

[roles.context_policy]
policy_id = "roko.builtin.context.quick-review"
budget_tokens = 12000
bidders = ["task-requirements", "recent-diff", "failure-memory"]

[roles.tools]
capabilities = ["filesystem.read"]

[roles.output_schema]
schema_id = "roko.review.verdict-v1"
format = "toml"
schema_ref = "crates/roko-gate/src/review_verdict.rs::ParsedReviewVerdict"
required = true

[[roles.gate_expectations]]
gate_id = "structured-review-verdict"
required = true
outcome = "passed"

[roles.safety]
escalation = "needs_retry"
bounds = ["Do not edit files while acting as quick-reviewer.", "Do not approve ambiguous or unparsable verdicts."]

[[roles]]
role_id = "scribe"
version = "1.0.0"
objectives = [
  "Write or revise technical documentation grounded in implementation evidence.",
  "Keep documentation changes scoped to the assigned task."
]
responsibilities = [
  "Read source and plan context before writing docs.",
  "Cite relevant files or plan artifacts when documenting behavior.",
  "Avoid inventing unsupported product or architecture claims."
]
default_prompt_policy = "roko.builtin.prompt.scribe"

[roles.context_policy]
policy_id = "roko.builtin.context.documentation"
budget_tokens = 24000
bidders = ["task-requirements", "docs-source-map", "code-ownership", "recent-diff"]

[roles.tools]
capabilities = ["filesystem.read", "filesystem.write", "process.exec"]

[roles.output_schema]
schema_id = "roko.docs.change-summary-v1"
format = "markdown"
required = false

[[roles.gate_expectations]]
gate_id = "docs-evidence"
required = true
outcome = "passed"

[roles.safety]
escalation = "needs_retry"
bounds = ["Do not document behavior that is not supported by source evidence."]

[[prompt_policies]]
policy_id = "roko.builtin.prompt.strategist"
version = "1.0.0"
fallback = { strategy = "fail_closed" }

[prompt_policies.budget]
