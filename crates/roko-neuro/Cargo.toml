[package]
name = "roko-neuro"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Knowledge and memory subsystems for Roko."

[lints]
workspace = true

[features]
default = []
hdc = ["dep:roko-primitives"]

[dependencies]
roko-core = { path = "../roko-core" }
roko-fs = { path = "../roko-fs" }
roko-agent = { path = "../roko-agent" }
roko-learn = { path = "../roko-learn" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
chrono = { workspace = true }
anyhow = { workspace = true }
parking_lot = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["rt"] }
tracing = { workspace = true }
roko-primitives = { path = "../roko-primitives", optional = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full", "test-util"] }

[package.metadata.roko]
layer = 2
