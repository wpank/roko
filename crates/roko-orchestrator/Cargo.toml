[package]
name = "roko-orchestrator"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Plan discovery, task DAG, worktree manager, and parallel executor for Roko."

[lints]
workspace = true

[dependencies]
roko-core = { path = "../roko-core" }
roko-agent = { path = "../roko-agent" }
roko-compose = { path = "../roko-compose" }
roko-conductor = { path = "../roko-conductor" }
roko-daimon = { path = "../roko-daimon" }
roko-gate = { path = "../roko-gate" }
roko-learn = { path = "../roko-learn" }
roko-neuro = { path = "../roko-neuro" }
roko-runtime = { path = "../roko-runtime" }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml_ng = "0.10"
thiserror = { workspace = true }
tokio = { workspace = true, features = ["process", "time", "sync", "rt", "macros", "fs"] }
parking_lot = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
blake3 = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full", "test-util"] }

[package.metadata.roko]
layer = 3
