[package]
name = "roko-std"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Standard trait implementations for Roko: in-memory substrate, NoOp defaults, composable scorers."

[lints]
workspace = true

[dependencies]
roko-core = { path = "../roko-core" }
roko-chain = { path = "../roko-chain" }
async-trait = "0.1"
serde = { workspace = true }
serde_json = { workspace = true }
parking_lot = "0.12"
tokio = { workspace = true, features = ["fs", "io-util", "rt", "process", "time"] }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "macros", "test-util"] }
tempfile = { workspace = true }
proptest = { workspace = true }
