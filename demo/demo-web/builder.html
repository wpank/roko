<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>roko — builder</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  :root {
    --bg: #16121a; --fg: #a58e9e; --rose: #b97894; --sage: #7d9e8c;
    --ember: #c36e55; --bone: #d7c69e; --dream: #7873a5; --ghost: #372a37; --dim: #916e8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font-family: 'Geist Mono','SF Mono','Menlo',monospace;
    display: flex; flex-direction: column; height: 100vh; }

  .header { padding: 8px 16px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--ghost); }
  .header h1 { color: var(--rose); font-size: 1rem; }
  .header .task-cards { display: flex; gap: 6px; margin-left: auto; }
  .task-card { background: var(--ghost); color: var(--dim); border: none; padding: 4px 10px;
    border-radius: 4px; font-family: inherit; font-size: 0.7rem; cursor: pointer; }
  .task-card:hover { background: #4a3a4a; color: var(--bone); }

  .main { display: grid; grid-template-columns: 200px 1fr; flex: 1; overflow: hidden; }

  .sidebar { border-right: 1px solid var(--ghost); overflow-y: auto; padding: 8px; }
  .sidebar h3 { color: var(--dim); font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 8px; }
  .file { padding: 2px 4px; font-size: 0.75rem; color: var(--dim); cursor: default;
    border-radius: 2px; }
  .file:hover { background: var(--ghost); }
  .file.new { color: var(--sage); }
  .file .icon { margin-right: 4px; }

  .terminal-area { display: flex; flex-direction: column; overflow: hidden; }
  .terminal-wrap { flex: 1; padding: 4px; overflow: hidden; }

  .gates-bar { padding: 6px 16px; border-top: 1px solid var(--ghost);
    display: flex; gap: 16px; font-size: 0.75rem; }
  .gate { display: flex; align-items: center; gap: 4px; }
  .gate.pass { color: var(--sage); }
  .gate.fail { color: var(--ember); }
  .gate.pending { color: var(--dim); }

  .input-bar { padding: 8px 16px; border-top: 1px solid var(--ghost);
    display: flex; align-items: center; gap: 8px; }
  .input-bar .prompt { color: var(--rose); font-weight: 600; }
  .input-bar input { flex: 1; background: transparent; border: 1px solid var(--ghost);
    border-radius: 4px; padding: 8px 12px; color: var(--bone); font-family: inherit;
    font-size: 0.85rem; outline: none; }
  .input-bar input:focus { border-color: var(--rose); }
  .input-bar input::placeholder { color: var(--ghost); }
  .input-bar button { background: var(--rose); color: var(--bg); border: none; padding: 8px 16px;
    border-radius: 4px; font-family: inherit; font-weight: 600; cursor: pointer; }
  .input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar { padding: 4px 16px; border-top: 1px solid var(--ghost);
    display: flex; gap: 16px; font-size: 0.65rem; color: var(--dim); }
</style>
</head>
<body>
  <div class="header">
    <h1>◆ roko builder</h1>
    <span style="color:var(--dim);font-size:0.75rem">type a request — roko builds it live</span>
    <div class="task-cards">
      <button class="task-card" onclick="submitTask('Build a CLI calculator in Rust')">calculator</button>
      <button class="task-card" onclick="submitTask('Create a REST API with health check')">REST API</button>
      <button class="task-card" onclick="submitTask('Write a markdown to HTML converter')">md→html</button>
      <button class="task-card" onclick="submitTask('Build a file deduplication tool')">dedup</button>
      <button class="task-card" onclick="submitTask('Create a git commit message generator')">commitgen</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <h3>files</h3>
      <div id="file-tree">
        <div class="file" style="color:var(--ghost)">no project yet</div>
      </div>
    </div>
    <div class="terminal-area">
      <div class="terminal-wrap" id="terminal"></div>
    </div>
  </div>

  <div class="gates-bar" id="gates-bar">
    <div class="gate pending" id="gate-compile">⏳ compile</div>
    <div class="gate pending" id="gate-test">⏳ test</div>
    <div class="gate pending" id="gate-clippy">⏳ clippy</div>
  </div>

  <div class="input-bar">
    <span class="prompt">❯</span>
    <input type="text" id="prompt-input" placeholder="What do you want to build?"
      onkeydown="if(event.key==='Enter')submitFromInput()">
    <button id="btn-build" onclick="submitFromInput()">Build</button>
  </div>

  <div class="status-bar">
    <span id="sb-status">ready</span>
    <span id="sb-cost">cost: —</span>
    <span id="sb-server">connecting...</span>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
const SERVE_URL = location.protocol === 'file:'
  ? 'http://localhost:6677'
  : (location.port === '6677' || location.pathname.startsWith('/demo'))
    ? location.origin : 'http://localhost:6677';
const WS_BASE = SERVE_URL.replace(/^http/, 'ws');
const ROKO = './target/release/roko';

const theme = {
  background: '#0e0c10', foreground: '#a58e9e', cursor: '#b97894', cursorAccent: '#0e0c10',
  selectionBackground: '#372a37',
  black: '#16121a', red: '#c36e55', green: '#7d9e8c', yellow: '#c39b5f',
  blue: '#7873a5', magenta: '#b97894', cyan: '#6a9ea0', white: '#d7c69e',
  brightBlack: '#372a37', brightRed: '#d48a6e', brightGreen: '#99c4ac', brightYellow: '#d9b870',
  brightBlue: '#9d98c4', brightMagenta: '#dc9cb8', brightCyan: '#8abcbe', brightWhite: '#ede0c8',
};

// Terminal setup
const term = new Terminal({
  theme, fontFamily: "'Geist Mono','SF Mono','Menlo',monospace",
  fontSize: 13, lineHeight: 1.3, cursorBlink: true, cursorStyle: 'bar',
});
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));
fitAddon.fit();

new ResizeObserver(() => fitAddon.fit()).observe(document.getElementById('terminal'));

// WebSocket to PTY
let ws = null;
let sessionId = 'builder-1';
let building = false;
let tmpDir = null;

function connectTerminal() {
  ws = new WebSocket(`${WS_BASE}/ws/terminal/${sessionId}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    document.getElementById('sb-server').textContent = `server: ${SERVE_URL}`;
    // Send initial resize
    const dims = fitAddon.proposeDimensions();
    if (dims) ws.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
  };
  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      const text = new TextDecoder().decode(e.data);
      term.write(new Uint8Array(e.data));
      // Watch for gate results in output
      detectGates(text);
      // Watch for file creation
      detectFiles(text);
    } else {
      term.write(e.data);
    }
  };
  ws.onclose = () => {
    document.getElementById('sb-server').textContent = 'disconnected';
  };

  // Forward keystrokes (allow interactive use)
  term.onData(data => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(data);
  });
  term.onResize(({ cols, rows }) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    }
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeCmd(cmd, delay = 25) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  for (const ch of cmd) {
    ws.send(ch);
    await sleep(delay + Math.random() * 10);
  }
  await sleep(150);
  ws.send('\r');
}

function submitFromInput() {
  const input = document.getElementById('prompt-input');
  const prompt = input.value.trim();
  if (!prompt || building) return;
  input.value = '';
  submitTask(prompt);
}

async function submitTask(prompt) {
  if (building) return;
  building = true;
  document.getElementById('btn-build').disabled = true;
  document.getElementById('sb-status').textContent = 'building...';

  // Reset gates
  ['compile', 'test', 'clippy'].forEach(g => {
    const el = document.getElementById(`gate-${g}`);
    el.className = 'gate pending';
    el.textContent = `⏳ ${g}`;
  });

  // Reset file tree
  document.getElementById('file-tree').innerHTML = '<div class="file" style="color:var(--ghost)">creating project...</div>';

  // Wait for terminal to be ready
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    connectTerminal();
    await sleep(2000);
  }

  // Wait for shell prompt
  await sleep(1500);

  // Create temp directory and run roko
  tmpDir = `/tmp/roko-demo-${Date.now()}`;
  await typeCmd(`mkdir -p ${tmpDir} && cd ${tmpDir}`);
  await sleep(500);

  // Initialize and run
  await typeCmd(`${ROKO} init`);
  await sleep(1000);
  await typeCmd(`${ROKO} run "${prompt.replace(/"/g, '\\"')}" --share`);

  // Poll for completion (watch for the ✔ or ✖ in output)
  document.getElementById('sb-status').textContent = 'agent working...';

  // The terminal will show real-time output. We just wait.
  // After some time, check if done
  await sleep(15000);

  // Show the file tree
  await typeCmd(`find . -type f -not -path './.roko/*' -not -path './target/*' | head -20`);
  await sleep(1000);

  building = false;
  document.getElementById('btn-build').disabled = false;
  document.getElementById('sb-status').textContent = 'done';
}

// Detect gate results from terminal output
function detectGates(text) {
  if (text.includes('compile') && text.includes('✔')) setGate('compile', true);
  if (text.includes('compile') && text.includes('✖')) setGate('compile', false);
  if (text.includes('test') && text.includes('✔')) setGate('test', true);
  if (text.includes('test') && text.includes('✖')) setGate('test', false);
  if (text.includes('clippy') && text.includes('✔')) setGate('clippy', true);
  if (text.includes('clippy') && text.includes('✖')) setGate('clippy', false);
}

function setGate(name, passed) {
  const el = document.getElementById(`gate-${name}`);
  el.className = `gate ${passed ? 'pass' : 'fail'}`;
  el.textContent = `${passed ? '✔' : '✖'} ${name}`;
}

// Detect files from terminal output (simple heuristic)
function detectFiles(text) {
  const lines = text.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    // Look for Write/Edit tool calls or find output
    if (trimmed.startsWith('./') && !trimmed.includes(' ')) {
      addFile(trimmed);
    }
    if (trimmed.includes('Write') && trimmed.includes('.rs')) {
      const match = trimmed.match(/(\S+\.rs)/);
      if (match) addFile(match[1]);
    }
    if (trimmed.includes('Cargo.toml')) addFile('Cargo.toml');
  }
}

const knownFiles = new Set();
function addFile(path) {
  if (knownFiles.has(path)) return;
  knownFiles.add(path);

  const tree = document.getElementById('file-tree');
  // Clear placeholder
  if (tree.querySelector('[style*="ghost"]')) tree.innerHTML = '';

  const ext = path.split('.').pop();
  const icon = ext === 'rs' ? '🦀' : ext === 'toml' ? '📦' : '📄';

  const div = document.createElement('div');
  div.className = 'file new';
  div.innerHTML = `<span class="icon">${icon}</span>${path}`;
  tree.appendChild(div);

  // Flash animation
  div.style.background = 'rgba(125,158,140,0.2)';
  setTimeout(() => { div.style.background = 'transparent'; div.style.transition = 'background 1s'; }, 100);
}

// Connect on load
connectTerminal();

// Health check
fetch(`${SERVE_URL}/health`)
  .then(r => r.json())
  .then(() => { document.getElementById('sb-server').textContent = `server: ${SERVE_URL}`; })
  .catch(() => { document.getElementById('sb-server').textContent = 'server not reachable — run: roko serve'; });
</script>
</body>
</html>
