<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>roko — live terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.css" onerror="">
<style>
  :root {
    --bg: #16121a; --fg: #a58e9e; --rose: #b97894; --sage: #7d9e8c;
    --ember: #c36e55; --bone: #d7c69e; --dream: #7873a5; --ghost: #372a37; --dim: #916e8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font-family: 'Geist Mono','SF Mono','Menlo',monospace; }
  .header { padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid var(--ghost); }
  .header h1 { color: var(--rose); font-size: 1.2rem; }
  .header .controls { display: flex; gap: 0.5rem; margin-left: auto; }
  button { background: var(--rose); color: var(--bg); border: none; padding: 6px 16px; border-radius: 4px;
    font-family: inherit; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: var(--ghost); color: var(--fg); }
  button.danger { background: var(--ember); }
  .grid { display: grid; gap: 2px; padding: 2px; height: calc(100vh - 60px); }
  .grid.cols-1 { grid-template-columns: 1fr; }
  .grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .grid.cols-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .pane { background: #0e0c10; border: 1px solid var(--ghost); border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; }
  .pane-header { padding: 4px 12px; background: var(--bg); border-bottom: 1px solid var(--ghost);
    display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: var(--dim); }
  .pane-header .label { color: var(--rose); font-weight: 600; }
  .pane-header .status { margin-left: auto; }
  .pane-header .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .pane-header .dot.connected { background: var(--sage); }
  .pane-header .dot.disconnected { background: var(--ember); }
  .terminal-wrap { flex: 1; padding: 4px; }
  #status-bar { padding: 4px 2rem; border-top: 1px solid var(--ghost); font-size: 0.7rem; color: var(--dim);
    display: flex; gap: 2rem; }
</style>
</head>
<body>
  <div class="header">
    <h1>◆ roko terminal</h1>
    <div class="controls">
      <button onclick="addTerminal()">+ Terminal</button>
      <button onclick="runAllDemos()" id="btn-demo">Run All Demos</button>
      <button class="secondary" onclick="setLayout(1)">1</button>
      <button class="secondary" onclick="setLayout(2)">2</button>
      <button class="secondary" onclick="setLayout(4)">4</button>
      <button class="danger" onclick="destroyAll()">Clear All</button>
    </div>
  </div>
  <div class="grid cols-1" id="grid"></div>
  <div id="status-bar">
    <span id="sb-sessions">0 sessions</span>
    <span id="sb-server">connecting...</span>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
// Detect serve URL. file:// protocol can't do fetch/WS — always use localhost:6677.
const SERVE_URL = location.protocol === 'file:'
  ? 'http://localhost:6677'
  : (location.port === '6677' || location.pathname.startsWith('/demo'))
    ? location.origin
    : `http://localhost:6677`;
const WS_BASE = SERVE_URL.replace(/^http/, 'ws');

const theme = {
  background: '#0e0c10', foreground: '#a58e9e', cursor: '#b97894', cursorAccent: '#0e0c10',
  selectionBackground: '#372a37',
  black: '#16121a', red: '#c36e55', green: '#7d9e8c', yellow: '#c39b5f',
  blue: '#7873a5', magenta: '#b97894', cyan: '#6a9ea0', white: '#d7c69e',
  brightBlack: '#372a37', brightRed: '#d48a6e', brightGreen: '#99c4ac', brightYellow: '#d9b870',
  brightBlue: '#9d98c4', brightMagenta: '#dc9cb8', brightCyan: '#8abcbe', brightWhite: '#ede0c8',
};

let terminals = [];
let nextId = 1;

async function addTerminal(cmd, label) {
  // Generate a session ID — the WebSocket handler auto-creates the PTY.
  const sessionId = `t${nextId++}`;

  const paneId = `pane-${sessionId}`;
  const pane = document.createElement('div');
  pane.className = 'pane';
  pane.id = paneId;
  pane.innerHTML = `
    <div class="pane-header">
      <span class="label">${label || `terminal ${terminals.length + 1}`}</span>
      <span class="dot disconnected" id="dot-${sessionId}"></span>
      <span class="status" id="status-${sessionId}">connecting...</span>
      <button class="secondary" onclick="destroyTerminal('${sessionId}')" style="font-size:0.65rem;padding:2px 8px;">✖</button>
    </div>
    <div class="terminal-wrap" id="term-${sessionId}"></div>
  `;
  document.getElementById('grid').appendChild(pane);

  const term = new Terminal({
    theme, fontFamily: "'Geist Mono','SF Mono','Menlo',monospace",
    fontSize: 12, lineHeight: 1.3, cursorBlink: true, cursorStyle: 'bar',
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById(`term-${sessionId}`));
  fitAddon.fit();

  // WebSocket connection
  const ws = new WebSocket(`${WS_BASE}/ws/terminal/${sessionId}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    document.getElementById(`dot-${sessionId}`).className = 'dot connected';
    document.getElementById(`status-${sessionId}`).textContent = 'connected';
  };
  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      term.write(new Uint8Array(e.data));
    } else {
      term.write(e.data);
    }
  };
  ws.onclose = () => {
    document.getElementById(`dot-${sessionId}`).className = 'dot disconnected';
    document.getElementById(`status-${sessionId}`).textContent = 'disconnected';
  };

  // Forward keystrokes to server
  term.onData(data => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(data);
    }
  });

  // Send resize events to server so PTY columns match xterm.js
  term.onResize(({ cols, rows }) => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    }
  });

  // Also send initial size once connected
  ws.addEventListener('open', () => {
    const dims = fitAddon.proposeDimensions();
    if (dims) {
      ws.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
    }
  }, { once: true });

  // Handle container resize
  const resizeObserver = new ResizeObserver(() => {
    fitAddon.fit();
  });
  resizeObserver.observe(document.getElementById(`term-${sessionId}`));

  const entry = { sessionId, term, ws, fitAddon, resizeObserver, paneId };
  terminals.push(entry);
  updateLayout();
  updateStatus();

  return entry;
}

function destroyTerminal(sessionId) {
  const idx = terminals.findIndex(t => t.sessionId === sessionId);
  if (idx === -1) return;
  const entry = terminals[idx];
  entry.ws.close();
  entry.term.dispose();
  entry.resizeObserver.disconnect();
  document.getElementById(entry.paneId)?.remove();
  terminals.splice(idx, 1);
  // Tell server to clean up
  fetch(`${SERVE_URL}/api/terminal/sessions/${sessionId}`, { method: 'DELETE' }).catch(() => {});
  updateLayout();
  updateStatus();
}

function destroyAll() {
  while (terminals.length > 0) {
    destroyTerminal(terminals[0].sessionId);
  }
}

function setLayout(cols) {
  const grid = document.getElementById('grid');
  grid.className = `grid cols-${cols}`;
  terminals.forEach(t => setTimeout(() => t.fitAddon.fit(), 100));
}

function updateLayout() {
  const n = terminals.length;
  if (n <= 1) setLayout(1);
  else if (n <= 2) setLayout(2);
  else if (n <= 3) setLayout(3);
  else setLayout(4);
}

function updateStatus() {
  document.getElementById('sb-sessions').textContent = `${terminals.length} session${terminals.length === 1 ? '' : 's'}`;
}

// Send a command to a terminal by typing it + pressing enter
function sendCommand(entry, cmd) {
  return new Promise(resolve => {
    if (entry.ws.readyState !== WebSocket.OPEN) { resolve(); return; }
    entry.ws.send(cmd + '\r');
    // Wait for output to settle
    setTimeout(resolve, 100);
  });
}

// Wait for WebSocket to be open
function waitForOpen(ws, timeout = 5000) {
  return new Promise((resolve, reject) => {
    if (ws.readyState === WebSocket.OPEN) { resolve(); return; }
    const t = setTimeout(() => reject(new Error('ws timeout')), timeout);
    const origOpen = ws.onopen;
    ws.addEventListener('open', () => { clearTimeout(t); resolve(); }, { once: true });
  });
}

// Type a command character by character with delays
async function typeCommand(entry, cmd, charDelay = 30) {
  await waitForOpen(entry.ws);
  for (const ch of cmd) {
    if (entry.ws.readyState !== WebSocket.OPEN) return;
    entry.ws.send(ch);
    await new Promise(r => setTimeout(r, charDelay + Math.random() * 15));
  }
  await new Promise(r => setTimeout(r, 200));
  if (entry.ws.readyState === WebSocket.OPEN) {
    entry.ws.send('\r');
  }
}

// Demo sequences
// Use pre-built binary to avoid cargo compilation warnings flooding the terminal.
// Build once with: cargo build -p roko-cli --release
// Then symlink: ln -sf target/release/roko /usr/local/bin/roko
const ROKO = './target/release/roko';

const DEMOS = [
  {
    label: 'self-hosting workflow',
    commands: [
      `${ROKO} init`,
      `${ROKO} prd idea "Wire SystemPromptBuilder into orchestrate.rs"`,
      `${ROKO} status`,
    ],
  },
  {
    label: 'benchmark comparison',
    commands: [
      `${ROKO} bench demo`,
    ],
  },
  {
    label: 'agent chat',
    commands: [
      `${ROKO} agent list`,
      `${ROKO} status --cfactor`,
    ],
  },
  {
    label: 'knowledge + replay',
    commands: [
      `${ROKO} learn efficiency`,
      `${ROKO} learn all`,
    ],
  },
];

async function runAllDemos() {
  document.getElementById('btn-demo').disabled = true;
  destroyAll();
  await new Promise(r => setTimeout(r, 300));

  // Create one terminal per demo
  const entries = [];
  for (const demo of DEMOS) {
    const entry = await addTerminal(null, demo.label);
    entries.push({ entry, demo });
    await new Promise(r => setTimeout(r, 500)); // stagger connections
  }

  // Wait for all shells to start (shell prompt takes ~1-2s)
  await new Promise(r => setTimeout(r, 2500));

  // Run all demos in parallel
  const promises = entries.map(async ({ entry, demo }) => {
    // Wait for this terminal's WS to be open
    try { await waitForOpen(entry.ws); } catch(e) { return; }
    // Extra wait for shell prompt
    await new Promise(r => setTimeout(r, 1000));

    for (const cmd of demo.commands) {
      await typeCommand(entry, cmd);
      // Wait for command to complete (longer for complex commands)
      const wait = cmd.includes('bench') ? 8000 : cmd.includes('prd') ? 5000 : 3000;
      await new Promise(r => setTimeout(r, wait));
    }
  });

  await Promise.all(promises);
  document.getElementById('btn-demo').disabled = false;
}

// Check server health on load
fetch(`${SERVE_URL}/health`)
  .then(r => r.json())
  .then(() => {
    document.getElementById('sb-server').textContent = `server: ${SERVE_URL}`;
  })
  .catch(() => {
    document.getElementById('sb-server').textContent = 'server: not reachable — start with: roko serve';
  });
</script>
</body>
</html>
