<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>roko — live terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.css" onerror="">
<style>
  :root {
    --bg: #16121a; --fg: #a58e9e; --rose: #b97894; --sage: #7d9e8c;
    --ember: #c36e55; --bone: #d7c69e; --dream: #7873a5; --ghost: #372a37; --dim: #916e8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font-family: 'Geist Mono','SF Mono','Menlo',monospace; }
  .header { padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid var(--ghost); }
  .header h1 { color: var(--rose); font-size: 1.2rem; }
  .header h1 a { color: inherit; text-decoration: none; }
  .header h1 a:hover { opacity: 0.8; }
  .header .nav-links { display: flex; gap: 6px; font-size: 0.7rem; }
  .header .nav-links a { color: var(--dim); text-decoration: none; padding: 3px 8px; border-radius: 4px; }
  .header .nav-links a:hover { color: var(--fg); }
  .header .controls { display: flex; gap: 0.5rem; margin-left: auto; }
  button { background: var(--rose); color: var(--bg); border: none; padding: 6px 16px; border-radius: 4px;
    font-family: inherit; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: var(--ghost); color: var(--fg); }
  button.danger { background: var(--ember); }
  .grid { display: grid; gap: 2px; padding: 2px; height: calc(100vh - 60px); }
  .grid.cols-1 { grid-template-columns: 1fr; }
  .grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .grid.cols-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .pane { background: #0e0c10; border: 1px solid var(--ghost); border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; }
  .pane-header { padding: 4px 12px; background: var(--bg); border-bottom: 1px solid var(--ghost);
    display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: var(--dim); }
  .pane-header .label { color: var(--rose); font-weight: 600; }
  .pane-header .status { margin-left: auto; }
  .pane-header .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .pane-header .dot.connected { background: var(--sage); }
  .pane-header .dot.disconnected { background: var(--ember); }
  .terminal-wrap { flex: 1; padding: 4px; }
  #status-bar { padding: 4px 2rem; border-top: 1px solid var(--ghost); font-size: 0.7rem; color: var(--dim);
    display: flex; gap: 2rem; }
</style>
</head>
<body>
  <div class="header">
    <h1><a href="demo.html">◆ roko</a> terminal</h1>
    <div class="nav-links">
      <a href="demo.html">Demo</a>
      <a href="bench.html">Bench</a>
      <a href="bench-live.html">Live</a>
      <a href="explorer.html">Explorer</a>
      <a href="builder.html">Builder</a>
    </div>
    <div class="controls">
      <button onclick="addTerminal()">+ Terminal</button>
      <button onclick="runAllDemos()" id="btn-demo">Run All Demos</button>
      <button class="secondary" onclick="setLayout(1)">1</button>
      <button class="secondary" onclick="setLayout(2)">2</button>
      <button class="secondary" onclick="setLayout(4)">4</button>
      <button class="danger" onclick="destroyAll()">Clear All</button>
    </div>
  </div>
  <div class="grid cols-1" id="grid"></div>
  <div id="status-bar">
    <span id="sb-sessions">0 sessions</span>
    <span id="sb-server">connecting...</span>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
// Detect serve URL. file:// protocol can't do fetch/WS — always use localhost:6677.
const SERVE_URL = location.protocol === 'file:'
  ? 'http://localhost:6677'
  : (location.port === '6677' || location.pathname.startsWith('/demo'))
    ? location.origin
    : `http://localhost:6677`;
const WS_BASE = SERVE_URL.replace(/^http/, 'ws');

const theme = {
  background: '#0e0c10', foreground: '#a58e9e', cursor: '#b97894', cursorAccent: '#0e0c10',
  selectionBackground: '#372a37',
  black: '#16121a', red: '#c36e55', green: '#7d9e8c', yellow: '#c39b5f',
  blue: '#7873a5', magenta: '#b97894', cyan: '#6a9ea0', white: '#d7c69e',
  brightBlack: '#372a37', brightRed: '#d48a6e', brightGreen: '#99c4ac', brightYellow: '#d9b870',
  brightBlue: '#9d98c4', brightMagenta: '#dc9cb8', brightCyan: '#8abcbe', brightWhite: '#ede0c8',
};

let terminals = [];
let nextId = 1;

async function addTerminal(cmd, label) {
  // Generate a session ID — the WebSocket handler auto-creates the PTY.
  const sessionId = `t${nextId++}`;

  const paneId = `pane-${sessionId}`;
  const pane = document.createElement('div');
  pane.className = 'pane';
  pane.id = paneId;
  pane.innerHTML = `
    <div class="pane-header">
      <span class="label">${label || `terminal ${terminals.length + 1}`}</span>
      <span class="dot disconnected" id="dot-${sessionId}"></span>
      <span class="status" id="status-${sessionId}">connecting...</span>
      <button class="secondary" onclick="destroyTerminal('${sessionId}')" style="font-size:0.65rem;padding:2px 8px;">✖</button>
    </div>
    <div class="terminal-wrap" id="term-${sessionId}"></div>
  `;
  document.getElementById('grid').appendChild(pane);

  const term = new Terminal({
    theme, fontFamily: "'Geist Mono','SF Mono','Menlo',monospace",
    fontSize: 12, lineHeight: 1.3, cursorBlink: true, cursorStyle: 'bar',
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById(`term-${sessionId}`));
  fitAddon.fit();

  // WebSocket connection
  const ws = new WebSocket(`${WS_BASE}/ws/terminal/${sessionId}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    document.getElementById(`dot-${sessionId}`).className = 'dot connected';
    document.getElementById(`status-${sessionId}`).textContent = 'connected';
  };
  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      if (!entry._muted) term.write(new Uint8Array(e.data));
    } else {
      if (!entry._muted) term.write(e.data);
    }
  };
  ws.onclose = () => {
    document.getElementById(`dot-${sessionId}`).className = 'dot disconnected';
    document.getElementById(`status-${sessionId}`).textContent = 'disconnected';
  };

  // Forward keystrokes to server
  term.onData(data => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(data);
    }
  });

  // Send resize events to server so PTY columns match xterm.js
  term.onResize(({ cols, rows }) => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    }
  });

  // Also send initial size once connected
  ws.addEventListener('open', () => {
    const dims = fitAddon.proposeDimensions();
    if (dims) {
      ws.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
    }
  }, { once: true });

  // Handle container resize
  const resizeObserver = new ResizeObserver(() => {
    fitAddon.fit();
  });
  resizeObserver.observe(document.getElementById(`term-${sessionId}`));

  const entry = { sessionId, term, ws, fitAddon, resizeObserver, paneId, _muted: false };
  terminals.push(entry);
  updateLayout();
  updateStatus();

  return entry;
}

function destroyTerminal(sessionId) {
  const idx = terminals.findIndex(t => t.sessionId === sessionId);
  if (idx === -1) return;
  const entry = terminals[idx];
  entry.ws.close();
  entry.term.dispose();
  entry.resizeObserver.disconnect();
  document.getElementById(entry.paneId)?.remove();
  terminals.splice(idx, 1);
  // Tell server to clean up
  fetch(`${SERVE_URL}/api/terminal/sessions/${sessionId}`, { method: 'DELETE' }).catch(() => {});
  updateLayout();
  updateStatus();
}

function destroyAll() {
  while (terminals.length > 0) {
    destroyTerminal(terminals[0].sessionId);
  }
}

function setLayout(cols) {
  const grid = document.getElementById('grid');
  grid.className = `grid cols-${cols}`;
  terminals.forEach(t => setTimeout(() => t.fitAddon.fit(), 100));
}

function updateLayout() {
  const n = terminals.length;
  if (n <= 1) setLayout(1);
  else if (n <= 2) setLayout(2);
  else if (n <= 3) setLayout(3);
  else setLayout(4);
}

function updateStatus() {
  document.getElementById('sb-sessions').textContent = `${terminals.length} session${terminals.length === 1 ? '' : 's'}`;
}

// ── Command execution infrastructure ─────────────────────────
// Each terminal entry gets an output buffer for prompt detection.

const PROMPT_RE = /[❯\$>]\s*$/;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function waitForOpen(ws, timeout = 5000) {
  return new Promise((resolve, reject) => {
    if (ws.readyState === WebSocket.OPEN) { resolve(); return; }
    const t = setTimeout(() => reject(new Error('ws timeout')), timeout);
    ws.addEventListener('open', () => { clearTimeout(t); resolve(); }, { once: true });
  });
}

// Type a command character by character, then press Enter.
async function typeCommand(entry, cmd, charDelay = 20) {
  await waitForOpen(entry.ws);
  for (const ch of cmd) {
    if (entry.ws.readyState !== WebSocket.OPEN) return;
    entry.ws.send(ch);
    await sleep(charDelay + Math.random() * 10);
  }
  await sleep(100);
  if (entry.ws.readyState === WebSocket.OPEN) entry.ws.send('\r');
}

// Wait until the terminal shows a shell prompt (command complete).
async function waitForPrompt(entry, timeoutMs = 60000) {
  entry._outBuf = '';
  const start = Date.now();
  while (Date.now() - start < timeoutMs) {
    await sleep(300);
    if (PROMPT_RE.test(entry._outBuf || '')) return true;
  }
  return false;
}

// Type a command and wait for the shell prompt to return.
async function runCommand(entry, cmd, timeoutMs = 60000) {
  await typeCommand(entry, cmd);
  return await waitForPrompt(entry, timeoutMs);
}

// Resolve the roko binary path inside a PTY shell.
// Mutes terminal rendering and suppresses shell echo so the probe is invisible.
async function resolveRokoPath(entry) {
  entry._muted = true;
  entry._outBuf = '';
  await typeCommand(entry, 'stty -echo 2>/dev/null; command -v roko >/dev/null 2>&1 && echo __OK__ || echo __MISS__; stty echo 2>/dev/null');
  await waitForPrompt(entry, 5000);
  if ((entry._outBuf || '').includes('__OK__')) { entry._muted = false; return 'roko'; }

  // Try local builds
  for (const p of ['./target/release/roko', './target/debug/roko']) {
    entry._outBuf = '';
    await typeCommand(entry, `stty -echo 2>/dev/null; test -x ${p} && echo __OK__ || echo __MISS__; stty echo 2>/dev/null`);
    await waitForPrompt(entry, 3000);
    if ((entry._outBuf || '').includes('__OK__')) { entry._muted = false; return p; }
  }
  entry._muted = false;
  return 'roko';  // hope for the best
}

// ── Demo definitions ─────────────────────────────────────────
// Commands use `$R` which is resolved per-terminal at runtime.
// Each command runs only after the previous one completes.

function makeDemos(R, DIR) {
  return [
    {
      label: 'self-hosting workflow',
      commands: [
        `rm -rf ${DIR} && mkdir -p ${DIR} && cd ${DIR} && ${R} init`,
        `cd ${DIR} && ${R} prd idea "Wire SystemPromptBuilder into orchestrate.rs"`,
        `cd ${DIR} && ${R} status`,
      ],
    },
    {
      label: 'benchmark comparison',
      commands: [
        `rm -rf ${DIR} && mkdir -p ${DIR} && cd ${DIR} && ${R} init && ${R} bench demo`,
      ],
    },
    {
      label: 'agent chat',
      commands: [
        `rm -rf ${DIR} && mkdir -p ${DIR} && cd ${DIR} && ${R} init && ${R} agent list`,
        `cd ${DIR} && ${R} status --cfactor`,
      ],
    },
    {
      label: 'knowledge + replay',
      commands: [
        `rm -rf ${DIR} && mkdir -p ${DIR} && cd ${DIR} && ${R} init && ${R} learn efficiency`,
        `cd ${DIR} && ${R} learn all`,
      ],
    },
  ];
}

let demoPaused = false;
let demoRunning = false;

async function runAllDemos() {
  if (demoRunning) {
    // Toggle pause
    demoPaused = !demoPaused;
    document.getElementById('btn-demo').textContent = demoPaused ? 'Resume' : 'Pause';
    return;
  }

  demoRunning = true;
  demoPaused = false;
  document.getElementById('btn-demo').textContent = 'Pause';
  destroyAll();
  await sleep(300);

  // Create one terminal per demo (placeholder labels, demos resolved later)
  const labels = ['self-hosting workflow', 'benchmark comparison', 'agent chat', 'knowledge + replay'];
  const entries = [];
  for (const label of labels) {
    const entry = await addTerminal(null, label);
    entry._outBuf = '';
    // Hook output buffer for prompt detection
    const origOnMsg = entry.ws.onmessage;
    entry.ws.onmessage = (e) => {
      if (origOnMsg) origOnMsg(e);
      if (e.data instanceof ArrayBuffer) {
        entry._outBuf += new TextDecoder().decode(e.data);
      } else if (typeof e.data === 'string') {
        entry._outBuf += e.data;
      }
      // Keep bounded
      if (entry._outBuf.length > 2048) entry._outBuf = entry._outBuf.slice(-1024);
    };
    entries.push(entry);
    await sleep(400);
  }

  // Wait for shells to start
  await sleep(2000);

  // Resolve roko path from first terminal
  const rokoPath = await resolveRokoPath(entries[0]);
  const demos = makeDemos(rokoPath, '/tmp/roko-demo');

  // Run each demo panel in parallel, commands sequential within each
  const promises = entries.map(async (entry, i) => {
    const demo = demos[i];
    if (!demo) return;

    try { await waitForOpen(entry.ws); } catch(e) { return; }
    await waitForPrompt(entry, 5000);

    for (const cmd of demo.commands) {
      // Check for pause
      while (demoPaused) await sleep(500);
      if (!demoRunning) return;

      const timeout = cmd.includes('bench') ? 30000 : 15000;
      await runCommand(entry, cmd, timeout);
    }
  });

  await Promise.all(promises);
  demoRunning = false;
  demoPaused = false;
  document.getElementById('btn-demo').textContent = 'Run All Demos';
}

// Check server health on load
fetch(`${SERVE_URL}/health`)
  .then(r => r.json())
  .then(() => {
    document.getElementById('sb-server').textContent = `server: ${SERVE_URL}`;
  })
  .catch(() => {
    document.getElementById('sb-server').textContent = 'server: not reachable — start with: roko serve';
  });
</script>
</body>
</html>
