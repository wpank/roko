schema_version = 1
name = "consortium"

[deploy]
sender_wallet = "deployer"

  [[deploy.contracts]]
  name = "MockERC20"
  args = [
    { type = "string", value = "DAEJI" },
    { type = "string", value = "DAEJI" },
    { type = "uint8",  value = 18 },
  ]

  [[deploy.contracts]]
  name = "WorkerRegistry"
  args = [
    { type = "address", value = "$contract(MockERC20)" },
  ]

  [[deploy.contracts]]
  name = "BountyMarket"
  args = [
    { type = "address", value = "$contract(MockERC20)" },
    { type = "address", value = "$contract(WorkerRegistry)" },
  ]

  [[deploy.contracts]]
  name = "ConsortiumValidator"
  args = [
    { type = "address", value = "$contract(WorkerRegistry)" },
    { type = "address", value = "$contract(BountyMarket)" },
  ]

[[fixtures]]
name = "authorize-market"
kind = "contract-call"
contract = "WorkerRegistry"
method = "setAuthorized(address,bool)"
from = "deployer"
args = ["$contract(BountyMarket)", true]

[[fixtures]]
name = "authorize-consortium"
kind = "contract-call"
contract = "WorkerRegistry"
method = "setAuthorized(address,bool)"
from = "deployer"
args = ["$contract(ConsortiumValidator)", true]

[[fixtures]]
name = "delegate-resolver-to-consortium"
kind = "contract-call"
contract = "BountyMarket"
method = "setResolver(address)"
from = "deployer"
args = ["$contract(ConsortiumValidator)"]

[[agents]]
role = "validator"
wallet = "validator{i}"
prompt_template = "prompts/validator.md"
count = 3
scripted_actions = ["consortium_vote_loop"]
llm_slots = ["approve", "reason"]

[success]
max_duration_secs = 180
expected_events = [
  { contract = "ConsortiumValidator", event = "Tallied", min_count = 1 },
]
