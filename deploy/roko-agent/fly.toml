app = "roko-agent"
primary_region = "iad"

[build]
  image = "ghcr.io/nunchi-trade/roko-worker:latest"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  path = "/health"
  method = "GET"

[env]
  RUST_LOG = "info"
