# docker-compose.yml for the roko stack (§42.4).
#
# Services:
#   mirage     — in-process EVM fork simulator (JSON-RPC :8545, metrics :9091)
#   roko       — roko CLI, depends on mirage
#   gateway    — roko-gateway (placeholder, see gateway.Dockerfile TODO)
#   prometheus — scrapes mirage + roko + gateway + itself
#   grafana    — dashboards on top of prometheus
#
# Build context for all Rust services is the `roko/` workspace root (../).
# Run from roko/docker: `docker compose up --build`.

name: roko

networks:
  roko-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  demo-runtime:

services:
  mirage:
    build:
      context: ..
      dockerfile: docker/mirage.Dockerfile
    image: ghcr.io/wpank/roko-mirage:dev
    container_name: roko-mirage
    networks:
      - roko-net
    ports:
      - "8545:8545"
      - "9091:9091"
    environment:
      RUST_LOG: "info,mirage_rs=debug"
    # eth_blockNumber RPC healthcheck — gates other services' readiness.
    healthcheck:
      test:
        - "CMD"
        - "/usr/local/bin/mirage-rs"
        - "healthcheck"
        - "--url"
        - "http://127.0.0.1:8545"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  roko:
    build:
      context: ..
      dockerfile: docker/roko.Dockerfile
    image: ghcr.io/wpank/roko-roko:dev
    container_name: roko-cli
    networks:
      - roko-net
    depends_on:
      mirage:
        condition: service_started
    environment:
      RUST_LOG: "info,roko=debug"
      ROKO_MIRAGE_URL: "http://mirage:8545"
    # roko is a CLI; keep the container alive with a long-running entrypoint
    # so operators can `docker compose exec roko roko <subcommand>`.
    entrypoint: ["/usr/local/bin/roko"]
    command: ["serve", "--listen", "0.0.0.0:9092"]
    ports:
      - "9092:9092"
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: docker/gateway.Dockerfile
    image: ghcr.io/wpank/roko-gateway:dev
    container_name: roko-gateway
    networks:
      - roko-net
    depends_on:
      mirage:
        condition: service_started
    environment:
      RUST_LOG: "info"
      ROKO_MIRAGE_URL: "http://mirage:8545"
    ports:
      - "8080:8080"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: roko-prometheus
    networks:
      - roko-net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: roko-grafana
    networks:
      - roko-net
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---- Demo profile: deploys contracts, runs a scenario, then exits. -------
  # Bring the whole thing up with:
  #   SCENARIO=job-board docker compose --profile demo up --build \
  #     --exit-code-from roko-demo
  # Valid SCENARIO values: job-board, consortium, defi-routing, flywheel.
  roko-demo:
    profiles: ["demo"]
    build:
      context: ..
      dockerfile: docker/demo.Dockerfile
    image: ghcr.io/wpank/roko-demo:dev
    container_name: roko-demo
    depends_on:
      mirage:
        condition: service_healthy
    networks:
      - roko-net
    environment:
      RUST_LOG: "info,roko_demo=debug"
      ROKO_MIRAGE_URL: "http://mirage:8545"
      SCENARIO: "${SCENARIO:-job-board}"
    volumes:
      - demo-runtime:/app/demo/.runtime
    # `up` deploys contracts + runs fixtures + executes the scripted spine,
    # then exits 0. The entrypoint uses the baked-in demo dir.
    command: ["up", "${SCENARIO:-job-board}"]
