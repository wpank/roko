schema_version = 2

[project]
name = "roko-lmstudio"
root = "."
fresh_base_branch = "main"

[agent]
model = "qwen"
effort = "medium"
bare_mode = true
timeout_ms = 300000

[agent.tier_models]
mechanical = "qwen"
focused = "qwen"
integrative = "qwen"
architectural = "qwen"

[prompt]
token_budget = 8000
role = "You are a Roko agent running on a local LM Studio server. Prefer short, practical responses and avoid unnecessary tool chatter."

[gates]
clippy_enabled = true
skip_tests = true
max_iterations = 2

[providers.lmstudio]
kind = "openai_compat"
base_url = "http://localhost:1234/v1"
timeout_ms = 120000

# Replace `slug` with whatever model you loaded in LM Studio
# (see `GET /v1/models` on the LM Studio server).
[models.qwen]
provider = "lmstudio"
slug = "qwen3.6-35b-a3b"
context_window = 128000
max_output = 8192
supports_tools = true
tool_format = "openai_json"
