schema_version = 2

[project]
name = "roko-ollama"
root = "."
fresh_base_branch = "main"

[agent]
model = "llama3-1-8b"
effort = "medium"
bare_mode = true
fallback_model = "glm-5-1"
timeout_ms = 300000

[agent.tier_models]
mechanical = "llama3-1-8b"
focused = "llama3-1-8b"
integrative = "llama3-1-8b"
architectural = "llama3-1-8b"

[prompt]
token_budget = 8000
role = "You are a Roko agent using a local Ollama server. Prefer short, practical responses and avoid unnecessary tool chatter."

[gates]
clippy_enabled = true
skip_tests = true
max_iterations = 2

[providers.ollama]
kind = "openai_compat"
base_url = "http://localhost:11434"
timeout_ms = 120000

[models.llama3-1-8b]
provider = "ollama"
slug = "llama3.1:8b"
context_window = 128000
max_output = 8192
supports_tools = true
tool_format = "openai_json"
