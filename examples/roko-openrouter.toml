schema_version = 2

[project]
name = "roko-openrouter"
root = "."
fresh_base_branch = "main"

[agent]
model = "glm-5-1-or"
effort = "high"
bare_mode = true
fallback_model = "kimi-k2-5-or"
timeout_ms = 300000

[agent.tier_models]
mechanical = "kimi-k2-5-or"
focused = "glm-5-1-or"
integrative = "glm-5-1-or"
architectural = "claude-opus-or"

[prompt]
token_budget = 12000
role = "You are a Roko agent using OpenRouter. Route small tasks to cheap models and reserve premium models for architecture."

[gates]
clippy_enabled = true
skip_tests = false
max_iterations = 3

[providers.openrouter]
kind = "openai_compat"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
timeout_ms = 180000
extra_headers = { "HTTP-Referer" = "https://github.com/nunchi/roko", "X-Title" = "roko-agent" }

[models.glm-5-1-or]
provider = "openrouter"
slug = "z-ai/glm-5.1"
context_window = 200000
max_output = 131072
supports_tools = true
supports_thinking = true
tool_format = "openai_json"
cost_input_per_m = 1.26
cost_output_per_m = 3.96

[models.kimi-k2-5-or]
provider = "openrouter"
slug = "moonshotai/kimi-k2.5"
context_window = 256000
max_output = 65535
supports_tools = true
supports_thinking = true
supports_vision = true
supports_partial = true
tool_format = "openai_json"
cost_input_per_m = 0.38
cost_output_per_m = 1.72

[models.claude-opus-or]
provider = "openrouter"
slug = "anthropic/claude-opus-4-6"
context_window = 200000
max_output = 32768
supports_tools = true
tool_format = "openai_json"
cost_input_per_m = 15.00
cost_output_per_m = 75.00
