app = "roko"
primary_region = "iad"

[build]
  image = "ghcr.io/nunchi-trade/roko:latest"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  path = "/api/health"
  method = "GET"

[[mounts]]
  source = "roko_data"
  destination = "/workspace/.roko"

[env]
  RUST_LOG = "info"
