# ── T1 ──────────────────────────────────────────────────────────────────────
# Wire set_process_group + register_spawned_pid into ExecAgent::run.
#
# ExecAgent currently calls `Command::new` and `cmd.output()` with no process-
# group isolation or PID tracking.  After this task, every ExecAgent spawn:
#   1. Calls `process::set_process_group(&mut cmd)` before spawn.
#   2. After `cmd.spawn()` (switch from `.output()` to manual spawn+wait to
#      get a Child handle), calls `process::register_spawned_pid(child.id())`.
#   3. Calls `process::unregister_pid(pid)` in the finally branch.
#
# NOTE: `cmd.output()` does not expose the Child, so ExecAgent must be
# refactored to use `cmd.spawn()` + `child.wait_with_output()` instead.
[[task]]
id = "T1"
title = "Wire set_process_group and register_spawned_pid into ExecAgent::run"
status = "ready"
files = [
    "crates/roko-agent/src/exec.rs",
]
acceptance = [
    "grep -n 'set_process_group' crates/roko-agent/src/exec.rs returns a match",
    "grep -n 'register_spawned_pid' crates/roko-agent/src/exec.rs returns a match",
    "grep -n 'unregister_pid' crates/roko-agent/src/exec.rs returns a match",
    "grep -n 'spawn()' crates/roko-agent/src/exec.rs returns a match (switched from .output())",
    "cargo test -p roko-agent -- exec 2>&1 | grep -v FAILED | tail -5",
]
depends_on = []

# ── T2 ──────────────────────────────────────────────────────────────────────
# Replace the blunt `tokio::time::timeout(…, cmd.output())` in ExecAgent with
# `kill_tree` escalation on timeout.
#
# Current code: `timeout(duration, cmd.output())` — when it fires, the child
# is dropped (kill_on_drop) but no SIGTERM grace period is given.
#
# After T1, ExecAgent holds a `Child`.  T2 makes the timeout branch call
# `process::kill_tree(&mut child, Duration::from_millis(grace_ms))` instead of
# relying on drop.  The `grace_ms` value should come from a builder method
# `with_kill_grace_ms(u64)` defaulting to `GRACE_SIGTERM_MS` (800 ms).
[[task]]
id = "T2"
title = "Replace blunt timeout drop with kill_tree SIGTERM-then-SIGKILL escalation in ExecAgent"
status = "ready"
files = [
    "crates/roko-agent/src/exec.rs",
]
acceptance = [
    "grep -n 'kill_tree' crates/roko-agent/src/exec.rs returns a match",
    "grep -n 'with_kill_grace_ms\\|kill_grace_ms' crates/roko-agent/src/exec.rs returns a match",
    "grep -n 'GRACE_SIGTERM_MS\\|grace_ms' crates/roko-agent/src/exec.rs returns a match",
    "cargo test -p roko-agent -- exec::tests::exec_timeout_kills_process 2>&1 | grep -E 'ok|FAILED'",
    "cargo test -p roko-agent -- tests::kill_tree 2>&1 | grep -E 'ok|FAILED'",
]
depends_on = ["T1"]

# ── T3 ──────────────────────────────────────────────────────────────────────
# Wire classify_benign_stderr + benign_stderr_warn_once into ExecAgent::run.
#
# ExecAgent currently logs stderr on failure via `first_line(&stderr)`.
# After T3, non-empty stderr lines from successful runs are each passed through
# `process::classify_benign_stderr(line)`.  If classified, the first occurrence
# is surfaced via `process::benign_stderr_warn_once(key)` (which returns true
# once per key), and subsequent ones are silently dropped.  Unclassified lines
# are forwarded to tracing::warn! as before.
[[task]]
id = "T3"
title = "Wire classify_benign_stderr and warn-once suppression into ExecAgent stderr handling"
status = "ready"
files = [
    "crates/roko-agent/src/exec.rs",
]
acceptance = [
    "grep -n 'classify_benign_stderr' crates/roko-agent/src/exec.rs returns a match",
    "grep -n 'benign_stderr_warn_once' crates/roko-agent/src/exec.rs returns a match",
    "cargo test -p roko-agent -- exec::tests::exec_stderr_warning 2>&1 | grep -E 'ok|FAILED'",
    "cargo test -p roko-agent 2>&1 | grep -E '^test result'",
]
depends_on = ["T1"]

