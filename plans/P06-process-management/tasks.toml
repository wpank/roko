# ── T6 ──────────────────────────────────────────────────────────────────────
# Wire orphan reaper startup and GracefulShutdown into CLI main().
#
# In `roko-cli/src/main.rs`, in the `main()` or `dispatch()` function:
#   1. Call `roko_agent::process::cleanup_orphaned_agents()` at startup to kill
#      any PIDs left over from a previous crash.
#   2. Create a `roko_core::shutdown::GracefulShutdown` and register a hook that
#      calls `roko_agent::process::reap_orphaned_children()` on drain.
#   3. Install a SIGTERM handler (use `tokio::signal::unix::signal`) that calls
#      `shutdown.drain()` and then exits with code 0.
