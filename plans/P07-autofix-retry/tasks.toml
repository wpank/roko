# New method signature to implement:
#
#   /// Build a focused prompt asking the agent to fix a specific verify failure.
#   ///
#   /// # Arguments
#   /// * `original_prompt` – the full prompt that was sent for the original task run
#   /// * `failing_phase`   – phase string of the step that failed ("compile", "test", …)
#   /// * `failing_command` – the shell command that failed
#   /// * `error_output`    – captured stdout+stderr (will be truncated to 4000 chars)
#   pub fn build_fix_prompt(
#       &self,
#       original_prompt: &str,
#       failing_phase: &str,
#       failing_command: &str,
#       error_output: &str,
#   ) -> String
#
# The method body must:
#   1. Truncate error_output to 4000 chars.
#   2. Produce a prompt with sections:
#      ## Auto-fix request
#      ## Original task
#      <original_prompt (verbatim)>
#      ## Failing verification step
#      Phase: <phase>, Command: `<command>`
#      ## Error output
#      ```
#      <truncated error>
#      ```
#      ## Instructions
#      Fix the code so that `<command>` exits 0. Do not change other behaviour.

