# ═══════════════════════════════════════════════════════════════════════════════
# T1: Add recency_filter field to SearchQuery + rewrite search_batch to single-query
# ═══════════════════════════════════════════════════════════════════════════════
#
# The core bug: search_batch wraps queries in {"queries": [...]} but Perplexity
# expects a flat {"query": "..."} at the top level. There is no batch endpoint.
#
# Steps:
# 1. Add a `recency_filter: Option<String>` field to SearchQuery (line 42-54).
#    It must be `#[serde(skip)]` like date_range since it's converted in query_to_wire.
#
# 2. Add recency_filter handling to query_to_wire (after line 131):
#    ```rust
#    if let Some(ref recency) = q.recency_filter {
#        obj["search_recency_filter"] = json!(recency);
#    }
#    ```
#
# 3. Rewrite `search` method (lines 195-202) to do a DIRECT single-query POST:
#    - Build wire body via query_to_wire (already returns the correct flat object)
#    - Serialize body, POST to endpoint, parse response
#    - Parse response.results as flat Vec<SearchResult> (NOT nested per-query)
#    - Return SearchResponse { query: q.query.clone(), results }
#
# 4. Rewrite `search_batch` (lines 141-188) to loop over queries calling self.search():
#    ```rust
#    pub async fn search_batch(&self, queries: &[SearchQuery]) -> Result<Vec<SearchResponse>, SearchError> {
#        let mut responses = Vec::with_capacity(queries.len());
#        for q in queries {
#            responses.push(self.search_single(q).await?);
#        }
#        Ok(responses)
#    }
#    ```
#
# 5. Remove MAX_BATCH_SIZE const (line 18) and TooManyQueries variant (lines 35-37).
#    The old search() convenience method (lines 195-202) should delegate to search_single.
#
# 6. Update the module doc comment (line 7) to remove "Multi-query bundling" claim.

