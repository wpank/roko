# ═══════════════════════════════════════════════════════════════════════════════
# T2: Fix date format in research.rs from ISO 8601 to MM/DD/YYYY
# ═══════════════════════════════════════════════════════════════════════════════
#
# The SearchQuery date_range is formatted as "2024-01-01" (ISO 8601) but
# Perplexity expects "01/01/2024" (MM/DD/YYYY).
#
# Additionally, the better fix is to use Perplexity's native search_recency_filter
# instead of computing date ranges. The recency_filter field was just added to
# SearchQuery in T1.
