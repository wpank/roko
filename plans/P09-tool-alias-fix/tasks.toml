# ═══════════════════════════════════════════════════════════════════════════════
# T1: Resolve Claude aliases in parse_allowed_tools_csv
# ═══════════════════════════════════════════════════════════════════════════════
#
# The core bug: parse_allowed_tools_csv (line 252) collects tool names as-is
# from the CSV. Callers pass Claude CLI PascalCase names ("Read,Write,Edit")
# but the tool registry uses canonical snake_case names ("read_file","write_file",
# "edit_file"). When the filter runs (line 348), zero tools match.
#
# This breaks ALL research/analyze commands on non-Claude providers (OpenAI,
# Gemini, Ollama) — the agent gets zero tools and becomes text-only.
#
# Steps:
# 1. Add `use roko_core::tool::aliases::canonical_of_claude;` to the imports
#    at the top of openai_compat.rs.
#
# 2. Rewrite parse_allowed_tools_csv (lines 252-260) to resolve each name:
#    ```rust
#    fn parse_allowed_tools_csv(csv: Option<&str>) -> Option<HashSet<String>> {
#        let allowed: HashSet<String> = csv
#            .unwrap_or_default()
#            .split(',')
#            .map(str::trim)
#            .filter(|name| !name.is_empty())
#            .map(|name| {
#                // Resolve Claude CLI aliases ("Read" -> "read_file") to canonical names.
#                // If already canonical or unknown (MCP/plugin tool), pass through as-is.
#                canonical_of_claude(name)
#                    .unwrap_or(name)
#                    .to_string()
#            })
#            .collect();
#        (!allowed.is_empty()).then_some(allowed)
#    }
#    ```
#
# 3. The return type changes from Option<HashSet<&str>> to Option<HashSet<String>>
#    because canonical_of_claude returns &'static str which we .to_string().
#
# 4. Update the filter on lines 341-349 to work with HashSet<String>:
#    ```rust
#    .filter(|tool| {
#        allowed.as_ref().is_none_or(|allowed| allowed.contains(tool.name.as_str()))
#    })
#    ```
#    This should already work since HashSet<String>.contains(&str) works via Borrow.

