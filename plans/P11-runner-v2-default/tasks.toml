# ─────────────────────────────────────────────────────────────────────────────
# T1: Add legacy-runner-v2 to default features in Cargo.toml
# ─────────────────────────────────────────────────────────────────────────────
#
# The `legacy-runner-v2` feature is defined but NOT in `default = []`.
# This means `roko plan run` routes to the Graph Engine (a stub that does
# nothing). We need to add `legacy-runner-v2` to the default feature list
# so that `cargo build` without explicit `--features` gets the working runner.
#
# In crates/roko-cli/Cargo.toml line 15, change:
#   default = []
# To:
#   default = ["legacy-runner-v2"]
#
# That is the ONLY change. Do NOT modify any other line in Cargo.toml.
#
[[task]]
id = "T1"
title = "Acceptance roll-up: retire the legacy-runner-v2 feature facade"
status = "ready"
ownership = "acceptance-roll-up"
superseded_by = "E12-T03"
tier = "mechanical"
model_hint = "claude-haiku-4-5"
max_loc = 5
files = []
role = "quick-reviewer"
depends_on = []
depends_on_plan = ["E12-DEAD-CODE-CLEANUP"]
acceptance = [
    "The legacy-runner-v2 feature is absent from Cargo.toml and all formerly gated runner tests compile unconditionally; adding the retired feature back is forbidden.",
]

[task.context]
read_files = [
    { path = "tmp/status-quo/backlog/plans/E12-DEAD-CODE-CLEANUP/tasks.toml", why = "Canonical implementation owner and acceptance contract" },
]
symbols = [
    "E12-T03 \u2014 canonical implementation owner",
]
anti_patterns = [
    "Do not add a second implementation or public API for this outcome; review the named owner.",
    "Do not accept this roll-up before every scheduler dependency is complete and its integrated acceptance is green.",
]

[[task.verify]]
