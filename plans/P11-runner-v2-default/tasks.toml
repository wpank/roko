# ─────────────────────────────────────────────────────────────────────────────
# T1: Add legacy-runner-v2 to default features in Cargo.toml
# ─────────────────────────────────────────────────────────────────────────────
#
# The `legacy-runner-v2` feature is defined but NOT in `default = []`.
# This means `roko plan run` routes to the Graph Engine (a stub that does
# nothing). We need to add `legacy-runner-v2` to the default feature list
# so that `cargo build` without explicit `--features` gets the working runner.
#
# In crates/roko-cli/Cargo.toml line 15, change:
#   default = []
# To:
#   default = ["legacy-runner-v2"]
#
# That is the ONLY change. Do NOT modify any other line in Cargo.toml.
#
[[task]]
id = "T1"
title = "Add legacy-runner-v2 to default features"
status = "ready"
tier = "mechanical"
model_hint = "claude-haiku-4-5"
max_loc = 5
files = ["crates/roko-cli/Cargo.toml"]
role = "implementer"
depends_on = []

[task.context]
read_files = [
    { path = "crates/roko-cli/Cargo.toml", lines = "13-25", why = "Feature definitions — need to change default = [] to include legacy-runner-v2" },
]
symbols = []
anti_patterns = [
    "Do NOT remove the legacy-runner-v2 feature definition on line 24. Only modify the default = [] line.",
    "Do NOT add any other features to the default list. Only add legacy-runner-v2.",
    "Do NOT modify the legacy-orchestrate or legacy-direct-dispatch features.",
]

[[task.verify]]
phase = "structural"
command = "grep -q 'default = \\[\"legacy-runner-v2\"\\]' crates/roko-cli/Cargo.toml"
fail_msg = "default features must include legacy-runner-v2"

[[task.verify]]
phase = "compile"
command = "cargo check -p roko-cli 2>&1"
fail_msg = "roko-cli must compile with default features"


