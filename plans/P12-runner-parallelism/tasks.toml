# ─────────────────────────────────────────────────────────────────────────────
# T4: Update RunState to track multiple concurrent agents
# ─────────────────────────────────────────────────────────────────────────────
#
# RunState stores single-agent state: plan_id, current_task, agent_output,
# tokens_in/out, cost_usd, etc. With multiple agents running concurrently,
# the event loop currently routes ALL agent events through the same RunState
# fields — which means events from agent A overwrite agent B's state.
#
# The minimal fix: when an agent event arrives in Branch 1 (line ~720), use
# the event's plan_id and task_id to update the correct agent's state. Since
# agent events already carry plan_id/task_id, the key change is in how
# RunState accumulates output. We do NOT need to track per-agent state in
# RunState — instead, the event loop should use the agent event's own
# plan/task identifiers rather than relying on state.plan_id/current_task.
#
# This task specifically ensures:
# 1. agent_output accumulation is keyed by (plan_id, task_id), not just
#    overwriting a single string.
# 2. When a gate completion or task completion is processed, the correct
#    agent's output is retrieved by (plan_id, task_id).
#
# Add to RunState (state.rs):
#   /// Per-task agent output accumulation for parallel dispatch.
#   pub task_outputs: HashMap<String, String>,  // key = "plan_id:task_id"
#
# Helper methods:
#   pub fn task_output_key(plan_id: &str, task_id: &str) -> String {
#       format!("{plan_id}:{task_id}")
#   }
#   pub fn append_task_output(&mut self, plan_id: &str, task_id: &str, text: &str) {
#       let key = Self::task_output_key(plan_id, task_id);
#       self.task_outputs.entry(key).or_default().push_str(text);
#   }
#   pub fn take_task_output(&mut self, plan_id: &str, task_id: &str) -> String {
#       let key = Self::task_output_key(plan_id, task_id);
#       self.task_outputs.remove(&key).unwrap_or_default()
#   }
#
# For now, keep the existing agent_output field as a fallback — existing code
# that reads state.agent_output continues to work for the sequential case.
# The parallel paths will use task_outputs.
#
[[task]]
id = "T4"
title = "Add per-task output tracking to RunState"
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-5"
