# roko.toml runner.max_concurrent_tasks, or executor config — but NEVER reads
# meta.max_parallel from the loaded plans' tasks.toml.
#
# After plans are loaded (line 440: load_plans), iterate over plans and take
# the maximum max_parallel value. If any plan declares max_parallel > 1, use
# that as a floor for max_concurrent_tasks (unless --max-tasks was explicit).
#
# In plan.rs, between the load_plans call (line 440) and the RunConfig
# construction (line 520), add:
#
#   // Honor tasks.toml max_parallel as a floor for concurrency
#   let plan_max_parallel = plans
#       .iter()
#       .map(|p| p.tasks.meta.max_parallel as usize)
#       .max()
#       .unwrap_or(1);
#   if plan_max_parallel > max_concurrent_tasks && max_tasks == 0 {
#       eprintln!(
#           "▸ Increasing max_concurrent_tasks from {max_concurrent_tasks} to \
#            {plan_max_parallel} (from plan meta.max_parallel)"
#       );
#       max_concurrent_tasks = plan_max_parallel;
#   }
#
# This requires making max_concurrent_tasks mutable (add `let mut` at line 371).
#
