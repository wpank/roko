[meta]
plan = "P12-runner-parallelism"
total = 5
done = 0
status = "ready"
max_parallel = 1

# ─────────────────────────────────────────────────────────────────────────────
# T1: Read max_parallel from plan meta and clamp RunConfig.max_concurrent_tasks
# ─────────────────────────────────────────────────────────────────────────────
#
# Currently plan.rs (line 371) sets max_concurrent_tasks from CLI --max-tasks,
# roko.toml runner.max_concurrent_tasks, or executor config — but NEVER reads
# meta.max_parallel from the loaded plans' tasks.toml.
#
# After plans are loaded (line 440: load_plans), iterate over plans and take
# the maximum max_parallel value. If any plan declares max_parallel > 1, use
# that as a floor for max_concurrent_tasks (unless --max-tasks was explicit).
#
# In plan.rs, between the load_plans call (line 440) and the RunConfig
# construction (line 520), add:
#
#   // Honor tasks.toml max_parallel as a floor for concurrency
#   let plan_max_parallel = plans
#       .iter()
#       .map(|p| p.tasks.meta.max_parallel as usize)
#       .max()
#       .unwrap_or(1);
#   if plan_max_parallel > max_concurrent_tasks && max_tasks == 0 {
#       eprintln!(
#           "▸ Increasing max_concurrent_tasks from {max_concurrent_tasks} to \
#            {plan_max_parallel} (from plan meta.max_parallel)"
#       );
#       max_concurrent_tasks = plan_max_parallel;
#   }
#
# This requires making max_concurrent_tasks mutable (add `let mut` at line 371).
#
[[task]]
id = "T1"
title = "Acceptance roll-up: enforce effective per-plan concurrency"
status = "ready"
ownership = "acceptance-roll-up"
superseded_by = "SH02-T01 + E01-T05"
tier = "focused"
model_hint = "claude-sonnet-4-5"
max_loc = 20
files = []
role = "quick-reviewer"
depends_on = []
depends_on_plan = ["SH02-isolation-recovery", "E01-execution-engine"]
acceptance = [
    "Effective task capacity is bounded by both global capacity and plan.max_parallel, explicit operator limits are not silently raised, and capacity spans preflight through commit.",
]

[task.context]
read_files = [
    { path = "tmp/status-quo/self-heal/plans/SH02-isolation-recovery/tasks.toml", why = "Canonical implementation owner and acceptance contract" },
    { path = "tmp/status-quo/backlog/plans/E01-execution-engine/tasks.toml", why = "Canonical implementation owner and acceptance contract" },
]
symbols = [
    "SH02-T01 \u2014 canonical implementation owner",
    "E01-T05 \u2014 canonical implementation owner",
]
