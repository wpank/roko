    { path = "crates/roko-agent/src/tool_loop/mod.rs", lines = "178-196", why = "LlmError enum — Provider(ProviderError) is the retryable variant" },
]
symbols = [
    "OpenAiCompatLlmBackend::send_turn — async fn(&self, messages: &[Value], tools: &RenderedTools, session: &SessionState) -> Result<BackendResponse, LlmError>",
    "HttpPostError { status: Option<u16>, message: String }",
    "ProviderError::RateLimit { retry_after_ms: Option<u64> }",
    "ProviderError::ServerError(u16)",
    "LlmError::Provider(ProviderError)",
    "LlmError::Network(String)",
]
anti_patterns = [
    "Do NOT use the classify_error method on OpenAiCompatAdapter — it lives on the ProviderAdapter trait, not the LlmBackend. Build the ProviderError directly from the HttpPostError.status field.",
