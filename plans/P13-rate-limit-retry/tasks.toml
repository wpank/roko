# ─────────────────────────────────────────────────────────────────────
# T1: Classify HTTP errors in the non-streaming send_turn path
# ─────────────────────────────────────────────────────────────────────
#
# The `send_turn` method in `OpenAiCompatLlmBackend` (line 442) uses
# `HttpPoster::post_json` which returns `Err(HttpPostError { status, message })`
# on non-2xx responses.  The current `.map_err(|e| LlmError::Network(...))`
# at line 460 throws away the status code.  The retry loop in `ToolLoop`
# (line 1272-1293 of tool_loop/mod.rs) only retries on
# `LlmError::Provider(ref error)` — so 429/5xx errors are never retried.
#
# Fix: Before calling `.map_err`, inspect `HttpPostError.status`.
# - 429 → LlmError::Provider(ProviderError::RateLimit { retry_after_ms: None })
# - 500..=599 → LlmError::Provider(ProviderError::ServerError(status))
# - everything else → LlmError::Network (existing behavior)
#
# The `HttpPostError.status` field is `Option<u16>` — `None` means
# transport-level failure (no HTTP response), `Some(code)` means an HTTP
# error.  Parse the response body as JSON to extract `retry_after` when
# present.

[[task]]
id = "T1"
title = "Classify HTTP errors in send_turn (non-streaming path)"
status = "ready"
tier = "mechanical"
model_hint = "claude-haiku-4-5"
max_loc = 25
files = ["crates/roko-agent/src/openai_compat_backend.rs"]
role = "implementer"
depends_on = []

