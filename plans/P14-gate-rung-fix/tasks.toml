# ─────────────────────────────────────────────────────────────────────
# T1: Push gate steps for advanced rungs when enable_advanced_rungs is true
# ─────────────────────────────────────────────────────────────────────
#
# In `selected_gate_steps` (orchestrate.rs, line 17897), the match arm
# for Symbol | PropertyTest | Integration at lines 17965-17980 has a bug:
#
#   Rung::Symbol | Rung::PropertyTest | Rung::Integration => {
#       if !gate_config.enable_advanced_rungs {
#           skipped_count += 1;             // correct: skip when disabled
#       } else {
#           tracing::debug!("advanced rung enabled via config");
#           skipped_count += 1;             // BUG: skip even when enabled!
#       }
#   }
#
# Both branches increment skipped_count and neither pushes a gate step.
# When `enable_advanced_rungs = true`, the else branch should construct
# concrete gate instances and push them onto `steps`.
#
# The concrete gates are:
# - Rung::Symbol → SymbolGate::new(source_roots) where source_roots
#   comes from the exec_dir (e.g. [exec_dir.join("src"), exec_dir.join("crates")])
# - Rung::PropertyTest → PropertyTestGate::new(build_system)
# - Rung::Integration → IntegrationGate::build_test(build_system, "integration")
#
# These types are already defined in roko-gate and just need to be imported
# and instantiated.

[[task]]
id = "T1"
title = "Push concrete gate steps for advanced rungs when enabled"
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-20250514"
max_loc = 40
files = ["crates/roko-cli/src/orchestrate.rs"]
role = "implementer"
depends_on = []

[task.context]
read_files = [
    { path = "crates/roko-cli/src/orchestrate.rs", lines = "17897-17997", why = "selected_gate_steps — the buggy match arm at 17965-17980" },
    { path = "crates/roko-cli/src/orchestrate.rs", lines = "84-101", why = "Existing roko_gate imports — need to add SymbolGate, PropertyTestGate, IntegrationGate" },
    { path = "crates/roko-gate/src/symbol_gate.rs", lines = "177-199", why = "SymbolGate::new(source_roots: Vec<PathBuf>) constructor" },
    { path = "crates/roko-gate/src/property_test_gate.rs", lines = "50-100", why = "PropertyTestGate::new(build_system: BuildSystem) constructor" },
    { path = "crates/roko-gate/src/integration_gate.rs", lines = "143-182", why = "IntegrationGate::build_test(build: BuildSystem, pattern) constructor" },
    { path = "crates/roko-gate/src/rung_dispatch.rs", lines = "182-202", why = "Reference: how rung_dispatch constructs gates for these rungs" },
]
symbols = [
    "Orchestrator::selected_gate_steps — fn(&self, plan_id: &str, exec_dir: &Path) -> GateSelectionPlan",
    "SymbolGate::new(source_roots: Vec<PathBuf>) -> Self",
    "PropertyTestGate::new(build_system: BuildSystem) -> Self",
    "IntegrationGate::build_test(build: BuildSystem, pattern: impl Into<String>) -> Self",
    "GateSelectionPlan { steps: Vec<(Rung, Box<dyn Verify>)>, skipped_count: usize }",
]
anti_patterns = [
    "Do NOT add symbol_gate, property_test_gate, integration_gate to the use roko_gate block as top-level names — import them via their module paths like the existing generated_test_gate import at line 93.",
    "Do NOT remove the `if !gate_config.enable_advanced_rungs` branch — it correctly skips when the config is false. Only fix the `else` branch.",
    "Do NOT skip the rung when the gate is pushed — only increment skipped_count when actually skipping.",
]

