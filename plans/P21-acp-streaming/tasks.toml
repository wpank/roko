# ── T1: Stream non-progress stdout lines immediately in run_slash_command ─────
#
# Currently run_slash_command (bridge_events.rs:3961-4067) accumulates
# non-progress stdout lines into `output: String` (lines 4034-4036) and only
# sends them as a single TokenChunk at line 4067.  The ROKO_PROGRESS lines
# are dispatched as structured events, but everything else is buffered.
#
# Fix: send each non-progress stdout line as a TokenChunk immediately, like
# run_shell_command already does (line 4138).  Keep accumulating into `output`
# only for the "no output" fallback message.

[[task]]
id = "T1"
title = "Stream non-progress stdout lines in run_slash_command"
status = "ready"
tier = "mechanical"
model_hint = "claude-haiku-4-5"
max_loc = 15
files = ["crates/roko-acp/src/bridge_events.rs"]
role = "implementer"
depends_on = []

[task.context]
read_files = [
    { path = "crates/roko-acp/src/bridge_events.rs", lines = "3961-4076", why = "The main select loop in run_slash_command. Lines 4034-4036 buffer non-progress stdout into `output` instead of streaming. Line 4067 sends the buffered output as one TokenChunk." },
    { path = "crates/roko-acp/src/bridge_events.rs", lines = "4123-4164", why = "Reference: run_shell_command already streams each line immediately via TokenChunk at line 4138." },
]
symbols = [
    "run_slash_command — async fn(session_id: &str, raw_input: &str, workdir: &Path, model_key: String, cancel_token: CancelToken, event_sender: mpsc::Sender<CognitiveEvent>, shared_run: SharedWorkflowRun) -> Result<()>",
    "CognitiveEvent::TokenChunk(String) — variant used to stream text to the editor",
]
anti_patterns = [
    "Do NOT remove the `output` accumulator entirely — it is still needed for the `output.is_empty()` fallback at line 4063.",
    "Do NOT change the ROKO_PROGRESS parsing logic (lines 3974-4033) — that already works correctly.",
    "Do NOT touch run_shell_command — it already streams correctly.",
]

