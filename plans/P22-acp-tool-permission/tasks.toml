# ── T2: Add permission gate to AcpBuiltinToolHandler execute path ─────────────
#
# AcpBuiltinToolHandler (bridge_events.rs:2920) calls execute_acp_builtin_tool
# without any permission check.  For destructive tools (write_file, edit_file,
# bash), the handler should check ToolContext.denied_tools or a permission flag
# and return an error if not permitted.
#
# The full request_permission() flow requires a transport reference that the
# handler does not have.  The minimal viable fix: add an `approved_tools` set
# to AcpBuiltinToolHandler that is populated by the caller from the session's
# always_allowed set or a per-command allowlist.

