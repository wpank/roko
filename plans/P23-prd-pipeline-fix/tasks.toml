# ────────────────────────────────────────────────────────────────────
# T1: Give the draft agent read-only tools
# ────────────────────────────────────────────────────────────────────
# The draft-new agent has `allowed_tools: Some("none")` (line 468).
# This means it generates PRDs from thin air without reading the codebase.
# Change to `Some("Read,Grep,Glob")` matching the plan-generation agent
# (prd.rs line 1203) so the draft agent can inspect existing code.

[[task]]
id = "T1"
title = "Give prd draft-new agent read-only codebase tools"
status = "ready"
tier = "mechanical"
model_hint = "claude-haiku-4-5"
max_loc = 5
files = ["crates/roko-cli/src/commands/prd.rs"]
role = "implementer"
depends_on = []

[task.context]
read_files = [
    { path = "crates/roko-cli/src/commands/prd.rs", lines = "459-470", why = "The AgentExecOpts block with allowed_tools: Some(\"none\") that must change" },
    { path = "crates/roko-cli/src/prd.rs", lines = "1194-1204", why = "Reference: plan-generation agent already uses Some(\"Read,Grep,Glob\")" },
    { path = "crates/roko-cli/src/agent_exec.rs", lines = "44-46", why = "allowed_tools field docs: Some(\"none\") disables all, None uses defaults" },
]
symbols = ["AgentExecOpts.allowed_tools — pub allowed_tools: Option<&'a str>"]
anti_patterns = [
    "Do NOT set allowed_tools to None — that uses provider defaults which may include write tools. Use Some(\"Read,Grep,Glob\") for read-only access.",
    "Do NOT add Write or Edit tools — the draft agent should NOT modify files directly, it returns markdown as text output.",
]

[[task.verify]]
phase = "structural"
command = "grep -q 'allowed_tools: Some(\"Read,Grep,Glob\")' crates/roko-cli/src/commands/prd.rs"
fail_msg = "allowed_tools must be changed from Some(\"none\") to Some(\"Read,Grep,Glob\") in draft-new flow"

[[task.verify]]
phase = "structural"
command = "! grep -q 'allowed_tools: Some(\"none\")' crates/roko-cli/src/commands/prd.rs"
fail_msg = "Old allowed_tools: Some(\"none\") must be removed from draft-new flow"

[[task.verify]]
phase = "compile"
command = "cargo check -p roko-cli 2>&1"
fail_msg = "Must compile after changing allowed_tools"

