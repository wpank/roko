[[task.verify]]
phase = "compile"
command = "cargo check -p roko-cli 2>&1"
fail_msg = "Must compile after swapping preference order"

[[task.verify]]
phase = "test"
command = "cargo test -p roko-cli resolve_plans_dir 2>&1"
fail_msg = "resolve_plans_dir tests must pass with updated preference order"

