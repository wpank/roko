# ────────────────────────────────────────────────────────────────────
# T1: Align main.rs resolve_plans_dir with plan.rs plans_dir
# ────────────────────────────────────────────────────────────────────
# Two functions resolve the plans directory with OPPOSITE preferences:
#   - plan.rs:15-22 (plans_dir): prefers ./plans/, falls back to .roko/plans/
#   - main.rs:2860-2881 (resolve_plans_dir): prefers .roko/plans/, falls back to ./plans/
#
# The canonical location is ./plans/ (top-level), which is what plan.rs uses
# and what the actual 11 plan directories live in. Change resolve_plans_dir
# to match plan.rs by preferring ./plans/ first.

[[task]]
id = "T1"
title = "Align resolve_plans_dir in main.rs to prefer top-level plans/"
status = "ready"
tier = "mechanical"
model_hint = "claude-haiku-4-5"
max_loc = 15
files = ["crates/roko-cli/src/main.rs"]
role = "implementer"
depends_on = []

[task.context]
read_files = [
    { path = "crates/roko-cli/src/main.rs", lines = "2857-2881", why = "resolve_plans_dir: prefers .roko/plans/ — must flip to prefer ./plans/" },
    { path = "crates/roko-cli/src/plan.rs", lines = "12-22", why = "plans_dir: the canonical version that prefers ./plans/ — match this" },
    { path = "crates/roko-cli/src/main.rs", lines = "2686-2697", why = "Only call site of resolve_plans_dir — resume flow" },
    { path = "crates/roko-cli/src/main.rs", lines = "3824-3860", why = "Tests for resolve_plans_dir — must update to match new preference order" },
]
symbols = [
    "resolve_plans_dir — fn resolve_plans_dir(workdir: &Path, explicit: Option<&Path>) -> PathBuf",
    "plans_dir — pub fn plans_dir(workdir: &Path) -> PathBuf (in plan.rs)",
]
anti_patterns = [
    "Do NOT delete resolve_plans_dir entirely — it has the explicit-path-wins feature that plans_dir lacks, and has tests.",
    "Do NOT remove the .roko/plans/ fallback — just swap the preference order so ./plans/ is checked first.",
    "Do NOT change plan.rs — it already has the correct order.",
]

# Swap the canonical and fallback variables in resolve_plans_dir:
#   let canonical = workdir.join("plans");        // was .roko/plans
#   let fallback = workdir.join(".roko").join("plans");  // was plans/
# Also update the four unit tests to match the new order.

[[task.verify]]
phase = "structural"
command = "grep -A3 'fn resolve_plans_dir' crates/roko-cli/src/main.rs | grep -q 'let canonical = workdir.join(\"plans\")'"
