# ── T1: Add HDC similarity query to EpisodeLogger ───────────────────────────
#
# Episodes store hdc_fingerprint as base64-encoded strings. The EpisodeLogger
# has read_all/read_all_lossy but no method to find episodes similar to a
# given fingerprint. Add a query_similar method that decodes stored
# fingerprints and ranks by Hamming similarity.

[[task]]
id = "T1"
title = "Add query_similar_episodes method to EpisodeLogger"
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-20250514"
max_loc = 40
files = ["crates/roko-learn/src/episode_logger.rs"]
role = "implementer"
depends_on = []

[task.context]
read_files = [
    { path = "crates/roko-learn/src/episode_logger.rs", lines = "169-268", why = "Episode struct — hdc_fingerprint at line 251 is Option<String> (base64-encoded)" },
    { path = "crates/roko-learn/src/episode_logger.rs", lines = "958-963", why = "EpisodeLogger struct — add the new method on this type" },
    { path = "crates/roko-learn/src/episode_logger.rs", lines = "1064-1080", why = "EpisodeLogger::read_all — reference for how episodes are loaded from JSONL" },
    { path = "crates/roko-learn/src/hdc_fingerprint.rs", lines = "14-18", why = "fingerprint_episode(prompt, outcome) -> HdcVector — computes the vector" },
    { path = "crates/roko-learn/src/hdc_fingerprint.rs", lines = "52-105", why = "decode(encoded: &str) -> Result<HdcVector, String> — decodes base64 fingerprints" },
    { path = "crates/roko-primitives/src/hdc.rs", lines = "83-88", why = "HdcVector::zeros() — for zero check" },
]
symbols = [
    "EpisodeLogger — struct at episode_logger.rs:961",
    "EpisodeLogger::read_all(path: impl AsRef<Path>) -> Result<Vec<Episode>, LoggerError> — at line 1064",
    "Episode::hdc_fingerprint — Option<String> at line 251 (base64-encoded HdcVector)",
    "roko_learn::hdc_fingerprint::decode(encoded: &str) -> Result<HdcVector, String>",
    "HdcVector::similarity(&self, other: &Self) -> f64 — Hamming similarity in [0.0, 1.0]",
]
anti_patterns = [
    "Do NOT load all episodes synchronously — use the existing async read_all_lossy to tolerate corrupt lines.",
    "Do NOT return raw HdcVector in the result — return (Episode, f64) tuples sorted by descending similarity.",
    "Do NOT panic on decode failure — skip episodes with invalid fingerprints silently.",
]

# Add a method `pub async fn query_similar_episodes(path: impl AsRef<Path>,
#   fingerprint: &HdcVector, top_k: usize) -> Result<Vec<(Episode, f64)>, LoggerError>`
# that:
# 1. Calls read_all_lossy to load all episodes
# 2. For each episode with a non-None hdc_fingerprint, decode it
# 3. Compute HdcVector::similarity against the query fingerprint
# 4. Collect into a Vec, sort by similarity descending, truncate to top_k
# 5. Return the scored results

[[task.verify]]
phase = "structural"
command = "grep -q 'fn query_similar_episodes' crates/roko-learn/src/episode_logger.rs"
fail_msg = "EpisodeLogger must have a query_similar_episodes method"

[[task.verify]]
phase = "compile"
command = "cargo check -p roko-learn 2>&1"
fail_msg = "roko-learn must compile after adding query_similar_episodes"

