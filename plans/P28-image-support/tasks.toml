# The Anthropic API provider at crates/roko-agent/src/provider/anthropic_api.rs
# builds the messages array for the Anthropic messages API. Currently it does
# not handle image content blocks — if multi-part content (text + image) is
# passed through from bridge_events, the anthropic_api provider must preserve
# it. The bridge_events already converts ACP Image blocks to the Anthropic
# format (`{"type":"image","source":{"type":"base64",...}}`), so the
# anthropic_api provider just needs to pass the content array through rather
# than converting it back to a string.
