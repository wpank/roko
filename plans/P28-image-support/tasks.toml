# 1. Create a small helper `fn inject_image_parts(msgs: &mut Vec<Value>, prompt: &[ContentBlock], provider_kind: ProviderKind)`.
# 2. Move the image_parts logic from lines 1222-1233 into it.
# 3. Call it from both the `should_resolve_context` path and the pipeline path.

