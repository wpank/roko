# ─────────────────────────────────────────────────────────────────────────────
# T1: Set image capability dynamically based on model vision support
# ─────────────────────────────────────────────────────────────────────────────
# handler.rs currently hardcodes `image: false` in PromptCapabilities during
# the ACP `initialize` response. This blocks Zed from showing the image upload
# button. Fix: look up the default model's `supports_vision` flag from the
# resolved model profile and set the capability accordingly.
#
# The resolved model is available via `resolve_model(roko_config, &model_key)`
# which returns `ResolvedModel` with `profile: Option<ModelProfile>` where
# `ModelProfile.supports_vision: bool`. The `roko_config` is already available
# in the handler via `sessions.roko_config`.
#
# Steps:
# 1. In handler.rs around line 282, get the default model key from
#    `sessions.roko_config.agent.default_model` (it's an Option<String>).
# 2. If a model key exists, call `resolve_model(&sessions.roko_config, &key)`.
# 3. Check `resolved.profile.map_or(false, |p| p.supports_vision)`.
# 4. Set `image:` to that boolean value in the PromptCapabilities struct.
# 5. Keep `audio: false` (no audio support yet).

[[task]]
id = "T1"
title = "Set ACP image capability from model vision support"
status = "ready"
tier = "mechanical"
model_hint = "claude-haiku-4-5"
max_loc = 15
files = ["crates/roko-acp/src/handler.rs"]
role = "implementer"
depends_on = []

[task.context]
read_files = [
    { path = "crates/roko-acp/src/handler.rs", lines = "276-304", why = "initialize handler with hardcoded image: false at line 287" },
    { path = "crates/roko-core/src/agent.rs", lines = "282-358", why = "ResolvedModel struct and resolve_model() for vision lookup" },
    { path = "crates/roko-acp/src/types.rs", lines = "216-229", why = "PromptCapabilities struct definition" },
]
symbols = [
    "resolve_model(config: &RokoConfig, model_key: &str) -> ResolvedModel",
    "ResolvedModel { profile: Option<ModelProfile> }",
    "ModelProfile { supports_vision: bool }",
    "PromptCapabilities { image: bool, audio: bool, embedded_context: bool }",
]
anti_patterns = [
    "Do NOT hardcode `image: true` — it must be dynamic based on model profile.",
    "Do NOT add a new import for roko_core::agent unless it's not already imported — check existing use statements first.",
    "Do NOT change the audio field — leave it as false.",
]

[[task.verify]]
phase = "structural"
command = "grep -q 'supports_vision' crates/roko-acp/src/handler.rs"
fail_msg = "handler.rs must reference supports_vision to set the image capability dynamically"

[[task.verify]]
phase = "structural"
command = "! grep -n 'image: false' crates/roko-acp/src/handler.rs | grep -q 'PromptCapabilities'"
fail_msg = "The hardcoded `image: false` in PromptCapabilities must be replaced with dynamic lookup"

[[task.verify]]
phase = "compile"
command = "cargo check -p roko-acp 2>&1"
fail_msg = "roko-acp must compile cleanly"


