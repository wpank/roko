# ─────────────────────────────────────────────────────────────────────────────
# The message assembly at bridge_events.rs:1220-1233 already calls
# `build_openai_content_parts` and `build_anthropic_content_parts` and replaces
# the last user message content with multi-part when images are present. BUT
# this only runs inside the `if should_resolve_context` branch (line 1215).
# For the pipeline path (when a workflow pipeline handles the prompt), images
# are silently dropped because the `else` branch at line 1235 returns
# `Vec::new()`.
#
# Fix: extract the image-replacement logic into a helper function and also
# apply it in the pipeline dispatch path. The pipeline dispatch path builds
# its own messages at bridge_events.rs around line 1280+, so we need to
# ensure image blocks propagate there too.
