# ─────────────────────────────────────────────────────────────────────────────
# T3: Prevent double plan generation when /develop wraps /do
# ─────────────────────────────────────────────────────────────────────────────
# The feedback doc (16-PRD-DRAFT-BROKEN-AND-REDUNDANT.md) notes that `roko
# develop` runs `cmd_do` with `--plan` forced, and then in interactive mode
# (non-ACP) it calls `cmd_do` TWICE: once as dry-run to preview the plan, and
# then again to execute. This generates the plan twice, wasting an LLM call.
#
# In develop.rs lines 99-115, the interactive mode calls cmd_do with
# `dry_run: true` to show the preview. Then at lines 130-144, it calls cmd_do
# again with `dry_run: false` to execute. The second call regenerates the plan
# from scratch instead of reusing the already-generated one.
#
# Fix: After the preview dry-run, check if the plans directory already has
# valid plans. If so, the second cmd_do call should use `--resume` or skip
# plan generation. The simplest fix is to pass `--skip-generate` (if
# available) or to set the `continue` flag so cmd_do reuses existing plans.
#
# Alternatively, check if `plans_dir` already contains a valid `tasks.toml`
# after the preview run, and if so, call `run_plan_execution` directly
# instead of going through `cmd_do` a second time.

[[task]]
id = "T3"
title = "Skip re-generation in develop interactive mode when plan exists"
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-6"
max_loc = 25
files = ["crates/roko-cli/src/commands/develop.rs"]
role = "implementer"
depends_on = ["T2"]

[task.context]
read_files = [
    { path = "crates/roko-cli/src/commands/develop.rs", lines = "95-151", why = "Interactive mode: preview dry-run then re-execute — double generation" },
    { path = "crates/roko-cli/src/commands/develop.rs", lines = "117-126", why = "Plans dir check + approval screen" },
]
symbols = [
    "pub(crate) async fn cmd_develop(cli, workdir, prompt_args, dry_run, yes, continue_work, provider) -> Result<i32>",
    "fn show_plan_approval(plans: &[plan_loader::Plan]) -> bool",
    "plan_loader::load_plans(plans_dir: &Path) -> Result<Vec<Plan>>",
]
anti_patterns = [
    "Do NOT remove the dry-run preview call — the user still needs to see the plan before approving.",
    "Do NOT break the --yes path — that path already works correctly (single cmd_do call).",
    "Do NOT change cmd_do itself — the fix should be in develop.rs only.",
]

