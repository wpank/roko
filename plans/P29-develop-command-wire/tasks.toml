# ─────────────────────────────────────────────────────────────────────────────
# T1: Register /develop as ACP slash command definition
# ─────────────────────────────────────────────────────────────────────────────
# The `roko develop` CLI command exists and works (develop.rs is fully wired),
# but it is NOT registered as an ACP slash command. This means users in Zed
# cannot type `/develop "implement X"` — they must use `/do` instead, which
# lacks the plan-approval workflow.
#
# Add a `slash_command("develop", ...)` entry to `build_slash_commands()` in
# session.rs. Place it right after the "do" slash command (line 1614-1619)
# since they are in the same category.
#
# Also add "develop" to the test at line 2368 `slash_commands_include_new_commands`.

[[task]]
id = "T1"
title = "Acceptance roll-up: P10 owns develop registration"
status = "ready"
ownership = "acceptance-roll-up"
superseded_by = "P10-slash-command-flags#T3"
tier = "mechanical"
model_hint = "claude-haiku-4-5"
max_loc = 15
