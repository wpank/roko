    { path = "crates/roko-cli/src/doctor.rs", lines = "173-210", why = "run_doctor() function — list of checks to extend" },
    { path = "crates/roko-cli/src/doctor.rs", lines = "720-746", why = "check_anthropic_api_key() — template for new checks" },
]
symbols = [
    "pub async fn run_doctor(options: &DoctorOptions) -> Result<DoctorReport>",
