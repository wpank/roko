# ─────────────────────────────────────────────────────────────────────────────
# T1: Add OpenAI and Gemini API key checks to roko doctor
# ─────────────────────────────────────────────────────────────────────────────
# Currently `run_doctor` only checks `ANTHROPIC_API_KEY` (line 186). There is
# no check for `OPENAI_API_KEY` or `GEMINI_API_KEY`. The `check_provider_usable`
# check (line 187) does a composite test via `detect_auth_from_config`, but
# it only reports a single pass/fail — it doesn't tell the user which specific
# keys are or aren't set.
#
# Add `check_openai_api_key()` and `check_gemini_api_key()` functions, modeled
# identically on `check_anthropic_api_key()` (lines 720-746). Each returns a
# DoctorCheck with status Warn (not Fail) when the key is missing, since no
# single provider is mandatory.
#
# Insert the new checks into `run_doctor()` right after `check_anthropic_api_key()`
# at line 186.

