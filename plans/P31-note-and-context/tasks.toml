# ---------------------------------------------------------------------------
# T1 — Add plan prompt shorthand: `roko plan "add cursor support"`
#
# When `roko plan` is invoked with positional text that does not match any
# known subcommand (list, show, run, validate, generate, regenerate), treat
# it as a plan generation prompt and delegate to PlanCmd::Generate.
# ---------------------------------------------------------------------------
[[task]]
id = "T1"
title = "Route unrecognized `roko plan` args to plan generate"
description = """
In crates/roko-cli/src/main.rs, add a clap `external_subcommand` (or a
fallback `String` variant) to PlanCmd so that unrecognized positional args
like `roko plan "add cursor support"` route to the Generate branch.

Implementation:
1. Add `#[command(external_subcommand)]` variant `Shorthand(Vec<String>)` to
   PlanCmd at line ~1398 (after Regenerate).
2. In crates/roko-cli/src/commands/plan.rs cmd_plan(), add a match arm:
     PlanCmd::Shorthand(words) => {
         // Delegate to Generate with the words as `source`, no from_file, no context
         cmd_plan(cli, PlanCmd::Generate {
             source: words, from_file: None, context: vec![],
         }).await
     }
3. After generation, print: "Next: roko plan run .roko/plans/<slug>/"

This enables the shorthand without breaking any existing subcommands.
"""
