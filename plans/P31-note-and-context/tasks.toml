# ---------------------------------------------------------------------------
# T2 — Create note_cluster.rs with simple word-overlap clustering
#
# Implements the clustering engine for plan --from-notes.
# Groups notes by shared significant words (excluding stop words).
# ---------------------------------------------------------------------------
[[task]]
id = "T2"
title = "Create note_cluster module with word-overlap clustering"
description = """
Create crates/roko-cli/src/note_cluster.rs implementing note clustering:

1. Define NoteEntry { path: PathBuf, text: String, tags: Vec<String> }.
2. Define NoteCluster { notes: Vec<NoteEntry>, theme: String }.
3. Implement `pub fn load_notes(notes_dir: &Path, tag_filter: Option<&str>) -> Vec<NoteEntry>`:
   - Read all .md files from notes_dir
   - Parse tags from the `**Tags:** ...` line (if present)
   - If tag_filter is Some, only include notes with matching tag
   - Return sorted by filename (chronological)

4. Implement `pub fn cluster_notes(notes: Vec<NoteEntry>) -> Vec<NoteCluster>`:
   - Extract significant words from each note (split on whitespace, lowercase,
     exclude STOP_WORDS: the, a, an, is, are, was, were, to, for, in, on, of,
     and, or, it, this, that, with, from, but, not, be, as, at, by, has, have,
     had, do, does, did, will, would, could, should)
   - Two notes belong together if they share >2 significant words
   - Use union-find or iterative merging to build clusters
   - Generate a theme string from the top 3 most frequent words in each cluster
   - Notes with no cluster partners become singleton clusters

5. Register the module in lib.rs.
"""
