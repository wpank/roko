In crates/roko-cli/src/inline/symbols.rs line 44, change:

    pub const PENDING: &str = "\\u{23f3}";   // hourglass emoji

To:

    pub const PENDING: &str = "\\u{25cb}";   // white circle

This is a one-character change. The white circle (U+25CB) matches the
geometric symbol set used by all other constants (diamond, triangle,
bar, branch, checkmark, cross, etc.).
"""
status = "ready"
