[meta]
plan = "W01-wire-system-prompts"
iteration = 1
total = 4
done = 4
status = "done"
max_parallel = 1
estimated_total_minutes = 30

[[task]]
id = "T1"
title = "Add roko-compose dependency to roko-cli"
status = "done"
role = "implementer"
files = ["crates/roko-cli/Cargo.toml"]
acceptance = [
    "roko-compose appears in [dependencies] of crates/roko-cli/Cargo.toml",
    "cargo check -p roko-cli passes",
]
verify = [
    { phase = "structural", command = "grep -n 'roko-compose' crates/roko-cli/Cargo.toml", fail_msg = "roko-compose dependency must be present" },
    { phase = "compile", command = "cargo check -p roko-cli 2>&1 | awk '/^error/ { found=1 } END { exit found ? 1 : 0 }'", fail_msg = "roko-cli must compile" },
]
depends_on = []

[[task]]
id = "T2"
title = "Import SystemPromptBuilder in orchestrate.rs"
status = "done"
role = "implementer"
files = ["crates/roko-cli/src/orchestrate.rs"]
acceptance = [
    "orchestrate.rs calls the composed role prompt helper",
    "cargo check -p roko-cli passes",
]
verify = [
    { phase = "structural", command = "grep -n 'build_role_system_prompt' crates/roko-cli/src/orchestrate.rs", fail_msg = "orchestrate.rs must call the composed role prompt helper" },
    { phase = "structural", command = "grep -n 'SystemPromptBuilder' crates/roko-compose/src/role_prompts.rs", fail_msg = "role prompts must be backed by SystemPromptBuilder" },
    { phase = "compile", command = "cargo check -p roko-cli 2>&1 | awk '/^error/ { found=1 } END { exit found ? 1 : 0 }'", fail_msg = "roko-cli must compile" },
]
depends_on = ["T1"]

[[task]]
id = "T3"
title = "Replace role_system_prompt() with SystemPromptBuilder calls"
status = "done"
role = "implementer"
files = ["crates/roko-cli/src/orchestrate.rs"]
acceptance = [
    "role prompt construction uses SystemPromptBuilder::new()",
    "each AgentRole produces a prompt with at least role identity and conventions layers",
    "prompt for Implementer role contains coding standards (not just 1 sentence)",
    "cargo test -p roko-cli passes",
]
verify = [
    { phase = "structural", command = "grep -n 'SystemPromptBuilder::new' crates/roko-compose/src/role_prompts.rs", fail_msg = "role prompt construction must use SystemPromptBuilder::new" },
    { phase = "structural", command = "grep -n 'with_conventions' crates/roko-compose/src/role_prompts.rs", fail_msg = "role prompts must include conventions layers" },
    { phase = "structural", command = "grep -n 'Implementer' crates/roko-compose/src/role_prompts.rs", fail_msg = "Implementer role prompt must be defined" },
    { phase = "test", command = "cargo test -p roko-cli --lib role_system_prompt 2>&1 | tail -10", fail_msg = "role system prompt tests must pass" },
]
depends_on = ["T2"]

[[task]]
id = "T4"
title = "Verify composed prompts reach agent dispatch"
status = "done"
role = "implementer"
files = ["crates/roko-cli/src/orchestrate.rs"]
acceptance = [
    "dispatch_agent() uses the composed system prompt (not hardcoded text)",
    "the prompt is included in the PromptSection passed to the agent",
    "cargo test -p roko-cli passes",
    "grep -c 'SystemPromptBuilder' crates/roko-cli/src/orchestrate.rs returns >= 2",
]
verify = [
    { phase = "structural", command = "grep -n 'build_system_prompt_with_context_validated' crates/roko-cli/src/orchestrate.rs", fail_msg = "dispatch must build the composed system prompt" },
    { phase = "structural", command = "grep -n 'PromptSection::new(\"role\"' crates/roko-cli/src/orchestrate.rs", fail_msg = "composed prompt must be inserted as the role PromptSection" },
    { phase = "structural", command = "grep -n 'SystemPromptBuilder' crates/roko-compose/src/role_prompts.rs", fail_msg = "SystemPromptBuilder must remain in the prompt composition path" },
    { phase = "compile", command = "cargo check -p roko-cli 2>&1 | awk '/^error/ { found=1 } END { exit found ? 1 : 0 }'", fail_msg = "roko-cli must compile" },
]
depends_on = ["T3"]
