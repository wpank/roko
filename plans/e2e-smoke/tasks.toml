# ── S02: Add unit test for generate_share_token ──────────────────────────
#
# Verifies the token format: hex-hex, non-empty, contains a hyphen.

[[task]]
id = "S02"
title = "Add unit test for generate_share_token in roko-core"
description = """Add a `#[cfg(test)]` module at the bottom of `crates/roko-core/src/lib.rs`
with a single test for `generate_share_token()`.

Append this block at the very end of the file (after the last `pub use` line):

```rust
#[cfg(test)]
mod tests {
    use super::*;

    #[test]
    fn share_token_format() {
        let token = generate_share_token();
        // Token must be non-empty and contain a hyphen separator.
        assert!(!token.is_empty(), "token should not be empty");
        assert!(token.contains('-'), "token should contain a hyphen: {token}");
        // Both parts should be valid hex.
        let parts: Vec<&str> = token.splitn(2, '-').collect();
        assert_eq!(parts.len(), 2, "token should have two parts: {token}");
        assert!(
            u128::from_str_radix(parts[0], 16).is_ok(),
            "first part should be hex: {}",
            parts[0]
        );
        assert!(
            u16::from_str_radix(parts[1], 16).is_ok(),
            "second part should be 4-char hex: {}",
            parts[1]
        );
    }
}
```

Do NOT modify any other code. Only append the test module at the end of the file."""
