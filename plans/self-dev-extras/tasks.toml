# ─── Doc 12: ACP Error Recovery Gaps ─────────────────────────────────────────

[[task]]
id = "D07"
title = "Implement max_tokens recovery with automatic retry"
description = """
In crates/roko-agent/src/provider/openai_compat.rs (or openai_compat_backend.rs),
add error recovery when OpenAI API rejects the max_tokens parameter:

When sending the LLM request:
  1. Send with current body (uses max_tokens or max_completion_tokens per config)
  2. If HTTP 400 response AND error body contains "max_tokens":
     a. Log warning: "auto-fix: switching to max_completion_tokens for {model}"
     b. Clone the request body
     c. Remove "max_tokens" key, insert "max_completion_tokens" with same value
     d. Retry the request with fixed body
  3. Otherwise, propagate error normally

This handles edge cases where C10's auto-detect misses a model pattern.
The retry fixes it transparently to the caller.
"""
