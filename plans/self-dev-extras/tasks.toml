# ─── Doc 13: Config Noise Reduction ──────────────────────────────────────────

[[task]]
id = "D10"
title = "Apply skip_serializing_if to default-value ModelProfile fields"
description = """
In crates/roko-core/src/config/provider.rs, the ModelProfile struct has many bool
fields that should NOT appear in serialized TOML when at default values.

Add #[serde(skip_serializing_if = "crate::is_false")] (or define a helper)
to these fields:
  - supports_thinking (default false)
  - supports_vision (default false)
  - supports_web_search (default false)
  - supports_mcp_tools (default false)
  - supports_partial (default false)
  - supports_grounding (default false)
  - supports_code_execution (default false)
  - supports_caching (default false)
  - is_embedding_model (default false)
  - supports_search (default false)
  - supports_citations (default false)
  - supports_async (default false)

For supports_tools (default true), use skip_serializing_if = "is_true".

Add helper functions:
  fn is_false(b: &bool) -> bool { !*b }
  fn is_true(b: &bool) -> bool { *b }

This makes roko.toml less noisy — users only see fields they've explicitly set.
"""
