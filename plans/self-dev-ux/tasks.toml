[[task]]
id = "H14"
title = "Interleave stdout and stderr in slash command output"
description = """
In both run_slash_command and run_shell_command, replace the sequential
stdout-then-stderr reading with interleaved reading using tokio::select!:

let mut stdout_lines = BufReader::new(child.stdout.take().unwrap()).lines();
let mut stderr_lines = BufReader::new(child.stderr.take().unwrap()).lines();
let mut stdout_done = false;
let mut stderr_done = false;

loop {
    if stdout_done && stderr_done { break; }
    tokio::select! {
        biased;
        _ = cancel_token.cancelled() => { child.kill(); return Ok(()); }
        line = stdout_lines.next_line(), if !stdout_done => { ... }
        line = stderr_lines.next_line(), if !stderr_done => { ... }
    }
}

Stderr lines should be dimmed with ANSI: format!("\\x1b[2m{}\\x1b[0m", line)
"""
