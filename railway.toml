[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/mirage-demo.Dockerfile"
watchPatterns = [
  "apps/**",
  "crates/**",
  "contracts/**",
  "docker/**",
  "railway.toml",
  "Cargo.toml",
  "Cargo.lock",
]

[deploy]
healthcheckPath = "/relay/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
