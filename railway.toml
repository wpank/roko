[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/mirage-demo.Dockerfile"
watchPatterns = [
  "apps/mirage-rs/**",
  "apps/agent-relay/**",
  "crates/roko-core/**",
  "docker/mirage-demo.Dockerfile",
  "docker/entrypoint.sh",
  "docker/start-mirage-with-relay.sh",
  "Cargo.toml",
  "Cargo.lock",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
