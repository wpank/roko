[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "apps/**",
  "crates/**",
  "demo/demo-app/**",
  "docker/start-railway.sh",
  "Dockerfile",
  "Cargo.toml",
  "Cargo.lock",
  "roko.toml",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
