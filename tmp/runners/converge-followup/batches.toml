# Converge Followup — Batch Registry
#
# 6 waves, 33 batches. Derived from:
#   tmp/subsystem-audits/converge-runner/DEEP-AUDIT.md (Section 6)
#
# Wave A: Contract Repair          (5 batches)  — foundation types, events, logs
# Wave B: Engine Semantics          (6 batches)  — workflow engine correctness
# Wave C: Service Wiring            (6 batches)  — service factory, completeness
# Wave D: Entry Point Convergence   (5 batches)  — unified CLI/server/plan paths
# Wave E: Legacy Retirement         (5 batches)  — feature-gate and delete old code
# Wave F: Proof And Enforcement     (6 batches)  — integration tests, CI checks
#
# Fields:
#   id        — Unique batch identifier
#   title     — Human-readable description
#   group     — Wave/track name (A-F)
#   deps      — Batch ids that must succeed first
#   scope     — Files this batch may MODIFY (injected into prompt as live content)
#   also_read — Files to INCLUDE read-only (context for coherent decisions)
#   verify    — "quick" (per-crate check + AP grep) or "full" (workspace + clippy)
#
# Anti-pattern checks (AP-1 through AP-7) run per-batch automatically.
# Track gates (workspace check + clippy + duplicate trait detection) run per-wave.
# End-of-run gate: cargo test --workspace.

