# =============================================================================
# ux-impl — batches.toml
# =============================================================================
# 61 Codex-driven batches across 8 waves (M, AG, CH, TU, MC, FG, BP, HY).
# Manual tracks (DB, DC, RH, PH) live under manual-tracks/ and are NOT here.
#
# Source: tmp/ux/implementation-plans/{01..12}-*.md
# Tracker: tmp/runners/ux-impl/ISSUE-TRACKER.md
#
# Field reference (see tmp/runners/parallel-template/README.md):
#   id        — unique batch id
#   title     — human-readable description
#   group     — wave letter (M / AG / CH / ...)
#   deps      — list of batch ids that must succeed first
#   scope     — files this batch may MODIFY (live content injected)
#   also_read — files this batch READS for context (not modified)
#   verify    — "quick" (per-crate check + AP grep) or "full"
# =============================================================================

