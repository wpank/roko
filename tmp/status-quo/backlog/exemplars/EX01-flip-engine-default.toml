# ────────────────────────────────────────────────────────────────────
# Add a unit test in the existing `#[cfg(test)] mod tests` block in main.rs
# (next to `effort_value_enum_all_variants`, line 3778) that parses
# `roko plan run plans/` and asserts the resolved engine is PlanEngine::RunnerV2.
# This freezes the fix so a future clap edit can't silently reintroduce Graph.

[[task]]
