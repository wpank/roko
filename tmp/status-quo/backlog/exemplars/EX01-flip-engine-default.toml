    { path = "crates/roko-cli/src/main.rs", lines = "3777-3797", why = "Existing test style: `effort_value_enum_all_variants` uses Cli::try_parse_from; add the new test alongside it in the same mod tests block" },
    { path = "crates/roko-cli/src/main.rs", lines = "1356-1362", why = "The `Run` variant shape (engine field) the test must destructure after parsing" },
    { path = "crates/roko-cli/src/main.rs", lines = "1294-1304", why = "PlanEngine::RunnerV2 is the expected value" },
