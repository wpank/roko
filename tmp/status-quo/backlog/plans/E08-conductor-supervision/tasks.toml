# ═══════════════════════════════════════════════════════════════════════════════
# E08-T09: Worktree-count watcher for conductor
# ═══════════════════════════════════════════════════════════════════════════════
# Add a WorktreeCountWatcher that alerts when too many git worktrees are live.
# E47-T09 is the sole producer of tagged `worktree_count` Metric Engrams from
# WorktreeManager::active_count on both runner paths. This task is only the
# React consumer: it reads that stream and emits a warning intervention when
# the latest count exceeds its configurable threshold.

[[task]]
id = "E08-T09"
title = "Add WorktreeCountWatcher to conductor watchers"
status = "ready"
ownership = "distinct-consumer"
uses_owner = "E47-T09"
tier = "focused"
model_hint = "claude-sonnet-4-6"
max_loc = 140
files = [
    "crates/roko-conductor/src/watchers/worktree_count.rs",
    "crates/roko-conductor/src/watchers/mod.rs",
    "crates/roko-conductor/src/conductor.rs",
    "crates/roko-core/src/config/schema.rs",
    "crates/roko-core/src/config/mod.rs",
]
role = "implementer"
depends_on = ["E08-T03"]
depends_on_plan = ["E47-resource-disk-management"]
acceptance = [
    "WorktreeCountWatcher implements React::decide and reads the latest Kind::Metric Engram tagged name=worktree_count and value=<active count>.",
    "When the live count exceeds the configured maximum, decide emits a conductor.intervention Engram tagged severity=warning, watcher=worktree-count, count, and max_live; otherwise it returns no Engrams.",
    "Conductor::from_config registers the watcher and honors [conductor.watchers.worktree_count].max_live through WatcherThresholds; absent configuration uses the documented default of 8.",
    "Unit tests prove a metric value of 10 with max_live=8 emits exactly one warning intervention and a value at or below 8 emits none.",
]

[task.context]
read_files = [
    { path = "crates/roko-conductor/src/watchers/cost_overrun.rs", lines = "1-110", why = "Live React pattern for consuming tagged Metric Engrams and emitting warning intervention Engrams" },
    { path = "crates/roko-conductor/src/watchers/mod.rs", lines = "1-40", why = "React watcher module re-exports; add WorktreeCountWatcher here" },
    { path = "crates/roko-conductor/src/conductor.rs", lines = "86-210", why = "default_watchers and configured_watchers; register WorktreeCountWatcher in both paths" },
    { path = "crates/roko-core/src/config/schema.rs", lines = "1250-1420", why = "ConductorConfig and WatcherThresholds; add WorktreeCountConfig with max_live default 8" },
    { path = "crates/roko-cli/src/orchestrate.rs", lines = "7100-7185", why = "E47-T09 canonical tagged Metric emission into the conductor ring" },
    { path = "crates/roko-cli/src/runner/event_loop.rs", why = "E47-T09 runner-v2 worktree_count Metric producer" },
]
symbols = [
    "React::decide(&[Engram], &Context) -> Vec<Engram>",
    "Kind::Metric tags name=worktree_count and value=<usize> — canonical E47-T09 input",
    "Kind::Custom(conductor.intervention) — warning output Engram",
    "WatcherThresholds.worktree_count / WorktreeCountConfig.max_live — configurable threshold with default 8",
]
anti_patterns = [
    "Do NOT query git or WorktreeManager from the watcher; E47-T09 alone emits the count and this React stays pure.",
    "Do NOT interpret disk_budget_remaining as a worktree count; consume only name=worktree_count metrics.",
    "Do NOT introduce a Watcher trait, WatcherOutput, or evaluate API; the live interface is React::decide returning intervention Engrams.",
    "Do NOT hardcode the runtime threshold in decide; use WorktreeCountConfig.max_live, whose missing-config default is 8.",
    "Do NOT emit Critical/abort by default; count pressure is a severity=warning intervention.",
]

[[task.verify]]
phase = "structural"
command = "test -f crates/roko-conductor/src/watchers/worktree_count.rs"
