    "Do NOT fail the run if target/ does not exist or size cannot be measured; set the gauge to 0 and log a debug warning.",
    "Do NOT add the metric to roko-fs; it belongs in the runner or CLI layer since target/ is a workspace concept, not a .roko/ concept.",
    "Do NOT measure on every event loop tick; use a separate slow interval to avoid performance impact.",
]

