# ─────────────────────────────────────────────────────────────────────────────
# E09-T10: Log rotation for episodes.jsonl and signals.jsonl
# ─────────────────────────────────────────────────────────────────────────────
#
# episodes.jsonl and signals.jsonl are append-only files that grow without
# bound during long self-hosting sessions. Add size-based rotation that
# renames the current file to a timestamped backup and starts a fresh file
# when either exceeds 100 MB. This is separate from E09-T07 (events.jsonl
# cap inside StateHub) — these files are managed by roko-fs layout and the
# episode/signal writers.
#
[[task]]
id = "E09-T10"
title = "Add log rotation for episodes.jsonl and signals.jsonl (>100MB)"
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-5"
max_loc = 100
files = [
    "crates/roko-fs/src/layout.rs",
    "crates/roko-fs/src/substrate.rs",
]
role = "implementer"
depends_on = []

[task.context]
read_files = [
    { path = "crates/roko-fs/src/layout.rs", lines = "225-260", why = "RokoLayout::episodes_log and signals_log — canonical paths for both files" },
    { path = "crates/roko-fs/src/substrate.rs", lines = "1-80", why = "FileSubstrate append behavior; rotation should happen before append when file exceeds threshold" },
    { path = "crates/roko-fs/src/gc.rs", lines = "30-55", why = "RetentionPolicy pattern — mirror the configurable threshold approach" },
]
symbols = [
    "RokoLayout::episodes_log — roko-fs/layout.rs",
    "RokoLayout::signals_log — roko-fs/layout.rs",
    "FileSubstrate — roko-fs/substrate.rs (append-only JSONL writer)",
    "RetentionPolicy — roko-fs/gc.rs (configurable threshold pattern to follow)",
]
anti_patterns = [
    "Do NOT truncate mid-line; rotation must happen at JSONL line boundaries.",
    "Do NOT delete old rotated files automatically — that is GC's job. Only rename the current file.",
    "Do NOT make rotation blocking on the hot path; check file size periodically (e.g., every N appends), not on every write.",
    "Do NOT change the canonical file paths in RokoLayout; rotated files get a timestamp suffix.",
    "Do NOT break existing readers of episodes.jsonl or signals.jsonl; the current-name file always exists after rotation (empty or with new data).",
]

[[task.verify]]
phase = "structural"
command = "rg -q 'rotate|ROTATION_THRESHOLD|MAX_LOG_SIZE|log_rotation' crates/roko-fs/src/layout.rs crates/roko-fs/src/substrate.rs"
fail_msg = "roko-fs must contain log rotation logic for JSONL files"

[[task.verify]]
phase = "structural"
command = "rg -q 'episodes.jsonl|signals.jsonl' crates/roko-fs/src/layout.rs crates/roko-fs/src/substrate.rs"
fail_msg = "rotation must target episodes.jsonl and signals.jsonl"

[[task.verify]]
phase = "compile"
command = "cargo check -p roko-fs 2>&1"
fail_msg = "roko-fs must compile after adding log rotation"

[[task.verify]]
phase = "test"
command = "cargo test -p roko-fs rotation 2>&1"
fail_msg = "log rotation tests must pass"

acceptance = [
    "When episodes.jsonl or signals.jsonl exceeds 100 MB, the file is renamed to <name>.<timestamp>.jsonl and a fresh file is created.",
    "The threshold is configurable (default 100 MB).",
    "Rotation happens at JSONL line boundaries, never mid-record.",
    "Existing readers and the GC engine can discover rotated files via the timestamp suffix pattern.",
]


# ─────────────────────────────────────────────────────────────────────────────
# E09-T11: Track target/ directory size in metrics
# ─────────────────────────────────────────────────────────────────────────────
#
# The Rust target/ directory grows continuously during self-hosted builds and
# can easily exceed 10-20 GB. Add a periodic metric that reports the target/
# directory size so it shows up in the MetricRegistry and the prometheus.txt
# dump. This enables operators and the conductor DiskSpaceWatcher (E08-T08)
# to track build artifact bloat and trigger cleanup.
#
[[task]]
id = "E09-T11"
title = "Add target/ directory size tracking to MetricRegistry"
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-5"
max_loc = 70
files = [
    "crates/roko-cli/src/runner/event_loop.rs",
    "crates/roko-core/src/obs/metrics.rs",
]
role = "implementer"
depends_on = ["E09-T01"]

[task.context]
read_files = [
    { path = "crates/roko-core/src/obs/metrics.rs", lines = "1-80", why = "MetricRegistry API — gauge or counter registration pattern for the target/ size metric" },
    { path = "crates/roko-core/src/obs/metrics.rs", lines = "263-300", why = "render_prometheus — confirm the new metric will appear in the Prometheus dump" },
    { path = "crates/roko-cli/src/runner/event_loop.rs", lines = "646-790", why = "Existing tick/flush intervals; add a periodic target/ size measurement alongside" },
    { path = "crates/roko-cli/src/runner/event_loop.rs", lines = "1738-1860", why = "Tick branch in the event loop; measure target/ size on a slow interval (e.g., every 60s)" },
]
symbols = [
    "MetricRegistry — roko-core/obs/metrics.rs",
    "register_standard_metrics — pre-defined metric set to extend",
    "Gauge or IntGauge — metric type for a point-in-time size measurement",
]
anti_patterns = [
