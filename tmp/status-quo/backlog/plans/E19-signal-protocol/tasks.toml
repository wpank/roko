# ─────────────────────────────────────────────────────────────────────────────
# E19-T05: Implement novelty-weighted demurrage tick on Signal
# ─────────────────────────────────────────────────────────────────────────────
# The spec (01-SIGNAL.md §6) defines a 3-term demurrage rate law:
#   d(balance)/dt = -flat_tax - beta*balance + reinforcement*novelty
# The existing Demurrage trait (demurrage.rs:15) has tick/replenish but only
# implements a simple exponential decay (line 52). This task adds the full
# novelty-weighted formula and a DemurrageConfig for tunable parameters.
[[task]]
id = "E19-T05"
title = "Implement novelty-weighted demurrage_tick on Engram"
description = """Add a `DemurrageConfig` struct to `demurrage.rs` with:
- `flat_tax_per_day: f64` (default 0.01)
- `exp_decay_per_day: f64` (default 0.05, the beta term)
- `novelty_bonus: f64` (default 0.1, reinforcement multiplier)

Add `fn demurrage_tick(engram: &mut Engram, config: &DemurrageConfig, elapsed_hours: f64, novelty: f32)`
as a standalone function (not trait method) that applies:
  new_balance = balance - flat_tax*(elapsed/24) - beta*balance*(elapsed/24) + reinforcement*novelty*(elapsed/24)
  balance = new_balance.clamp(0.0, 1.0)

Also add `demurrage_paid: f64` field to Engram (with `#[serde(default)]`) tracking cumulative
tax. Increment it by the amount lost each tick.

The existing `Demurrage` trait (line 15) stays for backward compatibility — the new function
is the spec-compliant path."""
