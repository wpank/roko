# ─────────────────────────────────────────────────────────────────────────────
# E19-T01: Add graduation status field to Engram (Signal)
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec (01-SIGNAL.md §2) defines a 4-tier lifecycle for durable Signals:
# Transient → Working → Consolidated → Persistent. Engram currently has a
# `balance` field (line 97) for demurrage but no explicit lifecycle state.
# This task adds the status enum and field as the foundation for graduation.
[[task]]
id = "E19-T01"
title = "Add SignalStatus graduation enum and status field to Engram"
description = """Add a `SignalStatus` enum with variants `Transient`, `Working`, `Consolidated`,
`Persistent` to `roko-core/src/engram.rs`. Add a `status: SignalStatus` field to the `Engram`
struct (currently at line 63) with `#[serde(default)]` defaulting to `Transient`. Update
`EngramBuilder` (line 310) to accept `.status(SignalStatus)`. The existing `balance` field
(line 97) already supports demurrage decay; `status` tracks the *tier* independently.

The spec maps these tiers to retention guarantees:
- Transient: may be pruned aggressively (minutes)
- Working: retained during active task scope
- Consolidated: survives across sessions, feeds learning
- Persistent: permanent archive, never auto-pruned

Derive `Clone, Copy, Debug, PartialEq, Eq, Hash, Serialize, Deserialize` on `SignalStatus`.
Add `impl Default for SignalStatus` returning `Transient`. Add `SignalStatus::is_durable()` → bool
(true for Consolidated and Persistent)."""
