# ─────────────────────────────────────────────────────────────────────────────
# E19-T02: Implement graduation transition logic
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec (01-SIGNAL.md §2) defines preconditions for each graduation step:
# Transient→Working requires non-zero score, Working→Consolidated requires gate
# pass, Consolidated→Persistent requires min age + min access count. Transitions
# are one-directional only (no demotions).
[[task]]
id = "E19-T02"
title = "Implement Signal graduation state machine transitions"
description = """Add graduation methods to `Engram` (impl block at line 100):

- `promote_to_working(min_score: f32) → Result<(), GraduationError>` — requires score.effective() >= min_score
- `promote_to_consolidated() → Result<(), GraduationError>` — requires current status is Working
- `promote_to_persistent(min_age_secs: u64, min_accesses: u32) → Result<(), GraduationError>` — requires Consolidated + age + access checks

Add a `GraduationError` enum with variants: `InvalidTransition { from, to }`, `ScoreTooLow { required, actual }`,
`InsufficientAge { required_secs, actual_secs }`, `InsufficientAccesses { required, actual }`.

The `access_count` field doesn't exist yet on Engram; add it as `#[serde(default)] pub access_count: u32`
and increment it in `touch()` (line 150). Transitions mutate `self.status` in-place.

Add unit tests for: valid promotions, skipped-tier rejection, backward transition rejection,
score threshold enforcement."""
