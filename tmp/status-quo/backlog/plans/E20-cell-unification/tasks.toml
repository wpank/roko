# runtime Cell management.
[[task]]
id = "E20-T08"
title = "Add CellRegistry for runtime Cell instance management in roko-core"
description = """Add a `CoreCellRegistry` struct to `roko-core/src/cell.rs` that stores
`Arc<dyn Cell>` instances indexed by `CellId` (String):
```rust
pub struct CoreCellRegistry {
    cells: HashMap<CellId, Arc<dyn Cell>>,
}
```

Methods:
- `new() -> Self`
- `register(&mut self, cell: Arc<dyn Cell>)` — registers by cell.cell_id()
- `get(&self, id: &str) -> Option<Arc<dyn Cell>>`
- `list() -> Vec<(CellId, &str)>` — returns (id, name) pairs
- `remove(&mut self, id: &str) -> Option<Arc<dyn Cell>>`
- `len() -> usize`
- `is_empty() -> bool`

Note: roko-graph already has its own `CellRegistry` (registry.rs:16) that uses factory
functions (`FnMut(config) -> Box<dyn Cell>`). This is a different pattern — factory-based
for graph node instantiation vs. instance-based for runtime Cell management. Name it
`CoreCellRegistry` to avoid conflict when both are in scope."""
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-5"
max_loc = 55
files = ["crates/roko-core/src/cell.rs"]
role = "implementer"
depends_on = ["E20-T01"]
domain = "cell-unification"

[task.context]
read_files = [
    { path = "crates/roko-core/src/cell.rs", lines = "91-121", why = "Cell trait — registry stores Arc<dyn Cell>" },
    { path = "crates/roko-graph/src/registry.rs", lines = "1-25", why = "roko-graph CellRegistry — different pattern (factory-based), avoid name conflict" },
    { path = "crates/roko-core/src/tool.rs", lines = "1-30", why = "ToolRegistry pattern — similar approach for runtime management" },
]
symbols = [
    "Cell trait (cell.rs:91) — registry holds Arc<dyn Cell>",
    "CellId (cell.rs:16) — String type alias used as registry key",
    "CellRegistry (roko-graph registry.rs:16) — existing factory-based registry, different pattern",
]
anti_patterns = [
    "Do NOT use a global static registry — make it an instance that is passed around.",
    "Do NOT couple to any specific Cell implementation — registry is generic over dyn Cell.",
    "Do NOT name it CellRegistry — that conflicts with roko-graph's CellRegistry. Use CoreCellRegistry.",
]

[[task.verify]]
phase = "structural"
command = "grep -q 'CoreCellRegistry' crates/roko-core/src/cell.rs"
fail_msg = "CoreCellRegistry must exist in cell.rs"

[[task.verify]]
phase = "structural"
command = "grep -q 'fn register\\|fn get\\|fn list' crates/roko-core/src/cell.rs"
fail_msg = "CoreCellRegistry must have register, get, and list methods"

[[task.verify]]
phase = "compile"
command = "cargo check -p roko-core 2>&1"
fail_msg = "roko-core must compile"

[[task.verify]]
phase = "test"
command = "cargo test -p roko-core cell 2>&1"
fail_msg = "cell tests must pass"

