# ─────────────────────────────────────────────────────────────────────────────
# E20-T04: Add predict-publish-correct learning loop per Cell
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec (02-CELL.md §8) says every Cell is a learner via predict-publish-
# correct (Friston 2006). Add optional predict/correct methods to Cell.
[[task]]
id = "E20-T04"
title = "Add predict-publish-correct learning interface to Cell trait"
description = """Add optional `predict()` and `correct()` methods to the Cell trait (line 91):

```rust
/// Predict expected outcome before execution. Returns None if this Cell does not learn.
fn predict(&self, input: &[Engram]) -> Option<PredictionRecord> { None }

/// Correct internal state after execution with actual outcome.
fn correct(&self, prediction: &PredictionRecord, actual: &[Engram]) { }
```

Add a `PredictionRecord` struct:
```rust
pub struct PredictionRecord {
    pub cell_id: String,
    pub predicted_outcome: serde_json::Value,
    pub confidence: f64,
    pub timestamp_ms: i64,
}
```

Default implementations are no-ops — most Cells don't learn. The predict-publish-correct
loop is driven by the Graph Engine: predict before execute, correct after.

This is the trait-level contract. Actual learning implementations live in roko-learn and
consume PredictionRecords."""
