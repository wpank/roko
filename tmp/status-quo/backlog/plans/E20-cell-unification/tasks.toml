# ─────────────────────────────────────────────────────────────────────────────
# E20-T01: Add protocol conformance declaration to Cell trait
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec (02-CELL.md §2) defines 9 protocols. The roko-core Cell trait
# (cell.rs:91) has protocols() returning &[&str] but needs a typed ProtocolId
# enum for compile-time protocol checking. The roko-graph Cell trait (roko-graph
# cell.rs:74) also uses &[&str]. Both need updating.
[[task]]
id = "E20-T01"
title = "Add ProtocolId enum for typed protocol conformance on Cell"
description = """Add a `ProtocolId` enum to `roko-core/src/cell.rs` with variants matching the 9
protocols defined in 02-CELL.md §2:
```rust
#[derive(Clone, Copy, Debug, PartialEq, Eq, Hash, Serialize, Deserialize)]
pub enum ProtocolId {
    Store, Score, Verify, Route, Compose, React, Observe, Connect, Trigger,
}
```

Change Cell::protocols() (line 108) return type from `&[&str]` to `Vec<ProtocolId>` with a
default implementation returning an empty Vec. Add a `has_protocol(id: ProtocolId) -> bool`
convenience method that checks `self.protocols().contains(&id)`.

Update existing `protocols()` implementations in roko-core:
- `NoOpGate` in noop.rs (returns `&["Verify"]`) -> `vec![ProtocolId::Verify]`
- Other Cell impls that override protocols()

Also update roko-graph's Cell trait (roko-graph/src/cell.rs:74) to match, since graph cells
also declare protocols. This may require making ProtocolId available via roko-core re-export."""
