# ─────────────────────────────────────────────────────────────────────────────
# E20-T02: Add TypeSchema validation with JSON Schema support
# ─────────────────────────────────────────────────────────────────────────────
# TypeSchema (cell.rs:63) exists with Any, OfKind, and JsonSchema variants but
# is_compatible_with (line 75) always returns false for JsonSchema-JsonSchema
# comparisons. The v2 spec requires actual validation capability.
[[task]]
id = "E20-T02"
title = "Implement TypeSchema validation for JSON Schema compatibility"
description = """Enhance `TypeSchema::is_compatible_with` (cell.rs:75) to handle JsonSchema variant:
two JsonSchema variants are compatible if their schema strings are equal (exact match).

Add new methods:
- `validate_signal(signal: &Engram) -> bool` — checks if a Signal's kind/body matches this schema:
  - `Any` always returns true
  - `OfKind(k)` returns true if signal.kind == k
  - `JsonSchema(s)` returns true (schema validation is best-effort; full validation deferred)
- `union(self, other: TypeSchema) -> TypeSchema` — combines two schemas for merge points:
  - If either is Any, result is Any
  - If both are OfKind with the same kind, result is OfKind
  - Otherwise, result is Any (conservative)

Add unit tests for all compatibility and validation cases."""
