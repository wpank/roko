# ─────────────────────────────────────────────────────────────────────────────
# E21-T01: Add typed edge validation using TypeSchema
# ─────────────────────────────────────────────────────────────────────────────
# The Graph (types.rs) currently has no type-checking on edges. The v2 spec
# (03-GRAPH.md §3) requires edge validation: an edge from node A to node B is
# valid only if A's output TypeSchema is compatible with B's input TypeSchema.
# The roko-graph engine resolves cells via CellRegistry (registry.rs:16) and
# needs schema info from the cells to validate edges.
[[task]]
id = "E21-T01"
title = "Add typed edge validation to Graph using Cell TypeSchema"
description = """Add a `validate_edges()` method to `Graph` (types.rs, Graph struct around line 88)
that checks each edge: the source Cell's output_schema must be compatible with the target
Cell's input_schema using `TypeSchema::is_compatible_with` (roko-core cell.rs:75).

The method needs access to Cell metadata (schemas), so it takes a `CellRegistry` parameter:
```rust
pub fn validate_edges(&self, registry: &CellRegistry) -> Vec<EdgeValidationError>
```

`EdgeValidationError` struct:
```rust
pub struct EdgeValidationError {
    pub edge_from: String,
    pub edge_to: String,
    pub source_schema: Option<TypeSchema>,
    pub target_schema: Option<TypeSchema>,
    pub reason: String,
}
```

Collect ALL errors (don't fail-fast). Edges where either cell has `None` (Any) schema
are always valid. Call this from `GraphEngine::new()` or `load_graph()` as a warning pass."""
