# ─────────────────────────────────────────────────────────────────────────────
# E21-T04: Implement parallel node execution in GraphEngine
# ─────────────────────────────────────────────────────────────────────────────
# GraphEngine (engine.rs) currently executes nodes sequentially in topological
# order (topo.rs). The v2 spec (03-GRAPH.md §4) and GraphPolicy require
# parallel execution of independent nodes within a topological wave.
[[task]]
id = "E21-T04"
title = "Implement parallel node execution within topological waves"
description = """Modify `GraphEngine::execute()` (engine.rs) to run independent nodes concurrently:

1. Use `topological_order()` (topo.rs) to get the execution order
2. Group nodes into "waves" — each wave contains nodes whose predecessors are all in earlier waves
3. Within a wave, spawn nodes as tokio tasks using `JoinSet`
4. Use a `tokio::sync::Semaphore` with `GraphPolicy::max_concurrent_nodes` permits to limit concurrency
5. Collect results from JoinSet before proceeding to the next wave

```rust
let semaphore = Arc::new(Semaphore::new(policy.max_concurrent_nodes));
for wave in waves {
    let mut join_set = JoinSet::new();
    for node_id in wave {
        let permit = semaphore.clone().acquire_owned().await?;
        join_set.spawn(async move {
            let result = cell.execute(inputs, &ctx).await;
            drop(permit);
            (node_id, result)
        });
    }
    while let Some(result) = join_set.join_next().await { ... }
}
```

When `max_concurrent_nodes = 1`, this degrades to sequential execution (backward compat).
Existing tests should pass without modification since they use default policy."""
