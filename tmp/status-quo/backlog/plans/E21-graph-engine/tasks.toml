# ─────────────────────────────────────────────────────────────────────────────
# E21-T08: Wire edge condition evaluation into GraphEngine execution
# ─────────────────────────────────────────────────────────────────────────────
# Condition evaluation exists (condition.rs with evaluate() function and tests)
# but the GraphEngine doesn't use it during execution. Edges are traversed
# unconditionally. Wire condition checks so the engine skips edges/nodes whose
# conditions are not met.
[[task]]
id = "E21-T08"
title = "Wire edge Condition evaluation into GraphEngine execution"
description = """In `GraphEngine::execute()` (engine.rs), add condition evaluation:

1. After each node completes, build its `NodeOutput` from the `NodeResult`
2. For each outgoing edge from that node, call `condition::evaluate(&edge.condition, &output)`
3. If the condition returns false, do NOT deliver data to the downstream node via that edge
4. A downstream node is skipped (status=Skipped) if ALL its incoming edges are either
   not-yet-evaluated or failed their conditions

The `condition.rs` module already has:
- `Condition` enum: Always, OnSuccess, OnFailure, When (line 33)
- `evaluate()` function (line 85) that takes `&Condition` and `&NodeOutput`
- `NodeOutput` with success/failed/skipped constructors (types.rs)
- Full test coverage (lines 177-268)

Key integration point: the engine's edge traversal loop needs to check conditions before
adding nodes to the next wave. Currently edges are just adjacency — make them conditional."""
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-5"
max_loc = 60
files = ["crates/roko-graph/src/engine.rs"]
role = "implementer"
depends_on = ["E21-T04"]
domain = "graph-engine"

[task.context]
read_files = [
    { path = "crates/roko-graph/src/condition.rs", lines = "33-50", why = "Condition enum: Always, OnSuccess, OnFailure, When" },
    { path = "crates/roko-graph/src/condition.rs", lines = "85-104", why = "evaluate() function — call from engine execution loop" },
    { path = "crates/roko-graph/src/types.rs", lines = "1-31", why = "Edge with condition field, NodeOutput with success/failed/skipped" },
    { path = "crates/roko-graph/src/engine.rs", lines = "100-200", why = "GraphEngine::execute — edge traversal loop to modify" },
    { path = "crates/roko-graph/src/condition.rs", lines = "177-268", why = "Existing condition tests — reference for expected behavior" },
]
symbols = [
    "condition::evaluate (condition.rs:85) — predicate to call per edge",
    "Condition (condition.rs:33) — enum with Always, OnSuccess, OnFailure, When variants",
    "NodeOutput (types.rs) — success/failed/skipped constructors for condition input",
    "Edge.condition (types.rs:~10) — condition field on each edge",
    "GraphEngine::execute (engine.rs) — main loop to modify",
]
anti_patterns = [
    "Do NOT skip nodes when ANY edge condition passes — skip only when ALL incoming edges fail.",
    "Do NOT change the Always condition behavior — it always evaluates to true.",
    "Do NOT remove the standalone evaluate() tests in condition.rs.",
    "Do NOT duplicate condition evaluation logic — call the existing evaluate() function.",
]

