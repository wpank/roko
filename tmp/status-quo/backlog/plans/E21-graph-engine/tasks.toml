# E21-T09: Integrate MergeQueue with Graph execution for concurrent plans
# ─────────────────────────────────────────────────────────────────────────────
# MergeQueue (roko-orchestrator merge_queue.rs) serializes file-conflict-aware
# merges. When the Graph engine is used to execute plans (via plan_to_graph
# conversion), completed plans should enqueue merge requests.
[[task]]
id = "E21-T09"
title = "Wire MergeQueue into Graph execution for concurrent plan merges"
description = """Add an optional `merge_queue: Option<Arc<MergeQueue>>` field to `GraphEngine`
(or its config/builder). After a Graph completes successfully and represents a plan execution,
enqueue a `MergeRequest` with the plan's changed files.

The integration point:
1. GraphEngine gains a `with_merge_queue(queue: Arc<MergeQueue>) -> Self` builder method
2. In `GraphEngine::execute()`, after successful completion, if merge_queue is Some:
   - Collect changed files from Activity node outputs (convention: nodes emit `files_changed` in output)
   - Create a `MergeRequest` with graph name as plan_id and collected files
   - Call `merge_queue.enqueue(request)`

The MergeQueue types are in roko-orchestrator — add `roko-orchestrator` as an optional
dependency of roko-graph (feature-gated if desired, or just optional dep)."""
