# ─────────────────────────────────────────────────────────────────────────────
# E22-T03: Implement T0 short-circuit optimization
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec defines T0 short-circuit: ~80% of cognitive loop ticks detect
# "nothing changed" in SENSE and skip directly to REACT without invoking
# ASSESS, COMPOSE, or ACT. The SenseCell output determines whether a full
# tick is needed. This is wired through the graph's conditional edges (T02).
[[task]]
id = "E22-T03"
title = "Implement T0 short-circuit in SenseCell for no-change ticks"
description = """Add T0 short-circuit logic to SenseCell (cells/cognitive.rs): if the
current tick's sensed material is empty (no new Signals, no new Pulses, no
external input), emit an output Engram tagged with "t0_short_circuit" = true.
This tag is read by the conditional edge in cognitive-loop.toml (from T02) to
skip the assess->compose->act->verify->persist chain and jump directly to react.

Add a T0 counter (AtomicU64) to SenseCell for observability, incremented
on each short-circuit tick. Log at trace level on short-circuit.

The short-circuit check must NOT fire when:
- A deadline is approaching (budget_remaining < threshold in CellContext)
- The React cell requested a forced full tick in the previous iteration"""
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-5"
max_loc = 50
files = ["crates/roko-graph/src/cells/cognitive.rs"]
role = "implementer"
depends_on = ["E22-T01"]
