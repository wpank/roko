description = """Add a CellError enum to roko-graph/src/error.rs with variants:
- Transient { message, retry_after_ms } -- transient failure, retry with backoff
- Permanent { message } -- unrecoverable failure, abort
- ResourceExhausted { resource, message, wait_ms } -- wait for resource
- Timeout { message, elapsed_ms } -- retry with longer timeout
