# ─────────────────────────────────────────────────────────────────────────────
# E22-T09: Add lifecycle Pulse emission from GraphEngine
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec requires every lifecycle event to be a Pulse on Bus. Currently
# GraphEngine has no Bus reference. This task adds optional Bus integration
# for lifecycle event emission.
[[task]]
id = "E22-T09"
title = "Emit lifecycle Pulses from GraphEngine via Bus"
description = """Add lifecycle Pulse emission to GraphEngine:

1. Add an optional bus field to GraphEngine: bus: Option<Arc<dyn BusErased>>
   (BusErased is the type-erased bus trait from roko-core/src/bus_backends.rs).
2. Add a GraphEngine::with_bus(bus) builder method.
3. In execute(), publish Pulses for these events:
   - flow.started { graph_id, run_id, timestamp }
   - node.started { graph_id, node_id, cell_type, timestamp }
   - node.completed { graph_id, node_id, duration_ms, output_count, timestamp }
   - node.failed { graph_id, node_id, error, duration_ms, timestamp }
   - flow.completed { graph_id, success, total_duration_ms, node_count, timestamp }
4. Each Pulse carries metadata as serde_json::Value in the Engram payload.
5. Publishing is fire-and-forget -- do not block on publish.

The Bus dependency is optional so test contexts that don't need Pulses
continue to work without providing a Bus instance."""
