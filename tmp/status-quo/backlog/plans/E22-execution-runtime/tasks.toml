# ─────────────────────────────────────────────────────────────────────────────
# E22-T05: Add error recovery state machine to GraphEngine
# ─────────────────────────────────────────────────────────────────────────────
# Wire the CellError taxonomy into GraphEngine. Currently engine.rs:194-213
# treats all errors the same (mark as Failed, add to failed_nodes set).
# This task adds error classification and per-variant recovery strategies.
[[task]]
id = "E22-T05"
title = "Wire CellError recovery state machine into GraphEngine"
description = """Modify GraphEngine::execute (engine.rs:132-225) to classify errors from
Cell execution. When a cell's execute() returns Err, try to downcast to
CellError and apply the suggested recovery strategy:

- Retry: re-execute the cell with exponential backoff (base_ms * 2^attempt),
  up to max_retries. Track retry count per node in a HashMap<NodeId, u32>.
- Skip: mark the node as Skipped (not Failed), so dependents can still run
  if they don't require this node's output.
- Escalate: emit a warning log and mark as Failed (future: bus pulse for
  supervisor notification).
- Abort: stop the entire graph execution immediately.

For non-CellError errors (plain RokoError), default to the current behavior
(mark as Failed, skip dependents). This preserves backward compatibility.

Respect max_retries from a configurable GraphPolicy (add to GraphEngine struct)."""
