# ─────────────────────────────────────────────────────────────────────────────
# E22-T01: Define the 7 cognitive loop Cell types
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec defines the cognitive loop as 7 typed Cells: Sense, Assess,
# Compose, Act, Verify, Persist, React. Currently only PassthroughCell stubs
# exist (registered in engine.rs:360-368 as COGNITIVE_LOOP_STUBS). This task
# replaces those stubs with proper Cell implementations that declare typed
# I/O schemas per the spec.
[[task]]
id = "E22-T01"
title = "Define 7 cognitive loop Cell structs with typed I/O schemas"
description = """Create a new module crates/roko-graph/src/cells/cognitive.rs with 7 Cell
structs: SenseCell, AssessCell, ComposeCell, ActCell, VerifyCell, PersistCell,
ReactCell. Each defines input_schema and output_schema per the spec. Implement
Cell trait stubs (execute returns todo/unimplemented for now). Register all 7
in the cells/mod.rs exports, replacing the PassthroughCell registrations in
engine.rs default_registry().

The roko-graph Cell trait (cell.rs:74-106) requires: cell_id, cell_name,
cell_version, protocols, estimated_cost, estimated_duration, and execute.
The roko-core Cell trait (cell.rs:59-83) defines TypeSchema for I/O contracts.

Each cell must declare its protocols list per spec:
- SenseCell: ["Observe"] (reads Store + Bus)
- AssessCell: ["Score"] (relevance scoring)
- ComposeCell: ["Compose"] (prompt assembly)
- ActCell: ["Connect"] (agent dispatch)
- VerifyCell: ["Verify"] (gate execution)
- PersistCell: ["Store"] (Signal persistence)
- ReactCell: ["React", "Trigger"] (event emission + reactions)"""
