# ─────────────────────────────────────────────────────────────────────────────
# E22-T08: Add FlowHandle for live execution tracking
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec defines Flow as a live execution instance of a Graph. The
# existing HotGraphHandle (hot.rs:57-103) is the pattern to follow.
# FlowHandle provides status(), cancel(), and await_completion().
[[task]]
id = "E22-T08"
title = "Add FlowHandle for live Graph execution tracking"
description = """Add a FlowHandle struct to engine.rs with:
- run_id: String (unique per execution)
- graph_id: String (from GraphMetadata.name)
- started_at: Instant
- node_statuses: Arc<parking_lot::Mutex<HashMap<NodeId, NodeStatus>>>
- budget_consumed: Arc<AtomicU64> (microdollars, same pattern as BudgetTracker)
- cancel: CancellationToken (from tokio-util)
- result: Arc<parking_lot::Mutex<Option<GraphOutput>>>

Methods:
- status() -> FlowStatus { node_statuses, elapsed, budget_consumed }
- cancel() -- triggers CancellationToken
- await_completion() -> GraphOutput -- async, waits for result

Add GraphEngine::start() -> FlowHandle that spawns execution on a tokio task
and returns the handle immediately (similar to start_hot in hot.rs:117-223).
Keep existing execute() for synchronous use. FlowHandle is the async equivalent.

Follow HotGraphHandle (hot.rs:57-103) as the pattern: CancellationToken for
cancel, parking_lot::Mutex for shared state, JoinHandle for background task."""
