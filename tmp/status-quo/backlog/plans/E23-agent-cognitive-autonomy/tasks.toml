# ── T01: Agent lifecycle type-state machine ──────────────────────────

[[task]]
id = "E23-T01"
title = "Implement agent lifecycle type-state machine with compile-time state enforcement"
description = """
Add type-state types for agent lifecycle to crates/roko-agent/src/lifecycle.rs.
The existing AgentCoreManifest (lifecycle.rs:18-27) and AgentExtendedManifest
(lifecycle.rs:120-153) provide creation config. This task adds the runtime
state machine that enforces legal transitions at compile time.

States (each a distinct Rust struct):
- Initializing { manifest: AgentCoreManifest, created_at: Instant }
- Bootstrapping { manifest, capabilities: Vec<String> }
- Ready { manifest, capabilities }
- Running { manifest, capabilities, started_at: Instant, tick_count: u64 }
- Draining { manifest, reason: DrainReason, drain_started: Instant }
- Terminated { manifest, reason: TerminationReason, backup: Option<BackupHandle> }

Transitions consume self and produce the next state:
- Initializing -> Bootstrapping via validate(capabilities) -> Result<Bootstrapping>
- Bootstrapping -> Ready via bootstrap_complete() -> Ready
- Ready -> Running via start() -> Running
- Running -> Draining via drain(reason) -> Draining
- Running -> Terminated via terminate(reason) -> Terminated (emergency)
- Draining -> Terminated via complete_drain(backup) -> Terminated

Wrap all states in an AgentLifecycle enum for runtime storage where
compile-time enforcement isn't possible (e.g., serialization).
"""
role = "implementer"
status = "ready"
tier = "integrative"
files = ["crates/roko-agent/src/lifecycle.rs"]
depends_on = []
max_loc = 200

