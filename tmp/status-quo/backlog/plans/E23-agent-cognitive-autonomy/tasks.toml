# ── T05: Dual-process EFE routing ────────────────────────────────────

[[task]]
id = "E23-T05"
title = "Implement EFE tier routing: epistemic + pragmatic - cost"
description = """
Add EfeRouter to crates/roko-learn/src/active_inference.rs alongside the
existing BeliefState (active_inference.rs:18-24).

The existing active_inference module has a BeliefState with 90 latent states
(3 tiers x 3 skill levels x 10 confidence levels) and an observe() method
that does Bayesian updating. EfeRouter uses this infrastructure.

EfeRouter computes Expected Free Energy for each tier (T0/T1/T2):
  EFE(tier) = -epistemic_value(tier) - pragmatic_value(tier) + cost(tier) + regime_penalty(tier)

Where:
- epistemic_value = information gain from uncertainty reduction (high when
  surprise_rate is high, measured from CorticalState)
- pragmatic_value = expected task completion probability (from BeliefState)
- cost = token_estimate * price_per_million (tier-dependent)
- regime_penalty = 0.0 for Calm/Normal, 0.1 for Volatile, 0.5 for Crisis

The router returns the tier with lowest EFE (most efficient allocation of
cognitive resources). When surprise is low and task is routine, T0 wins.
When uncertainty is high, T2 wins despite higher cost.

EfeRouter struct:
- belief: BeliefState
- cost_table: HashMap<ModelTier, f64> (price per million tokens)
- route(surprise_rate: f32, regime: u8, task_difficulty: f64) -> ModelTier
"""
