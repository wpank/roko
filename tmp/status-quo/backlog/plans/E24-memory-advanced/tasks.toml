# ─────────────────────────────────────────────────────────────────────────────
# E24-T03: AntiKnowledge immunity with falsifier lifecycle
# ─────────────────────────────────────────────────────────────────────────────
# Existing AntiKnowledge support: KnowledgeKind::AntiKnowledge (lib.rs:128),
# refuted_insight_id/refutation_evidence fields (lib.rs:358-361),
# ANTI_KNOWLEDGE_CONFIDENCE_FLOOR (knowledge_store.rs:28), and HDC conflict
# detection thresholds (knowledge_store.rs:56-71). This task adds the falsifier
# lifecycle from the spec.
[[task]]
id = "E24-T03"
title = "Add falsifier lifecycle to AntiKnowledge for predictive immunity"
description = """Extend AntiKnowledge entries with a Falsifier lifecycle:

1. Add Falsifier struct to lib.rs (next to KnowledgeEntry):
   - predicate: String (the falsifiable claim this monitors)
   - observations: u32 (number of times checked)
   - violations: u32 (number of times falsified)
   - last_checked: DateTime<Utc>
   - active: bool (false once falsified)

2. Add Optional `falsifier` field to KnowledgeEntry (lib.rs:337):
   #[serde(default, skip_serializing_if = "Option::is_none")]
   pub falsifier: Option<Falsifier>

3. Add to KnowledgeStore:
   - check_falsifier(&self, entry_id: &str, violated: bool) -> Result<FalsifierOutcome>
     Increments observations, optionally increments violations. When
     violations >= min_violations_for_immunity (default 3), the entry
     is "immunized" -- its confidence is boosted to 0.9 and tier is
     promoted to Consolidated, because it has survived repeated falsification
     attempts. When violated=true AND the entry had no prior violations,
     the anti-knowledge entry is itself discredited (confidence *= 0.5).

4. Add FalsifierOutcome enum: { Survived, Immunized, Discredited }

This completes the v2 spec's "heuristics carry mandatory falsifiers" concept:
an AntiKnowledge entry that repeatedly survives falsification attempts becomes
more reliable, while one that is immediately violated loses credibility."""
