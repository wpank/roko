# ─────────────────────────────────────────────────────────────────────────────
# E24-T05: Knowledge lifecycle facade improvements
# ─────────────────────────────────────────────────────────────────────────────
# The existing lifecycle.rs has KnowledgeLifecycleManager (lifecycle.rs:~200),
