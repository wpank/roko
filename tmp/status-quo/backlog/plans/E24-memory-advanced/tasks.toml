3. Add batch_distill(&self, observations: &[RuntimeEpisodeObservation],
   reflections: &[String]) -> Result<BatchDistillationReport> for processing
   multiple episodes at once.

4. In the distillation, check for similarity against existing entries
   (via KnowledgeStore::query or query_hdc if available). If a highly similar
   entry exists (similarity > 0.8), reinforce it instead of creating a duplicate.

This connects the episode-to-knowledge loop: agent completes task -> gate
verifies -> episode recorded -> distillation extracts knowledge -> knowledge
store persists."""
