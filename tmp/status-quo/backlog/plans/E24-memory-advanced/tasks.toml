# ─────────────────────────────────────────────────────────────────────────────
# E24-T01: Knowledge as Signal -- add Kind field and demurrage mechanics
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec mandates that knowledge entries are Signals with Kind-specific
# half-lives and demurrage. The existing KnowledgeEntry (lib.rs:337-420) already
# has kind, half_life_days, confidence, tier, and balance fields. This task
# adds the balance-centric demurrage mechanics from the spec alongside the
# existing confidence decay.
[[task]]
id = "E24-T01"
title = "Add balance-based demurrage lifecycle to KnowledgeEntry"
description = """The existing KnowledgeEntry (lib.rs:337-420) has a `balance` field
(NEURO-10, lib.rs:411) defaulting to 1.0. The existing decay() method in
KnowledgeStore (knowledge_store.rs:992-1010) uses confidence-based exponential
decay. The spec calls for balance-based demurrage to run alongside
confidence decay as a complementary lifecycle mechanism.

Add to KnowledgeStore (knowledge_store.rs):
1. A `demurrage(&self, tax_rate: f64) -> Result<usize>` method that reduces
   every entry's balance by `tax_rate` per call (spec: 0.5% per day). Entries
   whose balance drops below 0.0 have their half_life_days halved (accelerating
   confidence decay). Returns count of affected entries.
2. A `reinforce(&self, entry_id: &str, signal: ReinforcementSignal) -> Result<()>`
   method that increases an entry's balance based on the signal type:
   - Retrieved: +0.05
   - Cited: +0.10
   - Gated: +0.15
   - Surprised: +0.08
   - AgentQuoted: +0.12
3. Entries with balance <= 0.0 for > 7 days are marked frozen (set frozen=true,
   frozen_at=Some(now)).

The existing ReinforcementSignal enum (lib.rs:480+) already defines these
variants. Wire the new methods into the existing lifecycle flow.

Do NOT replace the existing confidence decay -- demurrage is a complementary
mechanism that modulates the effective half-life of entries based on usage."""
status = "ready"
tier = "integrative"
model_hint = "claude-sonnet-4-5"
max_loc = 100
files = ["crates/roko-neuro/src/knowledge_store.rs"]
role = "implementer"
