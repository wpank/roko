# ─────────────────────────────────────────────────────────────────────────────
# E24-T02: HDC retrieval improvements -- role-filler queries
# ─────────────────────────────────────────────────────────────────────────────
# The existing HDC encoder (hdc.rs:1-80) has RoleFillerEncoder for structured
# encoding and ResonanceDetector for cross-domain analogy detection. KnowledgeStore
# query (knowledge_store.rs:~800) uses tag/keyword similarity by default and
# optional HDC Hamming distance (feature-gated). This task enhances HDC retrieval.
[[task]]
id = "E24-T02"
title = "Add HDC role-filler query support to KnowledgeStore"
description = """Add a `query_hdc` method to KnowledgeStore that uses the existing
RoleFillerEncoder (hdc.rs:17-40) for structured retrieval.

New method: KnowledgeStore::query_hdc(&self, query_vector: &HdcVector, top_k: usize)
-> Result<Vec<KnowledgeQueryHit>>

Implementation:
1. Read all entries with hdc_vector set (filter out entries where hdc_vector is None)
2. Compute Hamming similarity between query_vector and each entry's hdc_vector
   using HdcVector::hamming_similarity (roko-primitives)
3. Sort by similarity descending, take top_k
4. Return as KnowledgeQueryHit with total_score = similarity (reuse existing type)
5. Apply the existing QUERY_SCORE_FLOOR (knowledge_store.rs:26) filter

Also add a convenience method: query_by_role_filler(roles_and_fillers: &[(String, String)], top_k: usize)
that encodes the query using RoleFillerEncoder::encode_structured (hdc.rs:24)
then calls query_hdc.

Gate both methods behind #[cfg(feature = "hdc")] like existing HDC code.

Wire ResonanceDetector (hdc.rs:64-78) into a new method:
find_resonances(&self, min_similarity: f64) -> Result<Vec<ResonancePair>>
that scans all entries for cross-domain resonance patterns."""
