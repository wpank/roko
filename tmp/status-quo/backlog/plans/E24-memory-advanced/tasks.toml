# ─────────────────────────────────────────────────────────────────────────────
# E24-T06: Dream consolidation as knowledge compressor
# ─────────────────────────────────────────────────────────────────────────────
# The existing DreamRunner (runner.rs:720-769) handles dream cycles. The v2
# spec defines dream consolidation as a knowledge compression process that
# merges overlapping entries, promotes surviving entries, and runs counterfactual
# replay.
[[task]]
id = "E24-T06"
title = "Add knowledge consolidation phase to DreamRunner"
description = """Add a consolidation phase to DreamRunner that operates on the
KnowledgeStore during dream cycles.

1. Add DreamRunner::consolidate(&self, store: &KnowledgeStore) -> Result<ConsolidationReport>:
   a. Read all entries from store
   b. Group entries by overlapping tags (entries sharing >= 2 tags)
   c. For each group with 3+ entries: merge into a single consolidated entry
      with combined tags, averaged confidence, merged source_episodes, and
      content = concatenation of unique insights
   d. Promote merged entries: Transient->Working, Working->Consolidated
   e. Apply decay sweep (call store.decay())
   f. Apply demurrage sweep (call store.demurrage() from T01)
   g. GC dead entries (call store.gc_with_freeze())
   h. Return ConsolidationReport with merge_count, promoted, decayed, gc_removed

2. Add ConsolidationReport struct:
   - merge_count: usize
   - promoted: usize
   - decayed: usize
   - gc_removed: usize
   - elapsed: Duration

3. Wire consolidate() into the existing dream cycle flow in
   DreamRunner::run_cycle() (runner.rs:~800), called after the replay phase
   but before the report generation.

Follow the existing DreamReport pattern (runner.rs:~350) for report structure."""
