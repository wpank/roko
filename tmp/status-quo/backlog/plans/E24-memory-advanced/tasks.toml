title = "Add episode-to-knowledge distillation to lifecycle facade"
description = """Enhance KnowledgeLifecycleManager (lifecycle.rs) with automatic knowledge
distillation from completed episodes.

1. Add distill_from_episode(&self, observation: &RuntimeEpisodeObservation,
   reflection: &str) -> Result<DistillationResult> method that:
   - Creates a KnowledgeCandidateRecord from the observation
   - Uses LightAdmissionGate (admission.rs:38-55) to pre-filter
   - If gate passes: create KnowledgeEntry with:
     - kind = Heuristic (for successful patterns) or AntiKnowledge (for failures)
