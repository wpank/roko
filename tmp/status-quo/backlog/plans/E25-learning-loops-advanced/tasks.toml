# ── T01: L3 HDC defragmentation — knowledge consolidation ───────────

[[task]]
id = "E25-T01"
title = "Implement L3 HDC defragmentation via k-medoids clustering over knowledge entries"
description = """
Add a defragment function to roko-learn that consolidates fragmented knowledge.
Use the existing k_medoids clustering from hdc_clustering.rs over knowledge
entries' HDC vectors. For each cluster:
1. Bundle the cluster's vectors into a consolidated representative using
   HdcVector::bundle (majority-vote over the cluster members)
2. Merge metadata (tags union, max confidence, earliest created_at)
3. Mark original cluster members as superseded (add superseded_by field
   pointing to the new entry's id)
4. Preserve provenance links to original entries via source_entries Vec

This implements L3 consolidation from 07-LEARNING.md: turning N similar
entries into 1 distilled entry. The similarity threshold for clustering
should use HdcVector::similarity > 0.7 (same as TEMPLATE_SUGGESTION_MIN_SIMILARITY
in episode_logger.rs:50). Triggered during dream cycles or manually via CLI.

Implementation steps:
- Add DefragConfig struct (similarity_threshold: f64, min_cluster_size: usize)
- Add DefragResult struct (consolidated: Vec<ConsolidatedEntry>, superseded_count: usize)
- Add ConsolidatedEntry struct (vector, metadata, source_entry_ids)
- Add pub fn defragment(entries: &[KnowledgeEntry], config: &DefragConfig) -> DefragResult
- Call k_medoids internally to find clusters, then bundle each cluster
"""
