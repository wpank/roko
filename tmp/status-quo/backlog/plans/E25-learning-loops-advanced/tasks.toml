# ── T02: Hindsight relabeling for episodes ───────────────────────────

[[task]]
id = "E25-T02"
title = "Implement hindsight relabeling for past episode outcomes"
description = """
Add a hindsight_relabel module to roko-learn that retroactively adjusts
episode quality scores when later information reveals the initial assessment
was wrong. Cases:
1. A task marked successful that later caused a regression (downstream gate
   failure references the same files) -> downgrade success to false
2. A task marked failed whose approach was reused successfully in a later
   playbook -> upgrade by appending a positive adjustment
3. An episode whose heuristic was later falsified (playbook rule
   contradicted) -> reduce confidence via EpisodeAdjustment

The relabeler reads the episode log via EpisodeLogger::read_all(), cross-
references with current gate verdicts (GateVerdict in episode_logger.rs:89)
and PlaybookRules state, and emits EpisodeAdjustment records appended to
the episode log (not modifying existing records — append-only contract).

Implementation steps:
- Add EpisodeAdjustment struct: original_episode_id, adjustment_kind (enum),
  old_value, new_value, reason, timestamp
- Add HindsightRelabeler struct with scan(episodes, rules) -> Vec<EpisodeAdjustment>
- Staleness limit: only relabel episodes < 30 days old
- The scan is O(n*m) where n=recent episodes, m=gate verdicts — keep the
  staleness window small
"""
