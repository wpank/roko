# ── T03: CacheLookupCell — L1 hash + L2 semantic cache ──────────────

[[task]]
id = "E26-T03"
title = "Implement two-layer inference cache: L1 exact-hash + L2 SimHash semantic"
description = """
Add cache module to roko-gateway with two-layer caching
(08-GATEWAY.md sections 5.1-5.2, lines 267-348):

L1 (exact match): blake3 hash of normalized request -> CachedResponse.
Normalization (applied before hashing):
- Strip UUIDs matching [0-9a-f]{8}-[0-9a-f]{4}-...-[0-9a-f]{12}
- Strip ISO timestamps, cch= hashes, CWD: lines, Date: headers
- Replace git status blocks with [GIT_STATUS] placeholder
- Sort JSON keys alphabetically and tool definitions by name

CachedResponse: body (Bytes), cost_usd (f64), model (String),
cached_at (Instant), effective_ttl (Duration).

Uses HashMap<[u8; 32], CachedResponse> with LRU eviction (max 10,000).
Regime-aware TTL: Normal=3600s, Calm=7200s, Volatile=900s, Crisis=300s.

L2 (semantic): 64-bit SimHash fingerprint of request text.
Hamming distance <= 3 is a hit. DashMap<u64, SimHashEntry> with max
5,000 entries, fixed 7200s TTL.
SimHashEntry: response (Bytes), cost_usd, model, created_at, namespace.
Namespace isolation via prefix for multi-tenant deployments.

Exclusions (never cached): tool_use stop reason, <3 output tokens, errors.

Note: roko-agent already has a ResponseCache (cache.rs:15) for per-agent
content-addressed caching. This gateway cache is a SEPARATE layer with
more sophisticated normalization and two-layer lookup. Do not replace it.

Implementation:
- pub struct InferenceCache with l1 and l2 fields
- pub fn lookup(&self, request) -> Option<CachedResponse>
- pub fn store(&self, request, response) — non-blocking writes
- fn normalize(request) -> String — stripping/sorting
- fn simhash(text) -> u64 — 64-bit fingerprint
- fn hamming_distance(a: u64, b: u64) -> u32
"""
