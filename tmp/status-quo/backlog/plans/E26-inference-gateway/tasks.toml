# ── T10: Backpressure — per-provider, per-agent, global queues ──────

[[task]]
id = "E26-T10"
title = "Implement three-level backpressure: per-provider, per-agent, and global queue limits"
description = """
Add backpressure module to roko-gateway with concurrency enforcement
(08-GATEWAY.md section 14, lines 700-748):

Per-provider limits (from spec):
  Anthropic=50, OpenAI=50, Gemini=30, Perplexity=20, Ollama=4, OpenRouter=50.
Bounded channel depth = 2x concurrency limit (e.g. 100 for Anthropic).
Full channel -> return 503 Service Unavailable immediately.

Per-agent queue: max 8 in-flight requests (queued + executing).
Request 9 -> return 429 Too Many Requests with Retry-After: 2.

Global queue: max 200 total requests across all agents and providers.
Full -> return 503 with Retry-After: 5.

Tracking per provider: queue_depth, active_requests, rejected_count.
Exposed via /api/gateway/stats endpoint.

Implementation:
- pub struct BackpressureGuard with provider_limits, agent_limits, global_limit
- ProviderLimits: HashMap<String, Semaphore> (from tokio)
- AgentLimits: HashMap<String, AtomicU32> for per-agent in-flight counts
- GlobalLimit: AtomicU32 for total in-flight
- pub async fn acquire(provider, agent_id) -> Result<Permit, BackpressureError>
- BackpressureError: ProviderFull, AgentQueueFull, GlobalOverload
- pub fn stats() -> BackpressureStats (queue_depth, active, rejected per provider)
"""
