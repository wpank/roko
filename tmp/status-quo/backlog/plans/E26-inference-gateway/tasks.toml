# ── T02: LoopDetectCell — retry/oscillation/drift detection ─────────

[[task]]
id = "E26-T02"
title = "Implement LoopDetectCell with retry, oscillation, and drift detection"
description = """
Add loop_detect module to roko-gateway with SessionLoopState
(08-GATEWAY.md section 4, lines 233-265):

SessionLoopState per-session state:
- recent_calls: VecDeque<(String, [u8; 32])> ring buffer — (tool_name, blake3(args))
  capped at 16 entries, does not grow
- consecutive_identical: u32
- tokens_since_progress: u64

Three detection rules (from spec):
1. Retry: same tool + same args hash called 5+ times consecutively
   -> "You have called the same tool with the same arguments 5 times.
      Try a different approach."
2. Oscillation: A->B->A->B pattern repeats 3+ full cycles (6 entries)
   -> "You are oscillating between two actions. Break the loop by
      choosing a third option or stopping."
3. Drift: 15,000+ output tokens without new tool_result content
   -> "You have generated 15K+ tokens without making progress. Either
      take a concrete action or stop."

Injection mechanism: guidance string prepended to next system prompt.
Clears after one injection.

Counters: loops_detected, loop_injections, loop_retry_detected,
loop_oscillation_detected, loop_drift_detected.

Implementation:
- pub struct LoopDetector with HashMap<String, SessionLoopState> keyed by session_id
- pub fn record_call(&mut self, session_id, tool_name, args_hash, output_tokens)
- pub fn check_loop(&self, session_id) -> Option<String> — returns guidance
- pub fn take_guidance(&mut self, session_id) -> Option<String> — returns and clears
"""
