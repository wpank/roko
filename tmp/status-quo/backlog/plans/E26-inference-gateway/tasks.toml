title = "Implement KeyRing with lock-free AtomicUsize rotation on 429"
description = """
Add KeyRing struct and ProviderBackend trait to roko-gateway
(08-GATEWAY.md section 10.4, lines 500-527):

KeyRing manages provider API key rotation:
- keys: Vec<String> (multiple API keys per provider)
- active: AtomicUsize (current key index)
- pub fn current(&self) -> &str: read active key (Relaxed ordering),
  index wraps modulo keys.len()
- pub fn rotate(&self): increment index atomically (fetch_add with
  Relaxed ordering)

