title = "Implement InferenceHandle: keyless mpsc channel for agent inference"
description = """
Add InferenceHandle struct to roko-gateway that agents use for inference
without holding API keys (08-GATEWAY.md section 13, lines 652-698):

InferenceHandle (derives Clone):
- sender: mpsc::Sender<InferenceEnvelope>
- agent_id: AgentId (String)
- budget: Arc<AtomicU64> (remaining budget in microdollars, read-only from handle)

Methods:
- pub async fn infer(request) -> Result<InferenceResponse>: send request
