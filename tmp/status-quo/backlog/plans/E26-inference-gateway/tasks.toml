# ── T05: OutputBudgetCell — EMA-based max_tokens cap ────────────────

[[task]]
id = "E26-T05"
title = "Implement output budget: auto-set max_tokens from EMA statistics"
description = """
Add output_budget module to roko-gateway with per-model tracking
(08-GATEWAY.md section 7, lines 378-410):

ModelOutputStats per model:
- ema: f64 (EMA of output tokens, alpha=0.05)
- ema_sq: f64 (EMA of squared output tokens for variance)
- max_seen: u64
- count: u64

p95 estimate formula: ema + 2*sqrt(ema_sq - ema^2).
Cap = p95 * 1.5, with floor of 1024 tokens.
Only trusted after 20+ samples (count >= 20).

Behavior:
- No max_tokens set: auto-set to computed cap
- Unreasonably high max_tokens (>2x cap): reduce to cap
- Explicit max_tokens below cap: leave alone (do NOT reduce)

Counters: output_budgets_applied, output_tokens_bounded.

Implementation:
- pub struct OutputBudgeter with HashMap<String, ModelOutputStats>
- pub fn record_output(&mut self, model, output_tokens)
- pub fn apply_budget(&self, model, current_max_tokens) -> Option<u32>
  Returns Some(new_cap) when budget should be applied, None when no change
"""
