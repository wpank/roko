- pub async fn infer_stream(request) -> Result<impl Stream<Item = InferenceChunk>>:
  streaming variant using mpsc channel for chunks
- pub fn remaining_budget() -> u64: read budget atomically (Relaxed ordering)

InferenceEnvelope wraps:
- agent_id: AgentId
- request: InferenceRequest
- respond_to: oneshot::Sender<Result<InferenceResponse>> (for non-streaming)
  OR respond_to_stream: mpsc::Sender<InferenceChunk> (for streaming)

