# ── T07: CostTrackCell — actual vs naive cost computation ───────────

[[task]]
id = "E26-T07"
title = "Implement cost tracking with actual vs naive cost computation"
description = """
Add cost_track module to roko-gateway that computes per-request costs
(08-GATEWAY.md section 12, lines 596-650):

Use the existing ModelPricing from roko-learn/src/cost_table.rs (line 12)
and CostTable (line 36). Import via roko-learn dependency.

Per-request cost formula from spec:
  fresh_input   = (input - cache_read) * input_per_m / 1e6
  cached_input  = cache_read * cached_input_per_m / 1e6
  cache_write   = cache_creation * input_per_m * 1.25 / 1e6   (25% surcharge)
  regular_out   = (output - reasoning) * output_per_m / 1e6
  reasoning     = reasoning_tokens * reasoning_per_m / 1e6
  thinking      = thinking_tokens * output_per_m / 1e6
  actual_cost   = sum of above

  naive_cost    = total_input * input_per_m + total_output * output_per_m
  savings       = naive_cost - actual_cost

Batch requests get 50% discount on actual_cost.
Unknown models use SONNET_FALLBACK pricing (cost_table.rs:26).

Attribution: every cost record includes agent_id and session_id.
Integrates with existing GatewayEventWriter (gateway_events.rs:46)
for durable logging.

Implementation:
- pub struct CostTracker with cost_table: CostTable
- pub fn compute_cost(usage: &TokenUsage, model, is_batch) -> CostResult
- CostResult: actual_cost, naive_cost, savings, breakdown (CostBreakdown)
- CostBreakdown: fresh_input, cached_input, cache_write, regular_output,
  reasoning, thinking (all f64)
"""
