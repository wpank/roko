# ── T09: Feed-to-Bus bridge — pulse routing ─────────────────────────

[[task]]
id = "E27-T09"
title = "Wire feed pulses to the Bus event system for downstream consumption"
description = """
Add FeedBusBridge that routes FeedPulse events from running feeds to the
existing Bus/event system (09-FEEDS.md section 8, lines 480-520):

The bridge listens for FeedPulse from each running FeedCell (via the
RuntimeRegistry from T02) and publishes them as events on the Bus.

Topic pattern: "feed:{feed_id}:data" (e.g. "feed:file-watch-roko-dir:data")

FeedBusBridge:
- Spawned as a background task alongside RuntimeRegistry
- Subscribes to each running feed's output channel
- For each FeedPulse, wraps it as a Bus event and publishes to the topic
- Tracks per-feed: pulses_routed, bytes_routed, last_routed_at

This enables DerivedFeedCells (T04) to subscribe to upstream feed topics
and receive data without direct coupling to the producing feed.

The existing event bus in roko-runtime can receive these events. Check
how the event bus is used in orchestrate.rs for the integration pattern.

Implementation:
- pub struct FeedBusBridge with per-feed counters
- pub fn spawn(registry: Arc<RuntimeRegistry>) -> JoinHandle<()>
- fn route_pulse(feed_id, pulse, bus) — wraps and publishes
"""
role = "implementer"
status = "ready"
tier = "integrative"
files = ["crates/roko-core/src/feed_bus_bridge.rs"]
