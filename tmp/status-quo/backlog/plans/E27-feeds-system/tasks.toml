# ── T02: FeedRegistry v2 — runtime lifecycle management ─────────────

[[task]]
id = "E27-T02"
title = "Extend FeedRegistry with runtime lifecycle management and health tracking"
description = """
Extend the existing FeedRegistry (feed.rs:81) with runtime lifecycle:

1. Add FeedHandle struct that wraps a FeedCell + JoinHandle for its
   background task. Tracks: started_at, last_pulse_at, pulse_count,
   error_count.

2. Add RuntimeRegistry struct that owns running FeedHandles:
   - pub fn start(&mut self, cell: FeedCell) -> Result<FeedHandle>
     Spawns tokio task calling cell.connect() then cell.listen() in a loop
   - pub fn stop(&mut self, feed_id: &str) -> Result<()>
     Sends shutdown signal via CancellationToken, awaits JoinHandle
   - pub fn health(&self) -> Vec<FeedRuntimeStatus>
     Converts each FeedHandle state to FeedRuntimeStatus (feed.rs:163)
   - pub fn get(&self, feed_id: &str) -> Option<&FeedHandle>

3. Auto-reconnect on disconnect with exponential backoff:
   initial=1s, max=60s, factor=2. Reset on successful connect.

The existing FeedRegistry (feed.rs:81) stays as the static descriptor
registry. RuntimeRegistry manages the running instances.

Currently, runtime_feeds in AppState (roko-serve) returns hardcoded
FeedRuntimeStatus for file-watch, provider-health, isfr-keeper. This
new RuntimeRegistry replaces that with actual feed lifecycle management.
"""
