# ── T01: Feed Cell type — kernel decomposition of Connect+Trigger+Store ──

[[task]]
id = "E27-T01"
title = "Implement Feed as Cell + Connect + Trigger + Store kernel decomposition"
description = """
Add a FeedCell struct to roko-core that implements the kernel decomposition
(09-FEEDS.md section 1, lines 17-24):

Feed = Cell + Connect + Trigger + Store

FeedCell struct fields:
- cell_id, cell_name, version (from Cell protocol)
- connector: Box<dyn ConnectorOps> (wraps Connect methods)
- trigger: FeedTrigger (wraps Trigger: listen, filter, debounce, fire)
- store: Option<Box<dyn StoreOps>> (wraps Store: put, get, query, prune)
- config: FeedCellConfig (kind: FeedKind, access: FeedAccess, polling_interval: Duration)
- status: FeedStatus enum (Idle, Connecting, Connected, Degraded, Disconnected)

The existing FeedInfo (feed.rs:52) is the descriptor. FeedCell is the runtime
instance that actually connects, triggers, and stores. FeedInfo gets a
cell_id field to link to its FeedCell.

Connect protocol methods (from v2/11-CONNECTIVITY.md concept):
- async fn connect(&mut self) -> Result<()>
- async fn query(&self, q: &str) -> Result<Value>
- async fn disconnect(&mut self) -> Result<()>
- async fn health(&self) -> ConnectorStatus

Trigger protocol methods:
- async fn listen(&mut self) -> Result<()> — start watching
- fn filter(&self, event: &Value) -> bool — predicate
- fn debounce_ms(&self) -> u64 — minimum interval
- fn fire(&self, event: Value) -> FeedPulse — wrap event as pulse

Store protocol (optional, for persistence):
- async fn put(&self, key: &str, value: Value) -> Result<()>
- async fn get(&self, key: &str) -> Result<Option<Value>>

Implement Cell trait for FeedCell (cell_id, cell_name, protocols).

Note: Use existing ConnectorKind (connector.rs:24) and ConnectorStatus
(connector.rs:41) from roko-core. Do not duplicate.
"""
