# ── T04: DerivedFeedCell — feed composition with inputs ─────────────

[[task]]
id = "E27-T04"
title = "Implement DerivedFeedCell that computes output from upstream feed inputs"
description = """
Add DerivedFeedCell to roko-core that computes derived data from one or
more upstream feeds (09-FEEDS.md section 3, lines 224-290):

DerivedFeedCell is a FeedCell whose Trigger listens to output pulses from
upstream feeds (via Bus topic subscriptions) rather than external sources.

Struct fields:
- input_topics: Vec<String> — upstream feed topics to subscribe to
- transform: Box<dyn Fn(&[FeedPulse]) -> Option<FeedPulse>> — pure transform
- window: Option<Duration> — optional time window for aggregation
- input_buffer: VecDeque<(Instant, FeedPulse)> — buffered inputs within window

Behavior:
- On each input pulse, buffer it and call transform with all buffered pulses
- If transform returns Some, fire the derived pulse on the output topic
- If window is set, evict buffered pulses older than window
- If window is None, transform sees only the most recent pulse per input topic

Example use cases:
- Moving average feed: window=5min, transform averages numeric values
- Cost anomaly feed: window=1hr, transform computes z-score of costs
- Gate regression feed: no window, transform compares latest gate results

Connect: subscribe to input_topics on Bus (via existing event bus pattern)
Disconnect: unsubscribe from all input_topics
Health: connected when all input topics have produced at least one pulse
"""
