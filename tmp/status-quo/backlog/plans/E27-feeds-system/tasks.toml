# ── T05: Recipe as Graph of Score Cells ─────────────────────────────

[[task]]
id = "E27-T05"
title = "Implement Recipe as a pure-data Graph of Score Cells"
description = """
Add Recipe struct to roko-core (09-FEEDS.md section 5, lines 320-388):

A Recipe is a named Graph of Score Cells that transforms a set of feeds
into a final numeric score. Recipes are pure data — no side effects,
no external I/O. They compose from existing primitives.

Recipe struct:
- id: String
- name: String
- version: u32
- nodes: Vec<RecipeNode> — each node is a Score operation
- edges: Vec<RecipeEdge> — data flow between nodes
- input_feeds: Vec<String> — feed ids that provide input data
- output_schema: Option<Value> — JSON schema for the output

RecipeNode:
- id: String
- operation: ScoreOp enum (WeightedAverage, Normalize, Threshold,
  ZScore, Clamp, Rescale, Custom(String))
- params: HashMap<String, f64>

RecipeEdge:
- from: String (node id)
- to: String (node id)
- field: String (which output field to route)

Recipe execution:
- pub fn evaluate(&self, inputs: &HashMap<String, Value>) -> Result<Value>
  Topological sort nodes, evaluate each in order, return final output.
- pub fn validate(&self) -> Vec<String>
  Check: no cycles, all edges reference valid nodes, all input_feeds present.

Persistence: TOML file per recipe in .roko/recipes/
"""
