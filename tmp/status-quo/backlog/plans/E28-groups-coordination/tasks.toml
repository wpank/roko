# ─────────────────────────────────────────────────────────────────────────────
# E28-T01: Add core Group types to roko-core
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec (10-GROUPS.md §2) defines Group, GroupMember, GroupConfig,
# MemberRole, MemberPermissions, CoordinationMode, and KnowledgePolicy.
# None of these exist yet. Add all core types in a new groups module.
[[task]]
id = "E28-T01"
title = "Add Group, GroupMember, GroupConfig, CoordinationMode types"
description = """Create crates/roko-core/src/groups.rs with the following types:

- GroupId (newtype over String — matches existing ID patterns in this crate)
- Group { id: GroupId, name: String, description: String, owner: String,
  members: Vec<GroupMember>, coordination: CoordinationMode,
  config: GroupConfig, created_at: DateTime<Utc>, updated_at: DateTime<Utc> }
- GroupMember { agent_id: String, owner: String, role: MemberRole,
  permissions: MemberPermissions, joined_at: DateTime<Utc> }
- MemberRole { Leader, Member, Observer }
- MemberPermissions { read: bool, write: bool, execute: bool }
- GroupConfig { max_members: Option<usize>, auto_accept: bool, public: bool,
  knowledge_policy: KnowledgePolicy, pheromone_decay_rate: f64 }
- CoordinationMode { Stigmergic, Pipeline, Broadcast, LeaderFollower }
- KnowledgePolicy { Open, WriteLeader, Curated }

All types derive Serialize, Deserialize, Debug, Clone. Enums also derive
PartialEq, Eq. Use #[serde(rename_all = "snake_case")] on enums.
Register `pub mod groups;` in lib.rs and re-export key types."""
status = "ready"
role = "implementer"
tier = "integrative"
max_loc = 120
files = ["crates/roko-core/src/groups.rs", "crates/roko-core/src/lib.rs"]
