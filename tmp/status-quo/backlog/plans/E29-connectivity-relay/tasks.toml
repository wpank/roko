# ─────────────────────────────────────────────────────────────────────────────
# E29-T01: Define Connect protocol trait with 5 lifecycle methods
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec (11-CONNECTIVITY.md §1) defines Connect as one of the 9 Cell
# protocols. The existing connector.rs has ConnectorKind/ConnectorRegistry
# as data-only types. Add the async Connect trait with 5 methods and its
# associated request/response types.
[[task]]
id = "E29-T01"
title = "Define Connect protocol trait with connect/query/execute/health/disconnect"
description = """Add to crates/roko-core/src/connector.rs:

- async trait Connect (via async_trait) with 5 methods:
  - connect(&mut self, config: &ConnectConfig) -> Result<()>
  - query(&self, req: QueryRequest) -> Result<QueryResponse>
  - execute(&self, req: ExecuteRequest) -> Result<ExecuteResponse>
  - health(&self) -> Result<ConnectHealthStatus>
  - disconnect(&mut self) -> Result<()>

- ConnectConfig { endpoint: String, auth: Option<String>,
  headers: Option<HashMap<String, String>>, timeout_ms: u64 }
  (Note: the existing ConnectorConfig at line 54 is similar but this is
  the Connect-protocol-specific variant with slightly different semantics)
- QueryRequest { operation: String, params: serde_json::Value }
- QueryResponse { data: serde_json::Value, latency_ms: u64 }
- ExecuteRequest { operation: String, params: serde_json::Value }
- ExecuteResponse { result: serde_json::Value, latency_ms: u64 }
- ConnectHealthStatus { status: ConnectorStatus, latency_ms: u64,
  last_check: DateTime<Utc>, error: Option<String> }

Keep existing ConnectorKind, ConnectorConfig, ConnectorRegistry unchanged.
Add async_trait to roko-core Cargo.toml if not already present (it is
used by extension.rs)."""
status = "ready"
role = "implementer"
tier = "integrative"
max_loc = 100
files = ["crates/roko-core/src/connector.rs"]
