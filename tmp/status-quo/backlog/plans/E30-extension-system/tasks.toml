   let deadline = self.hook_timeout(ext.name());
   match tokio::time::timeout(deadline, ext.pre_inference(request)).await {
     Ok(Ok(())) => { /* success */ }
     Ok(Err(e)) => { /* hook error — record_failure */ }
     Err(_) => { /* timeout — treat as hook error, record_failure */ }
   }

The existing methods iterate extensions and call hooks directly. Wrap each
call with timeout. On timeout, log warning and continue to next extension."""
