# ─────────────────────────────────────────────────────────────────────────────
# E30-T01: Add CaMeL IFC types (CamelTag, ProvenanceEntry, TaintLevel)
# ─────────────────────────────────────────────────────────────────────────────
# The v2 spec (12-EXTENSIONS.md §2) requires capability provenance tracking
# via CaMeL information flow control. Every data flow through an Extension
# must be tagged with its capability provenance.
[[task]]
id = "E30-T01"
title = "Add CamelTag, ProvenanceEntry, TaintLevel for IFC tracking"
description = """Add to crates/roko-core/src/extension.rs:

- TaintLevel enum { Trusted, Local, External, Untrusted }
  with PartialEq, Eq, PartialOrd, Ord (Trusted < Local < External < Untrusted)
  and serde(rename_all = "snake_case")
- TagOperation enum { Passthrough, Transform, Merge }
  with PartialEq, Eq, serde(rename_all = "snake_case")
- ProvenanceEntry { handler: String, timestamp: DateTime<Utc>, operation: TagOperation }
- CapabilitySet { capabilities: HashSet<String> } (wrapper with intersection/union helpers)
- CamelTag { capabilities: CapabilitySet, provenance: Vec<ProvenanceEntry>,
  taint_level: TaintLevel }

Add methods on CamelTag:
  - propagate(&self, handler: &str, operation: TagOperation) -> CamelTag
    (appends handler to provenance, returns new tag — taint level never decreases)
  - merge(tags: &[&CamelTag]) -> CamelTag
    (intersects capabilities, takes worst taint, concatenates provenance)

These types are foundational — used by extension hook return types and
the CaMeL monitor. Add chrono, HashSet imports if not already present."""
