# ── T01: Define TriggerProtocol trait and core types in roko-core ───────
[[task]]
id = "E31-T01"
title = "Add TriggerProtocol trait, TriggerBinding, TriggerEvent, and TriggerState types"
description = """
The v2 spec (13-TRIGGERS.md SS1-2) defines the Trigger protocol: arm/disarm
operations, TriggerBinding (persistent TOML config), TriggerEvent (fired
event), TriggerHandle, TriggerState, and TriggerSource enum (7 kinds).

Create `crates/roko-core/src/trigger.rs` with:
  - `pub trait TriggerProtocol: Send + Sync` with `arm(&self, binding, bus) -> Result<TriggerHandle>` and `disarm(&self, handle) -> Result<()>`
  - `TriggerHandle` struct: id, binding, armed_at, state
  - `TriggerState` enum: Armed, Firing, Cooldown { until }, Disarmed, Failed { error }
  - `TriggerEvent` struct: trigger_id, fired_at, payload (serde_json::Value), source, space_id, trace_id
  - `TriggerSource` enum with 7 variants: Cron, Webhook, FileWatch, Bus, ChainEvent, Manual, SignalPattern
  - `TriggerBinding` struct: name, kind (TriggerKind), graph, input_mapping, concurrency, filter, enabled, space, auth
  - `TriggerKind` enum wrapping per-kind config structs (CronTrigger, WebhookTrigger, etc.)

Register `pub mod trigger;` in lib.rs and add re-exports. Use async_trait
(already in roko-core Cargo.toml). Use placeholder String types where
CellRef/GraphRef/SpaceId/etc. don't exist yet.

Note: roko-plugin already has a `TriggerDef` enum at manifest.rs:156-192
with 3 variants (Cron/FileWatch/Webhook). The core types here are
protocol-level with full spec fidelity (7 source kinds, state machine,
etc.) -- distinct from the manifest-level stubs.
"""
