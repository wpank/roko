# ── T04: Evolve conductor watchers toward Trigger Cell specialization ───
[[task]]
id = "E31-T04"
title = "Add TriggerCellAdapter wrapper so conductor watchers can be used as trigger sources"
description = """
The v2 spec (13-TRIGGERS.md SS9) describes conductor watchers as internal
triggers. Currently the 10 watchers in roko-conductor implement the React
trait (pure function: `decide(&self, &[Engram], &Context) -> Vec<Engram>`).

The watchers module (crates/roko-conductor/src/watchers/mod.rs) has 10
watchers: GhostTurn, ReviewLoop, IterationLoop, TestFailureBudget,
ContextWindowPressure, CompileFailRepeat, StuckPattern, TimeOverrun,
CostOverrun, SpecDrift. The conductor (conductor.rs:60) composes them
via `Vec<Box<dyn React>>` and applies an InterventionPolicy (WorstSeverityPolicy
at conductor.rs:64).

Add a `TriggerCellAdapter` in `crates/roko-conductor/src/adapter.rs` that
wraps any watcher's output (WatcherOutput with Severity enum) into a
TriggerEvent-compatible form. This bridge lets existing watchers
participate in the trigger system without rewriting them. The adapter maps:
  - Severity::Info (interventions.rs:33) -> no trigger (skip)
  - Severity::Warning (interventions.rs:35) -> trigger with metadata action=Restart
  - Severity::Critical (interventions.rs:37) -> trigger with metadata action=Fail

Register the new module in conductor's mod.rs.
"""
role = "implementer"
status = "ready"
tier = "focused"
files = ["crates/roko-conductor/src/adapter.rs", "crates/roko-conductor/src/lib.rs"]
