description = """
The existing discover_plugins (manifest.rs:297) scans directories and returns
Vec<LoadedPlugin> but does not handle version conflicts. When two directories
contain plugins with the same name but different versions, both are returned
with no deduplication. PluginDependency (line 196) has an optional version
field but it is never validated.

Add a resolve_plugins function as a post-processing step:
  resolve_plugins(discovered: Vec<LoadedPlugin>) -> Result<Vec<LoadedPlugin>>

