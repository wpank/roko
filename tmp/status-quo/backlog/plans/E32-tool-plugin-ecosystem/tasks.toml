# ── T01: Formalize 5-tier Plugin SDK types in roko-plugin ───────────────
[[task]]
id = "E32-T01"
title = "Add PluginSdkTier enum and PluginCapability declaration to roko-plugin"
description = """
The v2 spec (14-TOOLS.md §1, 12-EXTENSIONS.md §3-4) defines a 5-tier SPI:
1. Prompts (markdown/TOML), 2. Config (profile bundles), 3. Declarative tools
(subprocess/HTTP/MCP), 4. WASM (fuel-metered), 5. Native Rust (in-tree).

The existing roko-plugin/src/manifest.rs has PluginManifestFile (line 62) with
prompts, profiles, tools fields — but no explicit tier declaration. Meanwhile,
roko-agent/src/safety/capabilities.rs:29 already has a PluginTier enum with
5 tiers (Untrusted=1 through Kernel=5) plus allowed_capabilities() at line 56.

Add an optional `tier` field to PluginManifestFile that deserializes to the
existing PluginTier from capabilities.rs (re-export or type-alias — do NOT
duplicate). When tier is absent, infer it from manifest content:
  - has tools -> tier 3 (Standard)
  - has only prompts -> tier 1 (Untrusted)
  - has profiles but no tools -> tier 2 (Sandboxed)

Also add a PluginCapability struct to declare what a plugin requires (fs access,
network egress, secrets, exec), distinct from what the tier allows. This lets
validate_manifest (line 234) verify that declared capabilities are a subset of
what the tier permits.
"""
role = "implementer"
status = "ready"
tier = "focused"
files = ["crates/roko-plugin/src/manifest.rs"]
depends_on = []
max_loc = 50

