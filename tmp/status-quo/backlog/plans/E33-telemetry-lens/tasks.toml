[[task]]
id = "E33-T08"
title = "Add lens circuit breaker with 3-stage degradation"
description = """
Implement the performance circuit breaker from docs/v2/15-TELEMETRY.md SS10.
Create `crates/roko-core/src/lens_circuit_breaker.rs` with:

  1. `LensBreakerStage` enum: Active, Sampled, Disabled

  2. `LensCircuitBreaker` struct:
     - stage: LensBreakerStage
     - consecutive_violations: u32
     - total_violations: u64
     - budget_pct: f64 (default 0.01 -- 1% overhead budget)
     - sample_threshold: u32 (default 3 -- violations before sampling)
     - disable_threshold: u32 (default 10 -- violations before disable)

  3. Methods:
     - `new(budget_pct: f64) -> Self`
     - `with_thresholds(mut self, sample: u32, disable: u32) -> Self` (builder)
     - `check(&mut self, lens_duration_ms: u64, cell_duration_ms: u64) -> LensBreakerAction`
       Returns what to do: Allow, Skip (sampled), Disable
     - `should_invoke(&self) -> bool` (pre-check: false when Disabled)
     - `reset(&mut self)` (operator re-enables, starts in Sampled mode)
     - `stage(&self) -> LensBreakerStage` (getter)

  4. Stage progression:
     - Active: first violation -> log warning, stay Active
     - Active: sample_threshold consecutive violations -> move to Sampled
     - Sampled: disable_threshold consecutive violations -> move to Disabled
     - Disabled: stays disabled until reset() called
     - Any stage: if check passes (no violation), reset consecutive_violations to 0

  5. `LensBreakerAction` enum: Allow, Skip, Disable

This is a pure synchronous state machine -- no async, no IO, no tokio.
Add unit tests for each stage transition and edge cases.

Register `pub mod lens_circuit_breaker;` in lib.rs.

Note: roko-conductor has a circuit_breaker.rs with Holt forecasting and
binary open/closed states -- this is a separate, simpler mechanism specific
to lens overhead tracking with 3 degradation stages.
"""
