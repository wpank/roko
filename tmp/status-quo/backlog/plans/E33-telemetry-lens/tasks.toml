title = "Add LensRegistry with stacking, chaining, and scope routing"
description = """
Implement lens composition from docs/v2/15-TELEMETRY.md SS6. Create
`crates/roko-core/src/lens_registry.rs` with:

  1. LensConfig struct (TOML-parseable):
     name: String, block: String, scope: String, params: BTreeMap<String, Value>
     The `scope` field is a string that parses into a LensScope: "graph",
     "agent", "cell:{name}", "lens:{name}", "global", etc.

  2. LensRegistration struct (runtime):
     config: LensConfig, scope: LensScope, observes: Vec<ObservableEventKind>

  3. LensRegistry struct:
     - registrations: Vec<LensRegistration>
     - chains: BTreeMap<String, Vec<String>> (lens name -> downstream lens names)
     - Methods:
       - register(&mut self, config: LensConfig) -> Result<()>
       - route(&self, event: &ObservableEvent) -> Vec<&LensRegistration>
         (returns lenses whose scope + observes filter matches)
       - chain_order(&self) -> Result<Vec<String>>
         (topological sort of chained lenses, reject cycles)

  4. Composition rules (implemented):
     - Stacking: multiple lenses on same target receive same events independently
     - Chaining: scope "lens:{name}" delivers upstream output to downstream
     - Topological sort uses Kahn's algorithm to detect cycles at registration
     - Cycle detection returns Err with the cycle path for debugging

  5. parse_scope(s: &str) -> Result<LensScope> helper:
     "global" -> Global, "graph" -> Graph("".into()),
     "agent" -> Agent("".into()), "cell:{name}" -> Cell(name),
     "lens:{name}" -> Lens(name), etc.

