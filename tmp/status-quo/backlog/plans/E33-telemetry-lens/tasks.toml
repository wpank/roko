# ─────────────────────────────────────────────────────────────────────
# T01: Define telemetry Observe protocol trait and ObservableEvent enum
# ─────────────────────────────────────────────────────────────────────
# NAMING CONFLICT: An `Observe` trait ALREADY EXISTS at traits.rs:400:
#   `pub trait Observe: crate::cell::Cell { fn observe(&self) -> Vec<Engram>; }`
# It is re-exported from lib.rs:308. The v2 telemetry Observe protocol
# has a completely different signature (async, takes &ObservableEvent,
# returns Vec<Signal>). Use a DISTINCT name to avoid collision.

[[task]]
id = "E33-T01"
title = "Add telemetry Observe trait, LensScope, and ObservableEvent/Kind enums to roko-core"
description = """
Define the telemetry Observe protocol as specified in docs/v2/15-TELEMETRY.md SS2-3.

CRITICAL: An Observe trait ALREADY EXISTS at traits.rs:400:
  `pub trait Observe: crate::cell::Cell { fn observe(&self) -> Vec<Engram>; }`
It is re-exported from lib.rs:308. The new telemetry trait has a completely
different signature. You MUST use a distinct name: `TelemetryObserve` (or
`LensObserve`). Do NOT modify the existing Observe trait.

Create `crates/roko-core/src/telemetry_observe.rs` with:

  - `pub trait TelemetryObserve: Send + Sync` with 3 methods:
    - `async fn observe(&self, event: &ObservableEvent) -> Result<Vec<Signal>>`
    - `fn observes(&self) -> &[ObservableEventKind]`
    - `fn scope(&self) -> LensScope`

  - `LensScope` enum (6 variants):
    Cell(String), Graph(String), Agent(String), Space(String),
    Lens(String), Global
    Use String placeholders where CellRef/GraphRef/AgentRef/SpaceId
    don't exist as concrete types yet.

  - `ObservableEvent` enum with 38 variants across 8 lifecycle families
    (exact variants from spec SS3, lines 72-127):
    Signal (8: Created, Scored, Routed, Verified, Composed, DemurrageApplied, Promoted, Pruned)
    Cell (7: Started, Completed, Failed, Retried, Cancelled, PredictionPublished, CalibrationReceived)
    Graph (6: Started, NodeCompleted, Completed, Failed, Paused, Resumed)
    Agent (7: Tick, RegimeChange, BudgetUpdate, ModeChange, PhaseChange, StateTransition, SlotUpdate)
    Memory (4: Retrieved, Stored, Consolidated, DemurrageApplied)
    Verify (2: PreResult, PostResult)
    Trigger (3: Fired, Armed, Disarmed)
    Extension (2: HookCalled, HookFailed)

  - `ObservableEventKind` filter enum (9 variants):
    SignalLifecycle, CellLifecycle, GraphLifecycle, AgentLifecycle,
    MemoryLifecycle, VerifyLifecycle, TriggerLifecycle, ExtensionLifecycle, All

Register `pub mod telemetry_observe;` in lib.rs.
Use String for all ref types. The trait needs async_trait (already in roko-core deps).
The observe() method returns Vec<Signal> (not Vec<Engram> like the existing Observe trait).
"""
role = "implementer"
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-6"
files = ["crates/roko-core/src/telemetry_observe.rs", "crates/roko-core/src/lib.rs"]
