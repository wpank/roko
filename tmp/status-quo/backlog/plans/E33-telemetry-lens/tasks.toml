  - CohortWeights::update (line 86) -- gradient step learner
  - CFactorSummary (line 103) -- compact summary for policy eval
  - CFactorPolicy (line 153) -- React that emits warnings

What ALREADY EXISTS must NOT be duplicated. Add the following to
telemetry_observe.rs (NOT cfactor.rs, to avoid modifying existing code):

1. CFactorPayload struct (distinct from CFactorSummary):
   space: String, interval_ms: u64, c_factor: f64,
   turn_taking_entropy: f64, peer_prediction_accuracy: f64,
   citation_reciprocity: f64, hdc_diversity: f64,
   agent_count: usize, active_agents: usize,
   dominant_agent_share: f64, knowledge_flow_edges: usize,
   avg_agent_vitality: f64

2. Five pure sub-lens compute functions:
   - `pub fn turn_taking_entropy(turns_per_agent: &[u64]) -> f64`
     H = -sum(p_i * ln(p_i)) / ln(N), guard for N<=1 and total==0
   - `pub fn peer_prediction_accuracy(predictions: &[f64], outcomes: &[f64]) -> f64`
     1.0 - MSE, clamped to [0.0, 1.0], return 0.5 for empty input
   - `pub fn citation_reciprocity(survived_weights: &[f64], total_weights: &[f64]) -> f64`
     Weighted fraction of survived citations
   - `pub fn delivery_rate(confirmed: u64, dropped: u64) -> f64`
     confirmed / (confirmed + dropped), return 1.0 for total==0
   - `pub fn hdc_diversity(pairwise_similarities: &[f64]) -> f64`
     1.0 - mean similarity, return 0.0 for empty input

All compute functions must be pure (no async, no IO).
Add unit tests for edge cases: empty input, single agent, uniform dist.
"""
