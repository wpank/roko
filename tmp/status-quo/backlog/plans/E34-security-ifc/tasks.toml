Implement the capability intersection model from docs/v2/16-SECURITY.md SS1.

  - Capability enum: ReadFs, WriteFs, Network, Shell, Llm, Secrets, Bus (7 individual caps)
  - CapabilitySet struct wrapping a bitflag (u8 or bitflags! macro) with BitAnd impl
  - Three named layers:
