[[task]]
id = "E34-T03"
title = "Implement 5-layer immune pipeline (perception-assessment-response-validation-escalation)"
description = """
Build the immune system pipeline from docs/v2/16-SECURITY.md SS3.

The existing immune.rs has: AnomalyScore (line 30), QuarantineDecision (line 80),
QuarantineEntry (line 92), QuarantineVault (line 181), ImmuneResponse (line 154).
These cover screening + quarantine but not the full 5-stage pipeline:

  - ImmunePipeline struct with 5 ordered stages
  - Stage 1 — Perception: wraps existing AnomalyScore computation (detect anomalies)
  - Stage 2 — Assessment: classify threat severity via ThreatSeverity enum
    (Low/Medium/High/Critical) based on anomaly score thresholds
  - Stage 3 — Response: select action via existing QuarantineDecision + ResponseAction,
    plus new IsolateAgent and RateLimitAgent actions
  - Stage 4 — Validation: verify response didn't cause collateral damage —
    a pure check that the response action doesn't affect unrelated entries
  - Stage 5 — Escalation: auto-handle Low/Medium, emit escalation event for High/Critical

Each stage is a function taking the previous stage's output. The pipeline is
synchronous and pure — no IO, no async.
"""
