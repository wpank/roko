# ─────────────────────────────────────────────────────────────────────
# T04: 5-head lexicographic corrigibility
# ─────────────────────────────────────────────────────────────────────

[[task]]
id = "E34-T04"
title = "Implement 5-head lexicographic corrigibility ordering"
description = """
Implement the corrigibility ordering from docs/v2/16-SECURITY.md SS4.

  - CorrigibilityHead enum: Deference, Switch, Truth, Impact, Task (in priority order)
  - HeadVerdict enum: Pass, Veto(reason) — the result of evaluating one head
  - CorrigibilityDecision struct: per-head verdicts as [(CorrigibilityHead, HeadVerdict)]
  - lexicographic_compare(a, b) -> Ordering — compare two decisions by head priority;
    higher-priority head verdicts dominate
  - evaluate_action(action_description, context) -> CorrigibilityDecision — score an
    action against all 5 heads, returning verdicts in priority order
  - Any head that vetoes blocks the action regardless of lower-priority heads
  - The ordering is strict: Deference > Switch > Truth > Impact > Task

Place in a new `crates/roko-core/src/corrigibility.rs` module. Add `pub mod corrigibility;`
to lib.rs. The evaluator is a pure function — no IO, no async.
"""
