[[task]]
id = "E34-T08"
title = "Wire taint lattice and corrigibility checks into agent safety hooks"
description = """
Connect the IFC and corrigibility primitives to the agent safety layer.

The safety module (crates/roko-agent/src/safety/) has 17 submodules including
hooks.rs (SafetyHook trait, HookDecision, TaintedString, TaintLabel, DataSink)
and contract.rs (AgentContract with BUNDLED_CONTRACTS, tool allowlists). Wire:

  1. In hooks.rs: add a TaintLevelHook implementing SafetyHook that:
     - Extracts TaintLevel from the ToolContext
     - Checks against the agent's declared max_taint_level
     - Returns HookDecision::Reject if input taint exceeds the agent's level
  2. In contract.rs: extend AgentContract with a max_taint_level field
     (defaults to TaintLevel::External for backward compat)
  3. In hooks.rs: add a CorrigibilityHook implementing SafetyHook that:
     - Evaluates the proposed tool call against the 5-head ordering
     - Returns HookDecision::Reject if any head vetoes
  4. Log all taint-based refusals via SafetyAuditRecord (hooks.rs:132)
  5. Ensure existing TaintedString / TaintLabel / DataSink IFC (hooks.rs:10-99)
     is compatible with TaintLevel

Do NOT break existing hook chain — add new hooks alongside existing ones.
"""
role = "implementer"
status = "ready"
tier = "integrative"
files = ["crates/roko-agent/src/safety/hooks.rs", "crates/roko-agent/src/safety/contract.rs"]
depends_on = ["E34-T01", "E34-T02", "E34-T04"]
max_loc = 80

[task.context]
read_files = [
  { path = "crates/roko-agent/src/safety/hooks.rs", lines = "1-100", why = "TaintedString, TaintLabel, DataSink IFC primitives + can_flow_to()" },
  { path = "crates/roko-agent/src/safety/hooks.rs", lines = "118-200", why = "HookDecision enum, SafetyAuditRecord, SafetyHook async trait" },
  { path = "crates/roko-agent/src/safety/contract.rs", lines = "1-60", why = "AgentContract, BUNDLED_CONTRACTS, BundledContractAsset" },
  { path = "crates/roko-agent/src/safety/contract.rs", lines = "14-23", why = "NETWORK_TOOLS and EDIT_TOOLS constants" },
  { path = "crates/roko-agent/src/safety/mod.rs", lines = "1-47", why = "Safety module: 17 submodules, SafetyLayer struct, ToolDispatcher integration" },
]
symbols = [
  "SafetyHook — hooks.rs:192, async trait on_tool_call() -> HookDecision",
  "HookDecision — hooks.rs:121, enum Allow/AllowModified/Reject(String)",
  "SafetyAuditRecord — hooks.rs:132, struct for audit logging of safety decisions",
  "TaintedString — hooks.rs:44, labeled string with can_flow_to(DataSink) -> bool",
  "TaintLabel — hooks.rs:23, enum WalletSecret/OwnerSecret/StrategyConfidential/UserPII/UntrustedExternal",
  "AgentContract — contract.rs, behavioral contract with invariants, governance, recovery",
  "BundledContractAsset — contract.rs:26, struct { role, path, source } for embedded YAML contracts",
]
anti_patterns = [
  "Do NOT break existing safety hook chain — add IFC hooks alongside existing ones",
  "Do NOT silently drop tainted inputs — always log the refusal via SafetyAuditRecord",
  "Do NOT bypass the SafetyHook trait — implement it properly for both new hooks",
  "Do NOT modify existing TaintedString semantics — TaintLevel is complementary",
]

[[task.verify]]
phase = "structural"
command = "grep -q 'TaintLevelHook\\|taint_level_hook\\|CorrigibilityHook' crates/roko-agent/src/safety/hooks.rs"
fail_msg = "New safety hook implementations must exist"

[[task.verify]]
phase = "structural"
command = "grep -q 'max_taint_level\\|taint_level' crates/roko-agent/src/safety/contract.rs"
fail_msg = "AgentContract must have max_taint_level field"

[[task.verify]]
phase = "compile"
command = "cargo check -p roko-agent 2>&1"
fail_msg = "roko-agent must compile"

[[task.verify]]
phase = "test"
command = "cargo test -p roko-agent safety 2>&1"
fail_msg = "Safety tests must pass"
