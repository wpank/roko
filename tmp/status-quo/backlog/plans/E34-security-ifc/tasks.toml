# ─────────────────────────────────────────────────────────────────────
# T01: Formalize taint lattice IFC with 4 trust levels
# ─────────────────────────────────────────────────────────────────────

[[task]]
id = "E34-T01"
title = "Add TaintLevel lattice enum and monotonic propagation rules"
description = """
Formalize the taint lattice IFC from docs/v2/16-SECURITY.md SS2.

The existing provenance.rs has a `Taint` enum (9 variants: Clean, LlmHallucination,
ToolFailure, UserFlagged, StaleData, UnverifiedSource, Propagated, UserInput, Custom)
and a `Provenance` struct with a `trust: f32` field. The spec requires a discrete
4-level lattice that sits alongside these:

  - TaintLevel enum: Trusted (0), Local (1), External (2), Untrusted (3)
  - Implement PartialOrd based on lattice ordering (Trusted < Local < External < Untrusted)
  - TaintLevel::join(a, b) -> TaintLevel — returns the higher (more restrictive) of two
  - TaintLevel::can_flow_to(from, to) -> bool — true only if from <= to (monotonic)
  - Add a `taint_level: TaintLevel` field to the existing Provenance struct
  - Signal::effective_taint() — combines the Taint variant + TaintLevel into a trust decision

The lattice maps naturally to the existing trust scores: Trusted=1.0, Local=0.75,
External=0.1, Untrusted=0.0.
"""
role = "implementer"
status = "ready"
tier = "focused"
files = ["crates/roko-core/src/provenance.rs"]
depends_on = []
max_loc = 80

