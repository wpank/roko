# ─────────────────────────────────────────────────────────────────────
# T06: Relay token protocol for inter-agent auth
# ─────────────────────────────────────────────────────────────────────

[[task]]
id = "E35-T06"
title = "Implement relay token protocol for delegated agent-to-agent auth"
description = """
Add relay token support from docs/v2/17-AUTH.md SS5.

When agent A needs to delegate a subset of its capabilities to agent B, it issues
a relay token. The relay token is strictly narrower than the parent:

  - RelayToken struct: { token_id, parent_token_id, delegated_capabilities (Vec<AgentCapability>),
    target_agent_id, max_depth: u8, depth: u8, issued_at, expires_at }
  - POST /api/relay-tokens — issue a relay token. Requires a valid agent token.
    Validates: delegated_capabilities is subset of parent, depth < max_depth.
  - Capability narrowing: relay capabilities MUST be a subset of parent capabilities.
    The endpoint returns 400 if any requested capability is not in the parent.
  - Depth limiting: max_depth decrements on each delegation. When depth reaches 0,
    no further relay tokens can be issued from this token.
  - Validation: when a relay token is presented, verify the entire chain back to
    the root agent token. If any token in the chain is revoked, reject.
  - Revocation cascading: revoking a parent agent token invalidates all relay tokens
    whose chain includes that parent.

Place relay token logic alongside agent tokens in auth.rs.
"""
role = "implementer"
status = "ready"
tier = "focused"
files = ["crates/roko-serve/src/routes/auth.rs"]
depends_on = ["E35-T02"]
max_loc = 80

