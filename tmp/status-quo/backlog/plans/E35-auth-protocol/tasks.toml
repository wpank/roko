# ─────────────────────────────────────────────────────────────────────
# T03: JWKS cache hardening and key rotation handling
# ─────────────────────────────────────────────────────────────────────

[[task]]
id = "E35-T03"
title = "Harden JWKS cache with proactive refresh, key rotation, and staleness alerts"
description = """
Extend the existing JwksCache in crates/roko-serve/src/jwks.rs.

The current implementation has a JwksCache with CACHE_TTL (1 hour), MAX_STALE
(24 hours), and a validate() method that already handles rotation (refetch + retry
on kid miss). Harden edge cases:

  - Proactive background refresh: add start_refresh_task() that spawns a tokio task
    refreshing every TTL/2 (30 minutes). Use tokio::sync::Notify to avoid concurrent
    refresh storms.
  - Staleness monitoring: in validate(), if keys are >24h stale, log tracing::warn!
    with structured fields. If >48h stale, reject all tokens (fail closed).
  - Multi-provider support: change JWKS URL from a single &str to Vec<JwksProvider>
    where JwksProvider = { url, expected_issuer }. Validate iss claim per provider.
  - Cache health API: add methods:
    - is_fresh() -> bool (last refresh < CACHE_TTL)
    - keys_count() -> usize
    - last_refresh() -> Option<Instant>
    - cache_health() -> CacheHealth { fresh, key_count, age_secs, stale }
  - Error resilience: on network failure, continue using stale keys with
    tracing::warn! rather than failing all auth.
"""
