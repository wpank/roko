[[task]]
id = "E35-T01"
title = "Add API key rotation and expiry enforcement to auth routes"
description = """
Extend the existing API key management in crates/roko-serve/src/routes/auth.rs.

The current auth.rs has CreateApiKeyRequest/Response, hash-based storage, and
CRUD endpoints. The middleware.rs has extract_bearer_token() (line 28),
is_structurally_valid_jwt() (line 49), and API key validation via SHA-256 hashing.
The config uses ApiKeyEntry and ServeAuthConfig from roko-core. Add:

  - POST /api/api-keys/{name}/rotate — generate new key, invalidate old,
    return new plaintext once. Keep last 2 hashes for a 5-minute grace period
    so in-flight requests with old key don't fail immediately.
  - Expiry enforcement: in the auth middleware (middleware.rs), after matching a key
    hash, check `expires_at` field. Reject expired keys with 401 + `X-Key-Expired: true`
    header so clients can distinguish "wrong key" from "expired key".
  - last_used_at tracking: on each successful key auth, update the key's last_used_at
    timestamp. This enables stale-key detection (keys unused for >90 days).
  - Scope validation: add a `scopes` field to ApiKeyEntry with values like
    "admin", "agent:write", "read". Check scope against route requirements.
  - Persist rotation history in .roko/api-keys.json (append previous hash with
    expiry timestamp).
"""
