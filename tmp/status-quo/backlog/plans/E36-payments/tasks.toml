# ── E36-T04: Implement reputation-based pricing tier resolution ──
#
# The spec defines 5 pricing tiers based on agent reputation. Currently
# reputation_registry.rs has EMA scores but no pricing integration. Add
# a function that maps reputation scores to PricingTier and computes the
# effective price multiplier.

[[task]]
id = "E36-T04"
title = "Add reputation-to-pricing-tier resolution function"
description = """
Add pricing tier resolution based on aggregate reputation scores.

The current reputation_registry.rs has ReputationRegistry with 7-domain EMA scoring
(REPUTATION_DOMAINS at line 51: coding, security, research, chain, knowledge,
operations, strategy), adaptive alpha (line 206), and 30-day half-life decay toward
neutral 0.5 (NEUTRAL at line 33). DisciplineState (line 62) has
GoodStanding/Probation/Suspended/Banned. Add:

  - resolve_pricing_tier(registry, passport_id, now) -> PricingTierResult
  - PricingTierResult struct: { tier_name: String, price_multiplier: f64,
    aggregate_score: f64, discipline: String }
  - Tier thresholds (aggregate = mean of all 7 domain effective scores):
    - Free: discipline != GoodStanding (suspended/banned agents get free tier = cannot sell)
    - Starter: aggregate < 0.4
    - Standard: 0.4 <= aggregate < 0.6
    - Professional: 0.6 <= aggregate < 0.8
    - Enterprise: aggregate >= 0.8
  - Price multiplier: Free=0.0, Starter=0.5, Standard=1.0, Professional=1.5, Enterprise=2.0
  - The function does NOT import roko-core PricingTier — it returns string tier names
    to avoid circular dependencies. The caller maps to PricingTier.
"""
