# ── E36-T02: Extend x402 payment protocol with settlement batching ──
#
# x402.rs has PaymentRequest/PaymentAuthorization and a per-request
# verification flow, but lacks the settlement batch queue described in
# the spec: "Batch (10min or 100+ auths)". Add a SettlementBatch struct
# that accumulates authorizations and a batch_settle method.

[[task]]
id = "E36-T02"
title = "Add SettlementBatch accumulator to x402 payment protocol"
description = """
Add settlement batching to the existing x402 payment protocol.

The current x402.rs has X402Manager (line 189) with create_payment_request(),
verify_authorization(), record_nonce(), and state channel management
(open_channel, update_channel, request_close, finalize_close). The spec requires
batch settlement: "Batch (10min or 100+ auths)". Add:

  - SettlementBatch struct: { authorizations: Vec<(PaymentAuthorization, PaymentRequest)>,
    created_at: u64, max_batch_size: usize, batch_timeout_secs: u64 }
  - SettlementBatch::new(max_size: usize, timeout_secs: u64) -> Self
  - add_authorization(auth, request) -> bool — returns false if batch is full
  - should_settle(current_timestamp: u64) -> bool — true if batch_size >= 100
    OR elapsed time >= timeout (default 600 seconds = 10 min)
  - drain() -> Vec<(PaymentAuthorization, PaymentRequest)> — take all pending
    authorizations, resetting the batch
  - Wire into X402Manager: add a SettlementBatch field and queue_for_settlement()
    method that adds verified authorizations to the batch

Do NOT change existing PaymentRequest/PaymentAuthorization structs.
"""
