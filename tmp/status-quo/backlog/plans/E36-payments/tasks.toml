# ── E36-T03: Add MPP session-based metered pricing protocol ──
#
# The spec defines Metered Payment Protocol (MPP): one ERC-3009 per
# session with settlement on session close/expire. roko-chain has x402
# for per-request but no session-based protocol. Add MppSession and
# MppSessionManager types alongside x402.

[[task]]
id = "E36-T03"
title = "Add MPP session-based metered pricing types to roko-chain"
description = """
Add Metered Payment Protocol (MPP) session types alongside x402.

The spec defines MPP as the session-based alternative to x402's per-request model:
one ERC-3009 authorization per session, usage metered during the session, final
settlement on session close or expiry. Add:

  - MppSession struct: { session_id: [u8; 32], subscriber: Address (from phase2),
    provider: Address, authorization: PaymentAuthorization, usage_units: u64,
    rate_per_unit: u256, max_cost: u256, started_at: u64, deadline: u64,
    state: MppSessionState }
  - MppSessionState enum: Active, Closed, Expired, Disputed
  - MppSessionManager struct: { sessions: HashMap<[u8; 32], MppSession> }
  - meter_usage(session_id, units: u64) -> Result<(), MppError> — increments
    usage_units, checks against max_cost
  - settle(session_id) -> Result<MppSettlement, MppError> — computes final
    amount = usage_units * rate_per_unit, transitions to Closed
  - is_expired(session_id, current_timestamp) -> bool — checks deadline
  - expire_stale(current_timestamp) — marks all past-deadline sessions as Expired

Keep types in x402.rs since both protocols share the same module. Use Address
and u256 from phase2.rs.
"""
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-6"
max_loc = 60
files = ["crates/roko-chain/src/x402.rs"]
role = "implementer"
