# ── E36-T01: Define payment domain types and pricing tiers ──
#
# The spec (18-PAYMENTS) defines two payment protocols (x402, MPP),
# 5 reputation-based pricing tiers, and settlement batching. x402.rs
# already has PaymentRequest/PaymentAuthorization types but lacks the
# higher-level payment domain types: PricingTier, SessionPricing, and
# FeedPricingConfig. Add these to roko-core so both roko-chain and
# roko-serve can reference them without circular deps.

[[task]]
id = "E36-T01"
title = "Add payment domain types: PricingTier, SessionPricing, FeedPricingConfig"
description = """
Add payment domain types to roko-core::feed alongside the existing FeedAccess::Paid.

The current feed.rs has FeedAccess enum (Public/Private/Paid at line 39) and
FeedInfo (line 52) with no pricing details. The spec defines:

  - PricingTier enum with 5 tiers:
    - Free: no payment required, price_multiplier = 0.0
    - Starter: basic access, price_multiplier = 0.5
    - Standard: default tier, price_multiplier = 1.0
    - Professional: priority access, price_multiplier = 1.5
    - Enterprise: SLA-backed, price_multiplier = 2.0
  - SessionPricing struct: { base_rate_per_minute: f64, burst_rate: f64,
    max_session_cost: f64, settlement_interval_secs: u64 }
  - FeedPricingConfig struct: { tier: PricingTier, per_request_cost: f64,
    session_pricing: Option<SessionPricing>, protocol: PaymentProtocol }
  - PaymentProtocol enum: X402 (per-request), Mpp (session-based)

All types must derive Serialize, Deserialize, Clone, Debug. Keep types pure data
with no chain/crypto dependencies — roko-core must stay lightweight.
"""
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-6"
max_loc = 60
files = ["crates/roko-core/src/feed.rs"]
role = "implementer"
depends_on = []

[task.context]
