[[task]]
id = "E36-T07"
title = "Add x402 payment verification middleware for feed routes"
description = """
Add x402 payment verification to the feed subscription routes.

The spec defines payment as a Verify Cell: a subscription request must pass
through payment verification before data flows. In the HTTP serve layer,
feed routes exist in routes/feeds.rs. Add:

  - x402 header handling in feed routes or middleware:
    1. On request for a paid feed (FeedAccess::Paid), check for
       X-Payment-Authorization header
    2. If missing: respond with 402 Payment Required + JSON body containing
       a PaymentRequest (recipient, amount, token, nonce, deadline)
    3. If present: parse the X-Payment-Authorization header, validate structure
       (correct JSON shape matching PaymentAuthorization fields), check amount
       >= required. Do NOT verify signatures — just structural validation.
    4. On valid structure: pass through to feed handler
  - Non-paid feeds (FeedAccess::Public, Private) bypass payment check entirely
  - Add require_payment() middleware function following the require_api_key pattern
    from middleware.rs

The middleware returns 402 (not 401 or 403) to signal the specific payment
requirement per the HTTP 402 spec.
"""
