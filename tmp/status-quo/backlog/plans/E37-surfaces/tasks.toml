# StateHub projections. projection_contract.rs has ProjectionEnvelope<T>
# (line 42) and DataQuality (line 65) but not the per-surface projection
# structs (FlowSummary, InboxItem, AgentPosition, AutonomyConfig, etc.).
# Define the core projection contracts so all rendering targets can share them.
