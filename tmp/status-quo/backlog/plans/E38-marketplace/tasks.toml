files = ["crates/roko-cli/src/main.rs"]
role = "implementer"
depends_on = ["E38-T01"]

[task.context]
read_files = [
    { path = "crates/roko-cli/src/main.rs", lines = "1-100", why = "Main CLI entrypoint with clap (Parser, Subcommand at line 21); imports at lines 17-67; exit codes at lines 77-82. Find the Subcommand enum to add Market variant" },
    { path = "crates/roko-cli/src/main.rs", lines = "100-200", why = "CLI struct and Subcommand enum — add Market subcommand with nested MarketCmd enum" },
    { path = "docs/v2/21-MARKETPLACE.md", lines = "969-986", why = "CLI surface: roko market browse/show/install/uninstall/upgrade/fork/publish/unpublish/deprecate/mirror/verify/analytics/revenue" },
]
symbols = [
    "Cli — main.rs, top-level clap Parser struct",
    "Commands — main.rs, Subcommand enum dispatched by main()",
]
anti_patterns = [
    "Do NOT implement full marketplace logic — stubs that print 'not yet implemented' and exit 0",
    "Do NOT change existing subcommand routing — add Market alongside existing variants",
    "Do NOT add dependencies beyond what's already imported — stubs just println!",
]

[[task.verify]]
phase = "structural"
command = "grep -qE 'Market|market' crates/roko-cli/src/main.rs"
fail_msg = "Market subcommand must exist in main.rs"

[[task.verify]]
phase = "structural"
command = "grep -qE 'Browse|Install|Publish|Fork' crates/roko-cli/src/main.rs"
fail_msg = "Marketplace sub-subcommands (Browse, Install, Publish, Fork) must exist"

[[task.verify]]
phase = "compile"
command = "cargo check -p roko-cli 2>&1"
fail_msg = "roko-cli must compile"

acceptance = ["Market variant in Commands enum with MarketCmd nested Subcommand; MarketCmd has Browse{query, tag, kind, featured}, Show{artifact_ref}, Install{artifact_ref}, Uninstall{artifact_ref}, Fork{artifact_ref, new_name}, Publish{local_name}, Verify{artifact_ref} variants; each prints a stub message ('roko market <cmd>: not yet implemented') and exits 0; --help shows all marketplace subcommands"]
