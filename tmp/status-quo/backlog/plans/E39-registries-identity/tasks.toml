# ─── T08: Add identity auto-registration to agent startup ────────────────────
#
# Per spec (22-REGISTRIES §2.4), when an agent starts and chain.network
# is configured, it should check for a registered identity.
# identity_economy_identity.rs has AgentId (line 18), DidDocument
# (line 44), VerificationMethod (line 65), DidServiceEndpoint (line 78)
# — all placeholder types. Add IdentityState for local state management.

[[task]]
id = "E39-T08"
title = "Add identity state file and auto-registration check at agent startup"
description = """
Per spec section 2.4, when an agent starts and chain.network is configured, it
should check for a registered identity. Implement:
1. IdentityState struct (token_id: Option<u128>, wallet: Option<String>,
   registered_at_block: Option<u64>, name: String) with serde.
2. load_identity_state(roko_dir) / save_identity_state(roko_dir, state)
   reading/writing .roko/state/identity.json.
3. An ensure_identity(roko_dir) function that loads state, checks if token_id
   is set, and returns IdentityCheckResult (Registered{token_id} or NeedsRegistration).
Place in the existing identity_economy_identity.rs since it already has the
identity types. This is the local (non-chain) half of the flow.
"""
role = "implementer"
status = "ready"
tier = "focused"
files = ["crates/roko-chain/src/identity_economy_identity.rs"]
depends_on = ["E39-T01"]
max_loc = 60

[task.context]
read_files = [
    { path = "crates/roko-chain/src/identity_economy_identity.rs", lines = "1-80", why = "AgentId = u256 (line 18), Blake3Hash (line 21), Signature (line 24), DidDocument (line 44), VerificationMethod (line 65), DidServiceEndpoint (line 78) — existing identity types" },
    { path = "crates/roko-chain/src/phase2.rs", lines = "30-50", why = "u256 (line 44), Address = String (line 32) — types used by identity" },
    { path = "docs/v2/22-REGISTRIES.md", lines = "180-190", why = "Auto-registration flow: read config, hash capabilities, call register, store token_id in .roko/state/identity.json, verify on subsequent starts" },
]
symbols = [
    "AgentId — identity_economy_identity.rs:18, u256 alias for passport IDs",
    "DidDocument — identity_economy_identity.rs:44, placeholder DID document",
    "Blake3Hash — identity_economy_identity.rs:21, [u8; 32] hash type",
]
anti_patterns = [
    "Do NOT make chain calls — this is the local state management half only",
    "Do NOT use async — keep synchronous file I/O with std::fs",
    "Do NOT add new dependencies — use serde_json (already available) for JSON file I/O",
]

[[task.verify]]
phase = "structural"
command = "grep -q 'IdentityState' crates/roko-chain/src/identity_economy_identity.rs && grep -q 'ensure_identity\\|load_identity_state' crates/roko-chain/src/identity_economy_identity.rs"
fail_msg = "IdentityState and ensure_identity/load_identity_state must exist"

[[task.verify]]
phase = "structural"
command = "grep -q 'IdentityCheckResult' crates/roko-chain/src/identity_economy_identity.rs"
fail_msg = "IdentityCheckResult enum must exist"

[[task.verify]]
phase = "compile"
command = "cargo check -p roko-chain 2>&1"
fail_msg = "roko-chain must compile"

acceptance = ["IdentityState struct with token_id, wallet, registered_at_block, name (all Option except name) with Serialize/Deserialize; load_identity_state(roko_dir: &Path) reads .roko/state/identity.json, returns Ok(IdentityState) or default if missing; save_identity_state(roko_dir: &Path, state: &IdentityState) writes JSON; IdentityCheckResult enum: Registered{token_id: u128}, NeedsRegistration; ensure_identity(roko_dir: &Path) -> IdentityCheckResult loads and checks"]
