# ─── T01: Upgrade AgentRegistry to ERC-8004 transferable identity ────────────
#
# The current AgentRegistry (agent_registry.rs) implements soulbound
# (non-transferable) ERC-721 passports. The doc header at line 1 says
# "soulbound (non-transferable)"; transfer() at line 163 always returns
# Err(SoulboundTransferDenied) at line 169; RegistryError::SoulboundTransferDenied
# is at line 75.
#
# The v2 spec (22-REGISTRIES §2) requires ERC-8004 transferable NFTs
# with delegation caveats, service_endpoints, and feeds fields.
# AgentPassport is defined in phase2.rs and imported at line 14.

[[task]]
id = "E39-T01"
title = "Convert AgentRegistry from soulbound to ERC-8004 transferable identity"
description = """
The current AgentRegistry (agent_registry.rs) implements soulbound (non-transferable)
ERC-721 passports. The v2 spec (22-REGISTRIES.md section 2) requires ERC-8004
transferable NFTs with delegation caveats. Update the existing AgentRegistry to:
1. Remove the SoulboundTransferDenied error (line 75) and make transfer() succeed (line 163).
2. Add a TransferHistory vec tracking previous owners.
3. Add delegation_caveats field to AgentPassport (Vec<DelegationCaveat>).
4. Add service_endpoints and feeds fields per spec section 2.3.
Update existing tests to reflect transferability.
"""
role = "implementer"
status = "ready"
tier = "focused"
files = ["crates/roko-chain/src/agent_registry.rs"]
depends_on = []
max_loc = 80

