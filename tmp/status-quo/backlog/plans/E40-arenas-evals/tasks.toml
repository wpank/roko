# ─── T03: Implement ArenaRegistry (arena CRUD + attempt tracking) ────────────

[[task]]
id = "E40-T03"
title = "Implement ArenaRegistry for arena lifecycle and attempt tracking"
description = """
Build the ArenaRegistry state machine managing arena instances and tracking attempts.
Follow the Marketplace pattern (marketplace.rs:127-155): HashMap-based store + state machine.

Implement:
1. ArenaError enum (NotFound, DuplicateArena, InvalidState, CooldownActive,
   MaxAttemptsReached, ArenaNotActive).
2. ArenaRegistry struct: arenas (HashMap<[u8;32], Arena>),
   attempts (HashMap<[u8;32], Vec<Attempt>>), current_block (u64).
3. set_block(block) — update current block.
4. create_arena(arena) -> Result<(), ArenaError> — insert in Draft state, reject duplicates.
5. activate_arena(id) / pause_arena(id) / conclude_arena(id) — state transitions
   with validation (only Draft->Active, Active->Paused, Active/Paused->Concluded).
6. start_attempt(arena_id, agent_id) -> Result<Attempt, ArenaError>
   — validate: arena is Active, agent hasn't exceeded max_attempts,
   cooldown_blocks since last attempt is satisfied.
7. submit_attempt(attempt_id) — transition to Evaluating.
8. complete_attempt(attempt_id, score, gate_verdicts) / fail_attempt(attempt_id)
   — final state transitions.
9. get_attempts_for_agent(arena_id, agent_id) and get_arena_attempts(arena_id) queries.
10. At least 3 unit tests: create+activate lifecycle, attempt with cooldown, max attempts.
"""
