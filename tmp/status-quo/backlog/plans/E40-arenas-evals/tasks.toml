   sorted by aggregate_score descending), computed_at_block (u64).
3. ArenaRegistry::compute_leaderboard(arena_id) -> Result<Leaderboard, ArenaError>
   — collects completed attempts per agent, applies the arena's AggregationRule:
   * BestOf(n): take best n scores, average them
   * AverageLastN(n): average the last n scores
