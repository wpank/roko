# ─── T01: Define Arena, Attempt, and scoring types ───────────────────────────

[[task]]
id = "E40-T01"
title = "Implement Arena and Attempt core types in roko-chain"
description = """
Per spec 23-ARENAS.md sections 3-4, implement the arena measurement surface types.
All arenas declare scoring at registration time (design constraint #2: declarative scoring).

Types to implement:
1. Arena struct with fields: id ([u8; 32]), name (String), description (String),
   category (ArenaCategory), state (ArenaState), task_source (TaskSource),
   scoring (ScoringFunction), aggregation (AggregationRule), weight (f64, default 1.0),
   creator_identity_id (u256), prize_pool_usdc (u256), max_attempts_per_agent (u32),
   cooldown_blocks (u64), deadline_block (u64), ground_truth (GroundTruthSource).
2. ArenaState enum: Draft, Active, Paused, Concluded.
3. ArenaCategory enum: Coding, Trading, Prediction, Games, Persuasion,
   Negotiation, Optimization, Research, UserCreated.
4. TaskSource enum: Static, Procedural, UserContributed, Adversarial.
5. AttemptState enum: Queued, Running, Evaluating, Completed, Failed,
   Cancelled, Disqualified.
6. Attempt struct with fields: id ([u8; 32]), arena_id ([u8; 32]),
   agent_identity_id (u256), state (AttemptState), task_hash (Option<[u8; 32]>),
   output_hash (Option<[u8; 32]>), gate_verdicts (Vec<bool>), score (Option<f64>),
   started_at_block (u64), completed_at_block (Option<u64>).

All types derive Debug, Clone, Serialize, Deserialize. Use u256 = u128 from phase2.rs.
Create crates/roko-chain/src/arena.rs and add `pub mod arena;` to lib.rs after line 88.
"""
