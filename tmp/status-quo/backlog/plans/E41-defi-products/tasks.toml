# ─── T03: Implement reputation option pricing types ──────────────────────────

[[task]]
id = "E41-T03"
title = "Implement ReputationOptionPricer with Black-Scholes approximation"
description = """
Per spec 24-DEFI.md section 3.2, reputation options give agents the right (not
obligation) to buy/sell reputation at a strike price. Pricing uses a simplified
Black-Scholes model where volatility is derived from reputation variance.

Implement:
1. ReputationOptionPricer struct (stateless, all methods take params):
   * price_call(current_score, strike_score, time_to_expiry_blocks,
     volatility, risk_free_rate) -> f64
   * price_put(current_score, strike_score, time_to_expiry_blocks,
     volatility, risk_free_rate) -> f64
   * Using simplified Black-Scholes: C = S*N(d1) - K*e^(-rT)*N(d2)
     where d1 = (ln(S/K) + (r + sigma^2/2)*T) / (sigma*sqrt(T))
     and d2 = d1 - sigma*sqrt(T).
   * N(x) approximation: use the Abramowitz-Stegun polynomial approximation.
2. estimate_volatility(score_history: &[(u64, f64)]) -> f64
   — compute historical volatility from score observations as annualized std dev
     of log returns. Returns 0.0 if fewer than 3 data points.
3. OptionGreeks struct: delta (f64), gamma (f64), theta (f64), vega (f64).
4. compute_greeks(params...) -> OptionGreeks — compute all four Greeks.
5. At least 3 tests: call pricing, put-call parity, zero-volatility edge case.
"""
role = "implementer"
status = "ready"
tier = "focused"
files = ["crates/roko-chain/src/defi.rs"]
depends_on = ["E41-T01"]
max_loc = 100

