# ─── T06: Implement affect-modulated position sizing ─────────────────────────

[[task]]
id = "E41-T06"
title = "Add prospect_value and affect_size_multiplier functions to roko-daimon"
description = """
Per spec 24-DEFI.md section 6.4, position sizing uses prospect theory
(Tversky & Kahneman 1992). These are pure functions for the trading pipeline.

Implement:
1. prospect_value(pnl: f64) -> f64
   — gains: x^0.88, losses: -2.25 * |x|^0.88
   — returns 0.0 for pnl == 0.0
2. affect_size_multiplier(pleasure: f64, arousal: f64, dominance: f64) -> f64
   — maps PAD state to a position size multiplier in [0.25, 1.5]:
   * Low arousal + positive valence -> 1.0-1.5x (calm confidence)
   * High arousal + negative valence -> 0.25-0.5x (panic reduction)
   * Neutral -> 1.0x
   * Formula: base = 1.0, arousal_factor = 1.0 - arousal * 0.5,
     pleasure_factor = 1.0 + pleasure * 0.25, result = base * arousal_factor * pleasure_factor
     clamped to [0.25, 1.5]
3. At least 3 tests: positive P&L, negative P&L (loss aversion > 1),
   high-arousal-negative-pleasure reduction.

Add as standalone pub functions in roko-daimon/src/lib.rs. These do NOT modify
DaimonState — they are pure computations.
"""
