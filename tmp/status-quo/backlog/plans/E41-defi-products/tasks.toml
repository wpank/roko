# ─── T02: Implement reputation bond lifecycle ────────────────────────────────

[[task]]
id = "E41-T02"
title = "Implement BondRegistry for reputation bond issuance and settlement"
description = """
Per spec 24-DEFI.md section 3.1, reputation bonds allow agents to borrow against
future reputation. The bond lifecycle: Issue -> Active -> Matured/Defaulted -> Settled.

Implement:
1. BondError enum: NotFound, InsufficientCollateral, BondNotMatured,
   AlreadySettled, InvalidState, CouponAlreadyPaid.
2. BondRegistry struct: bonds (HashMap<[u8;32], Instrument>),
   coupon_payments (HashMap<[u8;32], Vec<CouponPayment>>), current_block (u64).
3. CouponPayment struct: block_number (u64), amount (u256), paid (bool).
4. issue_bond(issuer_id, face_value, coupon_rate, payment_frequency, collateral,
   duration_blocks) -> Result<Instrument, BondError>
   — create bond instrument, validate collateral >= face_value * collateral_ratio.
5. pay_coupon(bond_id) -> Result<CouponPayment, BondError>
   — check if coupon is due (current_block - last_payment >= frequency), mark paid.
6. mature_bond(bond_id) -> Result<(), BondError>
   — transition Active -> Matured when current_block >= created + duration.
7. settle_bond(bond_id, repayment_amount) -> Result<u256, BondError>
   — release collateral after full repayment.
8. default_bond(bond_id) -> Result<u256, BondError>
   — seize collateral when repayment fails, return seized amount.
9. At least 3 tests: issue + mature + settle, coupon payment, default seizure.
