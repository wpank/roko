# ─── T02: Implement 7 config invariant validators ────────────────────────────

[[task]]
id = "E42-T02"
title = "Implement the 7 config invariants as validation functions"
description = """
Per spec 19-CONFIG.md section 5.1, 7 invariants must hold for every loaded config.
The current validation.rs only checks runner.dangerously_skip_permissions.

Add a pub fn validate_invariants(config: &RokoConfig) -> Vec<InvariantResult> function
that checks all 7 and returns structured results.

Invariants to implement:
1. Budget ordering: max_turn_usd <= max_plan_usd
   — error if violated (prevents individual turns from exceeding plan budget)
2. Gate iterations hierarchy: rung N max_iterations >= rung N+1 max_iterations
   — warning if violated (higher rungs should not retry more than lower)
3. Provider existence: every model's provider field references an existing provider
   — error if violated (already partially checked in loader.rs collect_diagnostics)
4. Agent capacity vs budget: max_agents * estimated_cost_per_agent <= max_plan_usd
   — warning if likely to exceed (estimated_cost_per_agent = max_turn_usd * 10 heuristic)
5. Context limit bounds: agent.context_limit_k is within [4, 1000]
   — warning if outside range (too small is useless, too large wastes budget)
6. Conductor parallelism: conductor.max_agents >= 1
   — error if 0 (must allow at least one agent)
7. Learning consistency: if learning.replan_on_gate_failure is true,
   then gates must not be completely disabled
   — warning if gates.skip_tests && gates.clippy_enabled == false with replan enabled

Also implement:
- InvariantResult struct: invariant_id (u8), severity (InvariantSeverity),
  message (String), config_path (String).
- InvariantSeverity enum: Error, Warning.
- At least 4 tests covering budget ordering, provider existence,
  capacity warning, and passing config.
"""
role = "implementer"
status = "ready"
tier = "focused"
files = ["crates/roko-core/src/config/validation.rs"]
