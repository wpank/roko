# ─── T01: Add ConfigSource priority enum with Evolved/Composed variants ──────

[[task]]
id = "E42-T01"
title = "Add ConfigSource::Evolved and ConfigSource::Composed variants with priority ordering"
description = """
Per spec 19-CONFIG.md section 2.1, the config resolution has a priority hierarchy.
The current ConfigSource enum (provenance.rs) has File/Migration/Default/Env/LocalOverride/CliOverride
but lacks the spec-required Evolved and Composed variants.

Implement:
1. Add ConfigSource::Evolved variant — for values learned/adapted at runtime by the
   learning subsystem (e.g., cascade router adjusted gate thresholds).
2. Add ConfigSource::Composed variant — for the final merged output (not a source itself,
   marks the result of multi-source resolution).
3. Add ConfigSource::ApiOverride variant — for runtime-only changes via the HTTP API
   (e.g., POST /api/config with runtime overrides).
4. Implement ConfigSource::priority(&self) -> u8 method:
   * ApiOverride -> 5 (highest)
   * CliOverride -> 4
   * Env -> 3
   * File -> 2
   * LocalOverride -> 2 (same as File, resolved by source-specificity)
   * Evolved -> 1
   * Migration -> 1 (same as Evolved)
   * Default -> 0
   * Composed -> 0 (not prioritized — it's the output)
5. Implement Ord/PartialOrd for ConfigSource based on priority().
6. Add ConfigProvenance::evolved(key, reason) and ::api_override(key, reason) constructors.
7. At least 2 tests: priority ordering, evolved constructor.

Do NOT rename existing variants — add new ones alongside.
"""
