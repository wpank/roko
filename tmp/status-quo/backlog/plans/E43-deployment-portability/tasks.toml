# ─── T02: Brain import with selective decay and dedup ───

[[task]]
id = "E43-T02"
title = "Enhance brain import with Merkle verification, decay, and dedup"
description = """
KnowledgeStore::import() exists (knowledge_store.rs:941-964) and already applies a confidence
discount and resets tier to Transient. What is MISSING per spec:

1. **Merkle root verification** — before ingesting, recompute the merkle root from entry IDs
   in the imported file and verify it matches the header's merkle_root field. Reject if mismatch.
2. **Configurable decay factor** — the existing `ImportOptions.confidence_discount` defaults
   to 0.85. Update the default to 0.80 per spec. Ensure the CLI allows override via
   `--decay-factor 0.8`.
3. **HDC dedup** — before ingesting each entry, check cosine similarity against existing
   entries. Skip entries with HDC cosine sim >0.95 (duplicate). This requires the `hdc` feature.
   Without `hdc`, fall back to tag+keyword overlap dedup (existing logic).
4. **Contradiction skip** — skip entries whose topic contradicts existing high-confidence
   (>0.8) entries. Use the existing anti-knowledge conflict detection pattern from ingest().
5. **Import summary log** — log: entries_imported, entries_skipped_dedup, entries_skipped_contradiction.
"""
