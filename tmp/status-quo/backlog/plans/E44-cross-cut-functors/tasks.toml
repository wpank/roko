# ─── T01: Define CrossCutFunctor trait ───

[[task]]
id = "E44-T01"
title = "Define CrossCutFunctor trait with pre_enrich and post_enrich hooks"
description = """
The spec (26-CROSS-CUTS.md:38-62) defines cross-cuts as endofunctors F: Signal -> Signal
wrapping Cells with pre/post enrichment. No CrossCutFunctor trait exists in the codebase.

Add to roko-compose (new file `cross_cut.rs` or in lib.rs):

1. **CrossCutFunctor trait** — async trait with:
   - `fn name(&self) -> &str` — identity (e.g. "memory", "daimon", "dreams", "safety")
   - `async fn pre_enrich(&self, input: Vec<Signal>, ctx: &CrossCutContext) -> Result<Vec<Signal>>`
   - `async fn post_enrich(&self, output: Vec<Signal>, ctx: &CrossCutContext) -> Result<Vec<Signal>>`
   - `fn should_short_circuit(&self) -> bool` — optimization hint

2. **CrossCutContext** — lightweight context struct holding: current loop step (SENSE/ASSESS
   /COMPOSE/ACT/VERIFY/PERSIST/REACT), plan_id, task_id, agent_role.

3. **EnrichedCell** — wrapper that applies one or more CrossCutFunctors to an inner operation:
   `pre_enrich(input) -> operation(enriched_input) -> post_enrich(output)`.

4. **Re-export** from lib.rs public API.

The trait must be generic over the context and NOT depend on concrete Cell types from other
crates. Keep roko-compose as the home since it already owns composition strategy.
"""
