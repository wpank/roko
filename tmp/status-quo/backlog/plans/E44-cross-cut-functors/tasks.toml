# ─── T03: Implement DaimonFunctor (F_daimon) ───

[[task]]
id = "E44-T03"
title = "Implement DaimonFunctor wrapping PAD bias and somatic markers"
description = """
Implement F_daimon as a CrossCutFunctor (spec: 26-CROSS-CUTS.md:222-364):

1. **ASSESS pre_enrich** — inject PAD vector (PadVector from roko-core) and somatic markers
   into scored Signals. Use the existing DaimonState API from roko-daimon:
   - current_pad() for the PAD vector
