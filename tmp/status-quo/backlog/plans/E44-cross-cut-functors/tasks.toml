   (arousal > 0.5) + low dominance (< -0.3). The BehavioralStateThresholds struct exists
   in roko-daimon phase2_stubs.rs.

3. **ACT pre_enrich** — gate high-risk actions in Cautious/Anxious behavioral state.
   Inject a deferral signal.

4. **ACT post_enrich** — apply prospect-theory value computation:
   `prospect_value(outcome, reference)` with lambda=2.25, alpha=0.88 (Kahneman-Tversky).
   Losses hurt 2.25x more than equivalent gains.

5. **Short-circuit** — return true when PAD is in the Neutral region (all dims < 0.1 abs).
"""
