# ─── T07: Implement SafetyFunctor (F_safety) as outer wrapper ───

[[task]]
id = "E44-T07"
title = "Implement SafetyFunctor as capability-level pre-filter outside VCG"
description = """
Implement F_safety (spec: 26-CROSS-CUTS.md:724-808):

1. **Capability-level, not behavioral** — SafetyFunctor operates on what is PERMITTED,
   not what is ADVISABLE (that's Daimon's job). It filters based on AgentContract and
   capability grants.

2. **pre_enrich** — filter Signals that require capabilities not in the agent's grant set.
   The AgentContract exists in roko-agent safety module. SafetyFunctor needs the agent's
   current capability set to evaluate.

3. **post_enrich** — verify output against AgentContract safety contracts. Filter out
   Signals that violate contracts. Log violations as warnings (not errors — contracts may
   be permissive default).

4. **Never short-circuits** — safety is always active, unlike the other three functors.
   should_short_circuit() always returns false.

5. **Composition order** — F_total = F_safety . F_arbitrated(F_memory, F_daimon, F_dreams).
   Safety wraps the entire arbitrated pipeline. It runs BEFORE the arbitrator, not inside it.

Keep in `crates/roko-compose/src/safety_functor.rs`.
