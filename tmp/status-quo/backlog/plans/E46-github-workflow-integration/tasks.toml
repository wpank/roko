# ─────────────────────────────────────────────────────────────────────────────
# E46-T03: Extract GitHub API client from MCP server into a reusable library
# ─────────────────────────────────────────────────────────────────────────────
# The MCP server has all the HTTP plumbing but it's trapped in a binary crate.
# Extract the core API client (auth, rate limiting, request building) into a
# lib.rs so other crates (roko-cli runner, roko-serve) can call GitHub without
# shelling out to the MCP server or duplicating HTTP code.
[[task]]
id = "E46-T03"
title = "Extract GitHub API client into roko-mcp-github lib.rs"
description = """Split crates/roko-mcp-github into lib.rs + main.rs:
- lib.rs exports: GitHubClient struct (wraps reqwest::blocking::Client + token + rate limit state),
  plus public functions: create_branch, create_pr, merge_pr, get_actions_status,
  create_issue, close_issue, add_labels, comment_pr, review_pr, list_prs.
- main.rs keeps the MCP JSON-RPC framing and calls lib.rs functions.
- GitHubClient::new(token: &str) constructor.
- GitHubClient::from_env() reads GITHUB_TOKEN.
Add `[lib]` section to Cargo.toml so the crate can be used as both binary and library."""
