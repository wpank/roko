# ─────────────────────────────────────────────────────────────────────────────
# E46-T01: Add GitHubConfig to roko.toml schema
# ─────────────────────────────────────────────────────────────────────────────
# The MCP GitHub server reads GITHUB_TOKEN from env but nothing in roko.toml
# knows which owner/repo/default_branch to target. Add a [github] section so
# the runner and CLI can resolve repo coordinates without env vars in every
# prompt. The webhook secret already lives under [webhooks.github]; this new
# section covers repo identity + workflow preferences.
[[task]]
id = "E46-T01"
title = "Add [github] config section to RokoConfig schema"
description = """Add a GitHubConfig struct to roko-core's config schema with fields:
owner (String), repo (String), default_branch (String, default "main"),
auto_pr (bool, default false), merge_method (enum: merge/squash/rebase, default squash),
label_prefix (String, default "roko/").
Wire into RokoConfig as `pub github: GitHubConfig` with serde defaults.
Add to scaffold_default_toml output."""
status = "ready"
tier = "focused"
max_loc = 55
files = ["crates/roko-core/src/config/schema.rs"]
role = "implementer"
depends_on = []
domain = "config"

[task.context]
read_files = [
    { path = "crates/roko-core/src/config/schema.rs", lines = "1-60", why = "RokoConfig struct definition — add github field here" },
    { path = "crates/roko-core/src/config/schema.rs", lines = "1060-1100", why = "scaffold_default_toml — add [github] section" },
    { path = "crates/roko-core/src/config/serve.rs", lines = "470-500", why = "GithubWebhookConfig pattern to follow for struct style" },
]
symbols = [
    "RokoConfig — top-level config struct, add `pub github: GitHubConfig`",
    "scaffold_default_toml — appends default TOML sections",
    "GithubWebhookConfig — existing GitHub config struct for webhooks (reference pattern)",
]
anti_patterns = [
    "Do NOT move or rename the existing [webhooks.github] section — that stays for webhook secrets.",
    "Do NOT make owner/repo required — they should be optional Strings that callers check at use-site.",
]

[[task.verify]]
phase = "structural"
command = "grep -q 'pub github: GitHubConfig' crates/roko-core/src/config/schema.rs"
fail_msg = "RokoConfig must have a github field"

[[task.verify]]
phase = "structural"
command = "grep -q 'merge_method' crates/roko-core/src/config/schema.rs"
fail_msg = "GitHubConfig must have merge_method field"

[[task.verify]]
