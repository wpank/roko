[[task]]
id = "E46-T10"
title = "Wire GitHub webhook events to plan triggers"
description = """In roko-serve, add a subscriber to the event bus that reacts to
GitHub webhook signals:
1. GITHUB_ISSUE_OPENED with label "{label_prefix}plan": look up the issue body
   for a plan reference, queue the plan for execution via the plan API.
2. GITHUB_PR_REVIEW with event=REQUEST_CHANGES: emit a replan signal for the
   plan associated with the PR branch (match "roko/plan/{plan_id}").
3. GITHUB_CHECK_COMPLETED with conclusion=failure: emit a CI failure signal
   for the plan associated with the check's branch.

Create a github_event_subscriber function (similar pattern to the existing
prd_publish_subscriber) that takes the event bus receiver and processes events."""
status = "ready"
tier = "integrative"
max_loc = 55
files = ["crates/roko-serve/src/routes/webhooks.rs", "crates/roko-serve/src/events.rs"]
role = "implementer"
depends_on = ["E46-T02"]
domain = "serve"

[task.context]
read_files = [
    { path = "crates/roko-serve/src/routes/webhooks.rs", lines = "210-257", why = "persist_webhook_signal + github_signal_kind — event creation" },
    { path = "crates/roko-serve/src/events.rs", lines = "1-40", why = "ServerEvent enum and event bus pattern" },
]
symbols = [
    "ServerEvent::WebhookReceived — the event published on webhook ingress",
    "persist_webhook_signal — where signals are persisted and published",
    "prd_publish_subscriber — reference pattern for event bus subscriber",
]
anti_patterns = [
    "Do NOT process webhooks synchronously in the handler — use the event bus subscriber.",
    "Do NOT couple the subscriber to plan execution directly — emit signals that the trigger system can consume.",
]

[[task.verify]]
phase = "structural"
command = "grep -q 'github_event_subscriber\\|github_webhook_subscriber' crates/roko-serve/src/events.rs"
fail_msg = "events.rs must define a github event subscriber function"

[[task.verify]]
phase = "compile"
command = "cargo check -p roko-serve 2>&1"
fail_msg = "roko-serve must compile"

acceptance = [
    "GitHub webhook subscriber processes issue, PR review, and CI events",
    "Issue with plan label triggers plan queue",
    "PR review with REQUEST_CHANGES emits replan signal",
    "CI failure emits failure signal for the plan's branch",
]

# ─────────────────────────────────────────────────────────────────────────────
# E46-T11: `roko github status` CLI command
# ─────────────────────────────────────────────────────────────────────────────
# Add a CLI command to show GitHub integration status: config validation,
# active PRs from roko plans, open issues from roko, CI status.
[[task]]
id = "E46-T11"
title = "Add `roko github status` CLI command"
description = """Add a `github` subcommand group to roko-cli with a `status` subcommand:
1. Parse [github] config section — show owner/repo/auto_pr/merge_method.
2. Check GITHUB_TOKEN is set — show authenticated user.
3. List open PRs with head matching "roko/plan/*" — show PR number, title, CI status.
4. List open issues with label "{label_prefix}task-failure" — show count and titles.
5. Output a structured summary to stdout.

Add GithubCmd enum with Status variant. Register in main.rs Command enum."""
status = "ready"
tier = "focused"
max_loc = 55
files = ["crates/roko-cli/src/commands/github.rs", "crates/roko-cli/src/main.rs"]
role = "implementer"
depends_on = ["E46-T01", "E46-T03"]
domain = "cli"

[task.context]
read_files = [
    { path = "crates/roko-cli/src/main.rs", lines = "1-50", why = "Command enum — add Github variant" },
    { path = "crates/roko-cli/src/commands/", lines = "", why = "directory listing to see command module pattern" },
]
symbols = [
    "Command — top-level clap enum in main.rs",
    "GitHubClient::from_env — from lib.rs (T03)",
    "GitHubConfig — from roko-core (T01)",
]
anti_patterns = [
    "Do NOT make this command require a running server — it should work standalone.",
    "Do NOT panic on missing GITHUB_TOKEN — print a helpful error message.",
]

[[task.verify]]
phase = "structural"
command = "grep -q 'Github\\|GitHub' crates/roko-cli/src/main.rs"
fail_msg = "main.rs Command enum must have a Github variant"

[[task.verify]]
phase = "compile"
command = "cargo check -p roko-cli 2>&1"
fail_msg = "roko-cli must compile"

acceptance = [
    "`roko github status` shows config, auth status, active PRs, open issues",
    "Works without a running server",
    "Graceful error when GITHUB_TOKEN is missing",
]

# ─────────────────────────────────────────────────────────────────────────────
# E46-T12: Integration test for GitHub workflow end-to-end
# ─────────────────────────────────────────────────────────────────────────────
# Test the full flow with a mock GitHubOps implementation: plan start creates
# branch + PR, gate pass posts comment, merge triggers PR merge, failure
# creates issue.
[[task]]
id = "E46-T12"
title = "Integration test for GitHub workflow with mock GitHubOps"
description = """Create a test module in crates/roko-cli/src/runner/tests/ (or inline in
event_loop.rs) that:
1. Implements MockGitHubOps recording all calls in a Vec<GitHubCall> (enum
   with variants for each method).
2. Runs a minimal 2-task plan with auto_pr=true using the mock.
3. Asserts: create_plan_branch called once, open_pr called once with draft=true,
   comment_pr called for each task's gate result, merge_pr called on plan success.
4. Runs a failing task plan and asserts create_task_issue is called.
5. Verifies NoOpGitHubOps produces no side effects.

This test does NOT call real GitHub APIs — it validates the wiring through the
mock trait implementation."""
status = "ready"
tier = "integrative"
max_loc = 60
files = ["crates/roko-cli/src/runner/event_loop.rs"]
role = "implementer"
depends_on = ["E46-T06", "E46-T07", "E46-T08"]
domain = "testing"

[task.context]
read_files = [
    { path = "crates/roko-orchestrator/src/github_ops.rs", lines = "1-40", why = "GitHubOps trait to mock (from T04)" },
    { path = "crates/roko-cli/src/runner/event_loop.rs", lines = "6500-6600", why = "existing test patterns at end of file" },
]
symbols = [
    "GitHubOps — trait to mock",
    "NoOpGitHubOps — verify it produces no calls",
    "run() — entry point to exercise with mock",
]
anti_patterns = [
    "Do NOT call real GitHub APIs — this is a mock-based integration test.",
    "Do NOT duplicate test infra that already exists in the runner test harness.",
]

[[task.verify]]
phase = "structural"
command = "grep -q 'MockGitHubOps' crates/roko-cli/src/runner/event_loop.rs"
fail_msg = "MockGitHubOps must be defined in the test module"

[[task.verify]]
phase = "test"
command = "cargo test -p roko-cli -- github 2>&1"
fail_msg = "GitHub integration tests must pass"

acceptance = [
    "MockGitHubOps records all calls",
    "Plan success flow: create_branch -> open_pr -> comment_pr x N -> merge_pr",
    "Plan failure flow: create_task_issue called for terminal failures",
    "NoOpGitHubOps verified to produce no side effects",
]
