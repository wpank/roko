# ═══════════════════════════════════════════════════════════════════════════════
# E47-T01: DiskBudget config section in roko.toml
# ═══════════════════════════════════════════════════════════════════════════════

[[task]]
id = "E47-T01"
title = "Add [resources] config section with disk budget, thresholds, and GC policy"
description = """
Add a `[resources]` table to the roko.toml schema (CoreConfig in roko-core) with:
- `min_free_disk_mb` (u64, default 2048): refuse to start a plan run if free disk < threshold
- `warn_disk_mb` (u64, default 5120): emit a warning signal when free disk drops below this
- `per_plan_disk_budget_mb` (Option<u64>, default None): max disk growth allowed per plan
- `gc_on_plan_start` (bool, default true): run GC before starting a plan
- `gc_on_plan_end` (bool, default true): run GC after plan completion or failure
- `gc_on_failure` (bool, default true): run GC when a task fails (free space for retry)
- `target_cleanup_enabled` (bool, default true): enable Rust target/ cleanup between runs
- `target_max_age_days` (u32, default 3): delete target/ dirs older than N days
- `log_rotation_max_mb` (u64, default 50): rotate .roko/ JSONL logs when they exceed this size
- `worktree_cleanup_on_complete` (bool, default true): auto-remove worktrees after plan success
- `worktree_cleanup_on_failure` (bool, default true): auto-remove worktrees after plan failure

Implement `Default` for the new struct. Add to CoreConfig. Parse from TOML.
"""
