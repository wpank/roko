# ═══════════════════════════════════════════════════════════════════════════════
# E47-T03: Wire GC into plan lifecycle (pre-run, post-run, on-failure)
# ═══════════════════════════════════════════════════════════════════════════════

[[task]]
id = "E47-T03"
title = "Wire GcEngine into PlanRunner lifecycle hooks (pre-run, post-run, on-failure)"
description = """
The GcEngine exists in roko-fs but is never triggered automatically. Wire it into
orchestrate.rs PlanRunner at three lifecycle points:

1. **Pre-run**: If `resources.gc_on_plan_start` is true, call `GcEngine::collect()` before
   the DAG executor begins. Log the GcReport (candidates found, bytes freed). If
   `should_auto_gc()` returns true, run even if the config flag is false (safety valve).

2. **Post-run**: If `resources.gc_on_plan_end` is true, call `GcEngine::collect()` after
   plan completion (success or failure). This runs after `post_plan_cold_archival`.

3. **On-failure**: If `resources.gc_on_failure` is true, call `GcEngine::collect()` when
   a task fails and before any retry/replan. This frees space that may have caused the failure.

Load `ResourcesConfig` from roko.toml alongside the existing config loading. Construct
GcEngine with `RokoLayout::for_project(workdir)` and the default RetentionPolicy (or
a future config-driven one).

All GC calls are non-fatal — log errors and continue.
"""
