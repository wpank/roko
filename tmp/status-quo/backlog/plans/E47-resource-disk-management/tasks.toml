title = "Track aggregate disk usage across parallel plan worktrees and serialize on pressure"
description = """
When running multiple tasks in parallel worktrees, each spawns its own `cargo build`
consuming 2-10 GB of disk. Add aggregate tracking and backpressure:

1. Add a `DiskBudgetTracker` to PlanRunner that tracks estimated disk usage per active
   worktree. On task start, estimate growth based on historical data from CleanupReport
   (or a default of 3 GB). On task completion, measure actual growth.

