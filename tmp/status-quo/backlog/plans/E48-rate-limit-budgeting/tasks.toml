# ─────────────────────────────────────────────────────────────────────────────
# E48-T03: Share rate limit state across concurrent agents
# ─────────────────────────────────────────────────────────────────────────────
# When multiple agents run in parallel (max_parallel > 1), they share API keys
# but each has its own rate limiter. Create a shared Arc<ProviderRateLimiter>
# that each runtime passes to every model call on both runner entry paths.
[[task]]
id = "E48-T03"
title = "Pool ProviderRateLimiter across parallel agents in orchestrator"
description = """
Legacy dispatch in orchestrate.rs and runner-v2 both construct provider-backed
agents, while ModelCallService is the reusable in-process model-call boundary.
The current OpenAI-compatible backend also has a process-global default limiter;
that cannot represent per-runtime configuration or prove pooling for all providers.

Wire one Arc<ProviderRateLimiter> per runtime through each runner's model/provider
construction and ModelCallService into the provider request boundary. The limiter must be:
1. Created once from live ProviderConfig at runtime construction
2. Populated with per-provider limits from config (E48-T02)
3. Shared via Arc across all concurrent agent dispatches on legacy and runner-v2
4. Called via limiter.acquire(provider_id, estimated_tokens).await before each LLM request
5. Return a typed retriable limit outcome on hard TPM/RPM exhaustion

The existing ProviderRateLimiter is already thread-safe (governor is
Send + Sync) and already keyed by provider_id. The only missing piece is
threading it from the orchestrator into each provider adapter.
"""
