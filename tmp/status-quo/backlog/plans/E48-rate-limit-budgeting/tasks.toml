# ─────────────────────────────────────────────────────────────────────────────
# E48-T02: Extend ProviderRateLimiter with per-provider RPM/TPM config
# ─────────────────────────────────────────────────────────────────────────────
# The existing ProviderRateLimiter uses a single default RPM for all providers.
# Each provider has different limits (Anthropic: 50 RPM tier 1, OpenAI: 500 RPM,
# Gemini free: 15 RPM). Add per-provider configuration and TPM tracking.
[[task]]
id = "E48-T02"
title = "Add per-provider RPM and TPM limits to ProviderRateLimiter"
ownership = "canonical-owner"
description = """
The existing ProviderRateLimiter in rate_limit.rs uses governor with a
single default_rpm quota for all provider keys. Real providers have very
different limits:
- Anthropic tier 1: 50 RPM / 40K TPM
- OpenAI tier 1: 500 RPM / 30K TPM
- Gemini free: 15 RPM / 1M TPM (generous tokens, tight requests)
- Ollama: unlimited (local)

Extend ProviderRateLimiter to accept a per-provider config map:
  HashMap<String, ProviderLimits> where ProviderLimits = { rpm: u32, tpm: u64 }

Add a separate token-per-minute limiter keyed by provider that tracks
token consumption (input + output) and throttles when TPM approaches the
limit. Use governor's Quota::per_minute for RPM and a separate
AtomicU64 + sliding window for TPM (governor doesn't natively support
token-weighted quotas well).

Add ProviderLimits to the config schema in roko-core so users can set
per-provider limits in roko.toml under [providers.<name>].
"""
