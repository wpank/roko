# ─────────────────────────────────────────────────────────────────────────────
# E48-T06: Graceful degradation — queue and retry on rate limit
# ─────────────────────────────────────────────────────────────────────────────
# When rate limited, don't fail the task — queue it for retry with a
# different model or after a backoff delay.
[[task]]
id = "E48-T06"
title = "Queue tasks for retry on rate limit instead of failing"
description = """
Currently when an agent dispatch fails due to rate limiting, the
orchestrator's retry logic (orchestrate.rs ~10197-10210) applies a
fixed exponential backoff (2s base) and retries with the same model.
This wastes time when the provider is rate-limited for minutes.

Improve the rate-limit retry path:
1. When RetryErrorPattern::RateLimit is detected, check if an
   alternative model/provider is available via CascadeRouter's
   fallback chain.
2. If a healthy fallback exists, immediately retry with the fallback
   model (no sleep needed — different provider, different rate limit).
3. If no fallback exists, apply the existing exponential backoff but
   use the provider's Retry-After header value when available (it's
   already in ProviderError::RateLimit { retry_after_ms }).
4. Record the rate limit event in ProviderHealthRegistry so future
   routing avoids the rate-limited provider.
5. Log the fallback decision: "rate-limited on {model}, falling back
   to {fallback_model}" at warn level.

The orchestrator already has RetryErrorPattern::RateLimit detection
(orchestrate.rs:10946) and backoff logic (orchestrate.rs:10202-10207).
This task extends it to try fallback models first.
"""
