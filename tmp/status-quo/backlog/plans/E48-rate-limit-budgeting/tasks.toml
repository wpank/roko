# ─────────────────────────────────────────────────────────────────────────────
# E48-T05: Route rate-limited providers through CascadeRouter health check
# ─────────────────────────────────────────────────────────────────────────────
# ProviderHealthRegistry tracks circuit state per provider. CascadeRouter
# selects models. They are not connected: when Anthropic is rate-limited,
# CascadeRouter still routes to claude-sonnet. Wire health into routing.
[[task]]
id = "E48-T05"
title = "Integrate ProviderHealthRegistry into CascadeRouter model selection"
description = """
ProviderHealthRegistry in roko-learn/src/provider_health.rs tracks a
three-state circuit breaker (Closed/Open/HalfOpen) per provider with
error-class-specific cooldowns. CascadeRouter in cascade_router.rs
selects models but does not check provider health before selection.

The fix:
1. CascadeRouter already has access to model slugs and knows which
   provider each slug maps to (via tier_map / the config model profiles).
2. Add a method CascadeRouter::set_provider_health(Arc<ProviderHealthRegistry>)
   to inject the health registry.
3. In the routing hot path (route_for_task or equivalent), filter out
   candidates whose provider is currently Open in the health registry.
4. When all preferred candidates are unhealthy, fall back to the next
   available model in the fallback chain (already exists via
   fallback_chain_for_model).
5. When a dispatch succeeds, call health_registry.record_success().
   When it fails with a rate limit, call health_registry.record_failure()
   with ErrorClass::RateLimit.

The ProviderHealthRegistry is already thread-safe (Arc<Mutex<...>>).
"""
