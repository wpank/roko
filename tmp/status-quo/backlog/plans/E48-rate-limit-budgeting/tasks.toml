# ─────────────────────────────────────────────────────────────────────────────
# E48-T07: Token estimation before dispatch
# ─────────────────────────────────────────────────────────────────────────────
# Estimate prompt token count before sending to avoid dispatching requests
# that will certainly be rejected by the provider for context overflow.
[[task]]
id = "E48-T07"
title = "Pre-dispatch token estimation to reject oversized prompts"
description = """
ModelCallService already has CostEstimate with estimated_input_tokens
(4 chars/token heuristic). But this estimate is computed after dispatch
for cost tracking, not before to prevent oversized requests.

Add a pre-dispatch check:
1. Before calling the provider, estimate the total prompt token count
   using the existing 4-chars-per-token heuristic from CostEstimate.
2. Compare against the model's context_window from ModelProfile.
3. If estimated_tokens > context_window * 0.95 (leaving 5% margin
   for response), reject the dispatch early with a descriptive error
   rather than sending a request that will fail with ContextOverflow.
4. When rejection happens, emit a warning and try to route to a model
   with a larger context window via CascadeRouter's
   context_overflow_fallback_for_model() helper.
5. Track pre-dispatch rejections as a metric for observability.

The 4-chars-per-token heuristic is intentionally simple. Accuracy
improvements (tiktoken integration) can come later.
"""
