# ─────────────────────────────────────────────────────────────────────────────
# E48-T10: BudgetAction::RouteToCheaper integration with CascadeRouter
# ─────────────────────────────────────────────────────────────────────────────
# BudgetGuardrail returns RouteToCheaper when budget is stressed.
# CascadeRouter has budget_pressure in its routing context. Connect them.
[[task]]
id = "E48-T10"
title = "Wire BudgetAction::RouteToCheaper to CascadeRouter model downgrade"
description = """
BudgetGuardrail returns BudgetAction::RouteToCheaper when spend is between
warn_at_percent and 100%. The orchestrator already computes budget_pressure
via routing_budget_pressure() and passes it into the RoutingContext as
conductor_load. But this is a loose coupling — the conductor_load field
mixes budget pressure with actual system load.

Wire proper budget->routing integration:
1. Add a dedicated budget_pressure field to RoutingContext (the existing
   conductor_load field conflates budget with system load).
2. In CascadeRouter, when budget_pressure > 0.5, bias model selection
   toward cheaper tiers (Haiku over Sonnet, Sonnet over Opus) using
   the existing cost_pressure_factor() helper.
3. When budget_pressure >= 0.9 (near exhaustion), force the cheapest
   available model regardless of task complexity.
4. Log the budget-driven downgrade: "budget pressure {pressure:.0}%,
   routing to cheaper model {model}".
5. Update routing_budget_pressure() to return a value directly usable
   as the new budget_pressure field instead of piggybacking on conductor_load.
"""
