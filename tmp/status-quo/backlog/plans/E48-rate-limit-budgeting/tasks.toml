# =============================================================================
# E48: Rate Limit Budgeting
#
# Makes roko agents aware of LLM provider rate limits, token budgets, and
# cost constraints. Rate limits are the #1 cause of agent failures during
# self-development. This epic adds retry-with-backoff for provider errors,
# shared rate limit pooling across parallel agents, budget enforcement that
# actually halts execution, provider health integration into routing, graceful
# degradation via model fallback, token estimation before dispatch, and
# real-time cost projection.
#
# Existing infrastructure (DO NOT REBUILD):
#   - ProviderRateLimiter (governor): crates/roko-agent/src/rate_limit.rs
#   - RetryPolicy (jitter/backoff):   crates/roko-agent/src/retry.rs
#   - ProviderError::RateLimit:       crates/roko-agent/src/provider/mod.rs
#   - ProviderHealthRegistry:         crates/roko-learn/src/provider_health.rs
#   - CostTable (per-model pricing):  crates/roko-learn/src/cost_table.rs
#   - BudgetGuardrail:                crates/roko-learn/src/budget.rs
#   - BudgetConfig (CLI):             crates/roko-cli/src/config.rs:335-384
#   - CostOverrunWatcher:             crates/roko-conductor/src/watchers/cost_overrun.rs
#   - CostMeter:                      crates/roko-cli/src/inline/primitives/cost_meter.rs
#   - CascadeRouter (model routing):  crates/roko-learn/src/cascade_router.rs
#   - ModelCallService:               crates/roko-agent/src/model_call_service.rs
#   - RetryErrorPattern::RateLimit:   roko-learn conductor module
#   - Tool-level RateLimiter:         crates/roko-agent/src/safety/rate_limit.rs
#   - should_retry / RetryAction:     crates/roko-agent/src/provider/mod.rs:748
#   - DiagnosisEngine LlmRateLimit:   crates/roko-conductor/ diagnosis engine
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# E48-T01: Wire retry-with-backoff into provider dispatch loop
# ─────────────────────────────────────────────────────────────────────────────
# RetryPolicy exists but is not called from the provider dispatch path.
# The provider adapters (anthropic_api, openai_compat, gemini, etc.) call
# the LLM, get a ProviderError::RateLimit back, and immediately propagate it.
# Wire RetryPolicy::for_rate_limit() into the dispatch loop so 429/529
# responses trigger exponential backoff + jitter before failing.
[[task]]
id = "E48-T01"
title = "Wire RetryPolicy into provider dispatch loop for 429/529 retries"
description = """
The RetryPolicy struct with full-jitter exponential backoff exists in
crates/roko-agent/src/retry.rs. The ProviderError::RateLimit variant
carries an optional retry_after_ms from provider headers. The
should_retry() function in provider/mod.rs maps errors to RetryAction.

But none of this is called in the actual dispatch path: providers
surface ProviderError immediately and the caller gets the error.

Wire RetryPolicy into the model_call_service.rs call() method and/or
the provider adapter dispatch functions. When a ProviderError::RateLimit
is returned:
1. Check RetryPolicy::should_retry() for the attempt count
2. Compute delay via RetryPolicy::rate_limit_delay() (respects Retry-After)
3. tokio::time::sleep the delay
4. Retry the request
5. On exhaustion, propagate the original ProviderError

Also handle ProviderError::ServerError and ProviderError::Timeout the
same way (they are already in RetryPolicy::default().retryable_errors).
"""
status = "ready"
tier = "focused"
model_hint = "claude-sonnet-4-6"
files = [
    "crates/roko-agent/src/model_call_service.rs",
    "crates/roko-agent/src/retry.rs",
    "crates/roko-agent/src/provider/mod.rs",
]
role = "implementer"
depends_on = []
domain = "agent-dispatch"

