# ─────────────────────────────────────────────────────────────────────────────
# E48-T03: Share rate limit state across concurrent agents
# ─────────────────────────────────────────────────────────────────────────────
# When multiple agents run in parallel (max_parallel > 1), they share API keys
# but each has its own rate limiter. Create a shared Arc<ProviderRateLimiter>
# that the orchestrator passes to all agents in a plan.
[[task]]
id = "E48-T03"
title = "Pool ProviderRateLimiter across parallel agents in orchestrator"
description = """
The orchestrator in orchestrate.rs dispatches agents via dispatch_agent_with().
Each agent currently constructs its own provider adapter with no shared
rate limit state. When max_parallel=4 agents share the same Anthropic key,
they can collectively exceed the provider RPM within a single minute window.

Wire a single Arc<ProviderRateLimiter> into OrchestrationRuntime and
thread it through dispatch_agent_with() -> create_agent_for_model() ->
provider adapter construction. The limiter must be:
1. Created once at OrchestrationRuntime construction
2. Populated with per-provider limits from config (E48-T02)
3. Shared via Arc across all concurrent agent dispatches
4. Called via limiter.acquire(provider_id).await before each LLM request

The existing ProviderRateLimiter is already thread-safe (governor is
Send + Sync) and already keyed by provider_id. The only missing piece is
threading it from the orchestrator into each provider adapter.
"""
