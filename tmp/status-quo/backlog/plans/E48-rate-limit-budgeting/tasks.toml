# ─────────────────────────────────────────────────────────────────────────────
# E48-T04: Wire budget enforcement to actually halt plan execution
# ─────────────────────────────────────────────────────────────────────────────
# CostOverrunWatcher fires a warning signal but doesn't stop execution.
# BudgetGuardrail returns BudgetAction::Block but the caller ignores it.
# The orchestrator checks budget in dispatch_agent_with but only logs.
# Wire actual halt semantics: when budget is exceeded, pause the plan.
[[task]]
id = "E48-T04"
title = "Enforce budget halt — pause plan execution when budget exceeded"
description = """
Three budget systems exist but none enforces a hard halt:

1. CostOverrunWatcher (conductor): Fires a conductor.intervention signal
   with severity=warning. Nobody acts on the signal.
2. BudgetGuardrail (roko-learn): Returns BudgetAction::Block when
   budget is exhausted. The orchestrator checks but only logs.
3. dispatch_agent_with (orchestrate.rs:15200-15208): Checks plan_spent
   >= max_plan_usd and returns an error, but this only prevents the NEXT
   dispatch — it doesn't pause the running agent.

Wire these together:
1. When BudgetGuardrail returns BudgetAction::Block, set a
   budget_exhausted flag on OrchestrationRuntime.
2. Before each dispatch in the plan executor loop, check this flag and
   skip pending tasks with a BudgetExhausted error.
3. When CostOverrunWatcher fires, update the BudgetGuardrail state.
4. Add a --budget-override flag to `roko plan run` that lets the user
   continue execution past the budget limit (requires explicit opt-in).
5. Persist budget_exhausted state in the executor snapshot so resume
   respects the halt.
"""
