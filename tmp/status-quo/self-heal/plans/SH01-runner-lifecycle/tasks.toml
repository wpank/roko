title = "Enforce progress-aware deadlines durably"
description = "Wire hard-run, owner-scoped task/gate/silence, and global scheduler-no-progress deadlines using T06A configuration and T06B ownership. Agent chatter resets silence only; useful progress advances only on durable lifecycle or DAG milestones. Terminalize exact attempts and plans and persist typed timeout/cancellation events before terminal snapshots, shutdown, or run.completed. Gate-map membership alone cannot suppress deadlock detection."
status = "ready"
tier = "integrative"
model_hint = "codex-default"
max_loc = 500
files = ["crates/roko-cli/src/runner/event_loop.rs", "crates/roko-cli/src/runner/types.rs", "crates/roko-cli/src/runner/state.rs"]
role = "implementer"
domain = "execution-engine"
depends_on = ["SH01-T06B2D"]
[task.context]
read_files = [{ path = "tmp/status-quo/issues/44-FIXED-RUN-TIMEOUT-IS-NOT-PROGRESS-AWARE.md", why = "Progress semantics." }, { path = "tmp/status-quo/issues/52-TIMEOUT-ABSENT-FROM-RUN-LEDGER.md", why = "Durable terminal ordering." }]
[[task.verify]]
phase = "test"
command = "cargo test -p roko-cli runner::event_loop 2>&1 && cargo test -p roko-cli runner::state 2>&1"
fail_msg = "Progress-aware deadline tests must pass."
acceptance = ["Hard cap is independent of progress.", "Chatter cannot reset scheduler progress.", "Owner timeout affects only its exact attempt/effect.", "Lost effects expire rather than blocking forever.", "Typed timeout terminals are durable before terminal snapshots and run completion."]

