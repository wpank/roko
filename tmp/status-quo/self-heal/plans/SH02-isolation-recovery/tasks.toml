tier = "integrative"
model_hint = "codex-default"
max_loc = 250
files = ["crates/roko-cli/src/runner/event_loop.rs", "crates/roko-cli/src/runner/task_dag.rs", "crates/roko-runtime/src/task_scheduler.rs"]
role = "implementer"
domain = "execution-engine"
depends_on = []
depends_on_plan = ["SH01-runner-lifecycle"]
[task.context]
read_files = [{ path = "tmp/status-quo/issues/13-plan-max-parallel-is-ignored.md", why = "Observed concurrency violation." }]
[[task.verify]]
phase = "test"
command = "cargo test -p roko-runtime task_scheduler 2>&1 && cargo test -p roko-cli runner::event_loop 2>&1"
fail_msg = "Concurrency enforcement tests must pass."
acceptance = ["max_parallel=1 never overlaps task attempts.", "Capacity covers preflight, agent, gate, commit, and merge.", "Different plans can still use global parallelism."]

