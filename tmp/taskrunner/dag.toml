# Master DAG — Task dependencies and wave assignments
#
# This file defines:
# - All tasks (by ID)
# - Dependencies between tasks (blocked_by)
# - Wave assignments (which gate cycle they belong to)
# - Track groupings (logical category)
#
# Tasks are populated separately in tasks/*.md files.
# This file is the dependency graph only.

[meta]
version = "1.0"
max_parallelism = 20
project_root = "/Users/will/dev/nunchi/roko/roko"

# ─── Tracks ──────────────────────────────────────────────────────────────
# Logical groupings. A task belongs to exactly one track.

[tracks]
config-foundation = { description = "Config loading, validation, determinism", color = "blue" }
ide-acp = { description = "IDE/ACP sidecar fixes", color = "green" }
terminal-chat = { description = "Terminal, chat, raw mode stability", color = "yellow" }
runner-hardening = { description = "Runner v2 event loop fixes", color = "red" }
v2-core = { description = "V2 refactoring: Cell, Signal, protocols", color = "purple" }
v2-engine = { description = "V2 Graph + Engine (new crate)", color = "magenta" }
demo-ui = { description = "Demo app frontend fixes", color = "cyan" }
perf = { description = "Performance optimizations", color = "white" }
cleanup = { description = "Dead code removal, audit, tagging", color = "gray" }
wiring = { description = "Wire existing floating code to runtime", color = "orange" }
infrastructure = { description = "Concurrency, atomicity, CI, Docker, error handling", color = "brown" }
v2-core-abstractions = { description = "V2 Cell execute, Signal rename, protocol traits", color = "violet" }
cli-redesign = { description = "CLI convergence, roko do/show, streaming output", color = "pink" }
graph-engine = { description = "V2 Graph crate + Engine + cells", color = "magenta" }

# ─── Waves ──────────────────────────────────────────────────────────────
# Each wave runs in parallel (up to max_parallelism agents).
# Between waves, a gate (build+test+clippy) must pass.

[waves]

[waves.wave-0]
name = "Foundation"
description = "Config and core type fixes that everything else depends on"
max_parallel = 5
gate = "full"  # cargo build + test + clippy

[waves.wave-1]
name = "Parallel Fixes"
description = "Independent bug fixes across all tracks"
max_parallel = 20
gate = "full"

[waves.wave-1-audit]
name = "Wave 1 Audit"
description = "Fresh agents verify wiring and CLI behavior"
max_parallel = 10
gate = "none"  # audit doesn't change code

[waves.wave-2]
name = "V2 Core + More Fixes"
description = "V2 Signal rename, Cell execute, protocol traits + remaining fixes"
max_parallel = 15
gate = "full"

[waves.wave-2-audit]
name = "Wave 2 Audit"
description = "Verify wave 2 wiring"
max_parallel = 10
gate = "none"

[waves.wave-3]
name = "Engine + Integration"
description = "V2 Graph+Engine crate, remaining integration work + observability + WAL"
max_parallel = 10
gate = "full"

[waves.wave-4]
name = "Feeds + Graduation + Calibration"
description = "Feed trait, CLI, pulse graduation, predict-publish-correct loop"
max_parallel = 10
gate = "full"

[waves.wave-5]
name = "Migration + Hot Graphs"
description = "Plan→Graph converter, Engine as default, Hot Graphs cognitive loop"
max_parallel = 5
gate = "full"

